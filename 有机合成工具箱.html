<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>有机合成工具箱</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{margin:0;overflow:hidden;height:100vh;background:#060a10}
.vp{position:relative;width:100%;height:100%;background:#060a10}
.vp iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#060a10;overflow:hidden}
#pf{z-index:2}#pf2{z-index:1;pointer-events:none;opacity:0}
.fn{position:fixed;bottom:79px;right:5px;z-index:100}
.fb{width:52px;height:52px;border-radius:50%;background:#38bdf8;border:none;color:#060d08;font-size:19px;cursor:pointer;box-shadow:0 4px 22px #38bdf859;transition:all .3s;display:flex;align-items:center;justify-content:center}
.fb:hover{transform:scale(1.08)}.fb.open{transform:rotate(45deg);background:#ff5c5c;box-shadow:0 4px 20px rgba(255,92,92,.35)}
.fm{position:absolute;bottom:64px;right:0;width:226px;background:#101a28;border:1px solid #28405e;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:6px;opacity:0;visibility:hidden;transform:translateY(10px) scale(.96);transition:all .25s;max-height:400px;overflow-y:auto}
.fm.open{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.fml{font-size:10px;font-weight:700;color:#3e5470;text-transform:uppercase;letter-spacing:.7px;padding:6px 10px 4px}
.fmi{padding:8px 11px;border-radius:6px;cursor:pointer;font-size:12.5px;transition:all .12s;display:flex;align-items:center;gap:8px;color:#dce6f4;font-family:system-ui,sans-serif}
.fmi:hover{background:#38bdf81a;color:#7dd3fc}.fmi.cur{background:#38bdf81a;color:#7dd3fc;font-weight:700}
.fmi i{width:16px;text-align:center;font-size:11px;opacity:.6}.fmi.cur i{opacity:1}
.fmd{height:1px;background:#1c2c44;margin:3px 0}
.fmi.sub{padding-left:30px;font-size:11.5px;color:#6882a6}.fmi.sub::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0}.fmi.sub.cur{color:#7dd3fc}.fmi.sub.cur::before{opacity:1;width:6px;height:6px}
.pi{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:5px 14px;background:rgba(13,18,25,.88);backdrop-filter:blur(14px);border:1px solid #1c2c44;border-radius:20px;font-size:11.5px;color:#6882a6;font-family:system-ui,sans-serif;pointer-events:none;transition:opacity .3s}
.pi span{color:#7dd3fc;font-weight:700}
.dots{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px}
.dots .dot{width:8px;height:8px;border-radius:50%;background:#1c2c4499;transition:all .3s;cursor:pointer}
.dots .dot:hover{background:#38bdf866}.dots .dot.on{background:#38bdf8;box-shadow:0 0 8px #38bdf880;transform:scale(1.2)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#28405e;border-radius:3px}
</style>
</head>
<body>
<div id="__theme_panel" style="position:fixed;top:16px;right:16px;z-index:9999;width:260px;max-height:80vh;overflow-y:auto;background:#101a28;border:1px solid #28405e;border-radius:12px;padding:16px;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:system-ui,sans-serif;color:#dce6f4;font-size:12px;display:none;">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
<div style="font-size:14px;font-weight:700;color:#7dd3fc;display:flex;align-items:center;gap:6px;"><i class="fa-solid fa-palette"></i> 主题预设</div>
<div style="display:flex;gap:4px;">
<button onclick="__cycleTheme()" style="padding:4px 10px;border:1px solid #1c2c44;background:#101a28;color:#6882a6;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;" title="切换下一个预设">&#10227;</button>
<button onclick="__resetTheme()" style="padding:4px 10px;border:1px solid #1c2c44;background:#101a28;color:#6882a6;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;" title="重置为默认">&#8634;</button>
</div></div>
<div id="__theme_grid" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>
<div class="vp">
<iframe id="pf"></iframe>
<iframe id="pf2"></iframe>
</div>
<div class="pi">当前：<span id="pn">-</span></div>
<div class="dots" id="dots"></div>
<div class="fn">

<button class="fb" id="fbtn" onclick="tog()"><i class="fa-solid fa-layer-group"></i></button>
</div>

ple-time:hover {\n  background: rgba(0,214,143,0.12);\n  border-color: rgba(0,214,143,0.25);\n}\n.sample-input {\n  background: rgba(255,255,255,0.035);\n  border: 1px solid var(--border);\n  border-radius: 6px; padding: 5px 8px;\n  color: var(--fg); font-size: 12px;\n  outline: none; transition: border-color .2s; font-family: inherit;\n}\n.sample-input:focus {\n  border-color: var(--accent);\n  box-shadow: 0 0 0 2px rgba(0,214,143,0.1);\n}\n.sample-input.name-input-s { width: 160px; min-width: 100px; }\n.sample-input.inst-input { width: 140px; min-width: 80px; }\n.sample-dropdown {\n  position: absolute; top: 100%; left: 0; right: 0;\n  background: var(--bg2);\n  border: 1px solid var(--border);\n  border-radius: 8px; max-height: 160px;\n  overflow-y: auto; z-index: 50;\n  box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none;\n}\n.sample-dropdown.open { display: block; }\n.sample-dropdown-item {\n  padding: 7px 10px; font-size: 12px;\n  cursor: pointer; transition: background .15s; color: var(--fg);\n}\n.sample-dropdown-item:hover {\n  background: rgba(0,214,143,0.1); color: var(--accent);\n}\n.sample-dropdown-item:first-child { border-radius: 8px 8px 0 0; }\n.sample-dropdown-item:last-child { border-radius: 0 0 8px 8px; }\n.sample-field-wrap { position: relative; }\n..sample-empty { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border: 1px dashed rgba(255,255,255,0.06); border-radius: 10px; }\n/* ===== PDF字体面板样式 ===== */\n.font-panel {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 8px 14px;\n  background: rgba(255,255,255,0.025);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  margin-bottom: 12px;\n  flex-wrap: wrap;\n}\n.font-panel label {\n  font-size: 12px;\n  color: var(--muted);\n  white-space: nowrap;\n  font-weight: 500;\n}\n.font-status {\n  font-size: 11px;\n  color: var(--muted);\n  display: flex;\n  align-items: center;\n  gap: 5px;\n  font-family: \'JetBrains Mono\', monospace;\n  max-width: 200px;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n}\n.font-status.loaded {\n  color: var(--accent);\n}\n.font-status.loaded i {\n  color: var(--accent);\n  animation: fontPulse 2s ease-in-out infinite;\n}\n@keyframes fontPulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.4; }\n}\n.font-hint {\n  font-size: 10px;\n  color: var(--muted);\n  opacity: 0.6;\n  white-space: nowrap;\n}\n</style>\n\n<style>\n:root {\n  --bg: #060a10;\n  --bg2: #0a1018;\n  --card: #101a28;\n  --card-h: #162236;\n  --bdr: #1c2c44;\n  --bdr2: #28405e;\n  --fg: #dce6f4;\n  --muted: #6882a6;\n  --dim: #3e5470;\n  --accent: #38bdf8;\n  --accent2: #7dd3fc;\n  --accent-bg: rgba(56,189,248,.1);\n  --danger: #ff5c5c;\n  --danger-bg: rgba(255,92,92,.1);\n  --warn: #f0a030;\n  --success: #22c55e;\n  --success-bg: rgba(34,197,94,.1);\n  --info: #38bdf8;\n  --info-bg: rgba(56,189,248,.1);\n  --text-primary: #f0f9ff;\n  --text-secondary: #94a3b8;\n  --surface-1: #0a1018;\n  --surface-2: #162236;\n  --surface-3: #28405e;\n  --shadow: rgba(0,0,0,.35);\n  --gradient-start: #38bdf8;\n  --gradient-end: #7dd3fc;\n  --highlight: #fbbf24;\n  --code-bg: #060c14;\n  --border-light: #162438;\n  --border-focus: #38bdf8;\n  --text-muted: #7890b0;\n  --text-dim: #4a6480;\n  --text-accent: #7dd3fc;\n  --text-danger: #ff7a7a;\n  --text-success: #4ade80;\n  --text-warn: #fbbf24;\n  --text-info: #60c5f8;\n  --surface-hover: #162236;\n  --surface-active: #1e2a42;\n  --overlay: rgba(0,0,0,.6);\n  --overlay-light: rgba(0,0,0,.3);\n  --tag-bg: rgba(56,189,248,.08);\n  --tag-text: #38bdf8;\n  --input-bg: #060a10;\n  --input-border: #1c2c44;\n  --input-focus: #38bdf8;\n  --scrollbar: #28405e;\n  --scrollbar-hover: #3a5880;\n  --selection: rgba(56,189,248,.2);\n}\n</style>\n</head>\n<body>\n<div class="bg-d"></div>\n<div class="grid-bg"></div>\n<div class="toast-c" id="toastBox"></div>\n<div class="stt" id="structTip">\n  <img id="tipImg" src="" alt="">\n  <div class="stt-label" id="tipLabel"></div>\n</div>\n<div class="main-wrap">\n\n  <!-- 历史列表视图 -->\n  <div id="historyView" class="view active">\n    <header style="margin-bottom:28px">\n      <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">\n        <div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,214,143,0.25)">\n          <i class="fas fa-flask" style="color:#060b14;font-size:18px"></i>\n        </div>\n        <h1 style="font-size:30px;font-weight:900;letter-spacing:-.5px">\n          <span class="title-g">Stoichiometry Lab</span>\n        </h1>\n      </div>\n      <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-left:56px">\n        管理你的化学反应计算，支持结构式检索、投料计算与实验记录导出。\n      </p>\n    </header>\n    <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center">\n      <button class="btn-a" onclick="createNew()">\n        <i class="fas fa-plus"></i> 新建反应\n      </button>\n      <button class="btn-o" onclick="openImportModal()">\n        <i class="fas fa-file-import"></i> 导入\n      </button>\n      \n      <button class="btn-o" onclick="exportAllExcel()">\n  <i class="fas fa-file-export"></i> 导出Excel\n</button>\n<button class="btn-o" onclick="exportAllJSON()" style="border-color:rgba(139,92,246,0.25);color:#a78bfa">\n            <i class="fas fa-code"></i> 导出全部JSON\n          </button>\n          <button class="btn-o" onclick="openBatchPdfModal()" id="batchPdfBtn" style="display:none;border-color:rgba(239,68,68,0.2);color:#f87171">\n            <i class="fas fa-file-pdf"></i> 批量导出PDF\n          </button>\n          <button class="btn-danger" onclick="clearAllReactions()" id="clearAllBtn" style="display:none">\n            <i class="fas fa-trash-alt"></i> 清除所有\n          </button>\n\n      <div class="search-box" style="margin-left:auto">\n        <i class="fas fa-search"></i>\n        <input class="ci" id="searchInput" placeholder="搜索反应名称或物质..." oninput="filterReactions(this.value)">\n      </div>\n      <span id="rxnCount" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;min-width:60px"></span>\n    </div>\n    <div id="reactionList"></div>\n  </div>\n\n  <!-- 编辑器视图 -->\n  <div id="editorView" class="view">\n    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">\n      <button class="btn-o" onclick="backToHistory()" style="padding:8px 12px">\n        <i class="fas fa-arrow-left"></i>\n      </button>\n      <input class="name-input" id="rxnNameInput" placeholder="输入反应名称..." oninput="onNameChange(this.value)">\n      <select id="massUnitSel" class="cs" style="width:70px" onchange="onUnitChange(this.value)">\n        <option value="g">g</option>\n        <option value="mg">mg</option>\n        <option value="kg">kg</option>\n      </select>\n      <button class="btn-o" onclick="saveCurrent()" style="margin-left:auto">\n        <i class="fas fa-save"></i> 保存\n      </button>\n      <button class="btn-o" onclick="exportCurrent()" style="border-color:rgba(59,130,246,0.2);color:#60a5fa">\n        <i class="fas fa-code"></i> 导出\n      </button>\n    </div>\n\n    <section class="glass" style="padding:14px 16px;margin-bottom:16px">\n      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">\n        <i class="fas fa-clipboard-list" style="color:var(--warn);font-size:12px"></i>\n        <span style="font-weight:600;font-size:13px">反应操作工艺备注</span>\n      </div>\n            <textarea class="ci" id="rxnNotes" placeholder="记录反应条件、温度、时间、后处理步骤等..." oninput="onNotesChange(this.value)"></textarea>\n    </section>\n    <!-- 送样记录 -->\n    <section class="glass sample-section" style="padding:14px 16px">\n      <div class="sample-header">\n        <div class="sample-header-left">\n          <i class="fas fa-vials"></i>\n          <span>送样记录</span>\n        </div>\n        <button class="btn-o" onclick="addSampleRecord()">\n          <i class="fas fa-plus"></i> 添加记录\n        </button>\n      </div>\n      <div id="sampleList" class="sample-list"></div>\n    </section>\n    <section class="glass" style="padding:16px;margin-bottom:16px">\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">\n        <div style="display:flex;align-items:center;gap:8px">\n          <i class="fas fa-table" style="color:var(--accent);font-size:13px"></i>\n          <span style="font-weight:700;font-size:14px">投料表</span>\n    <span style="font-size:10px;color:var(--muted);background:rgba(0,214,143,0.06);padding:2px 8px;border-radius:4px">\n            <i class="fas fa-crosshairs" style="margin-right:2px"></i>设为基准\n          </span>\n        </div>\n        <button class="btn-o" onclick="addRow()">\n          <i class="fas fa-plus"></i> 添加\n        </button>\n      </div>\n      <div class="tbl-wrap">\n        <table class="ct">\n          <thead>\n            <tr>\n              <th style="width:28px">#</th>\n              <th style="width:66px">角色</th>\n              <th style="min-width:150px">物质名称</th>\n              <th style="width:76px">分子量</th>\n              <th style="width:100px">当量</th>\n<th style="width:100px">纯度</th>\n\n              <th style="width:82px">质量</th>\n              <th style="width:84px">摩尔量</th>\n              <th style="width:76px">浓度</th>\n              <th style="width:76px">计算体积</th>\n              <th style="width:76px">体积比</th>\n              <th style="width:76px">溶剂体积</th>\n              <th style="width:56px">操作</th>\n            </tr>\n          </thead>\n          <tbody id="tbody"></tbody>\n        </table>\n      </div>\n      <div id="structPreview" class="struct-row" style="display:none"></div>\n    </section>\n\n  <section class="dpi-panel">\n  <i class="fas fa-sliders-h" style="color:var(--accent);font-size:13px"></i>\n  <label>PDF 中文渲染分辨率</label>\n  <input type="range" id="dpiSlider" min="96" max="600" value="288" step="12" oninput="updateDpiLabel(this.value)">\n  <span class="dpi-val" id="dpiLabel">288 DPI</span>\n</section>\n<section class="font-panel" id="fontPanel">\n  <i class="fas fa-font" style="color:var(--accent);font-size:13px"></i>\n  <label>PDF字体</label>\n  <span class="font-status" id="fontStatus">\n    <i class="fas fa-circle" style="font-size:6px"></i>\n    未导入(图片渲染)\n  </span>\n  <span class="font-hint" id="fontHint"></span>\n  <button class="btn-o" onclick="document.getElementById(\'fontFileInput\').click()" style="padding:5px 10px;font-size:11px">\n    <i class="fas fa-file-upload"></i> 导入字体\n  </button>\n  <button class="btn-i dng" id="removeFontBtn" onclick="removePdfFont()" style="display:none" title="移除已导入的字体">\n    <i class="fas fa-times"></i>\n  </button>\n  <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" style="display:none" onchange="handleFontFileSelect(event)">\n</section>\n<section style="display:flex;gap:10px;flex-wrap:wrap">\n\n                           <button class="btn-a" onclick="calculate()">\n                <i class="fas fa-calculator"></i> 计算投料\n            </button>\n            <button class="btn-a" onclick="reverseCalculate()" style="background:linear-gradient(135deg,#f59e0b,#d97706)">\n                <i class="fas fa-exchange-alt"></i> 反向计算当量\n            </button>\n            <button class="btn-a" onclick="batchQuery()" style="background:linear-gradient(135deg,#3b82f6,#2563eb)">\n                <i class="fas fa-search"></i> 一键检索\n            </button>\n                <button class="btn-a" onclick="copyTemplate()" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">\n                    <i class="fas fa-copy"></i> 复制模板\n                </button>\n                <button class="btn-a" onclick="downloadPDF()" style="background:linear-gradient(135deg,#ef4444,#dc2626)">\n                    <i class="fas fa-file-pdf"></i> 下载PDF\n                </button>\n                <button class="btn-o" onclick="deleteCurrent()" style="margin-left:auto;border-color:rgba(239,68,68,0.15);color:var(--danger)">\n                    <i class="fas fa-trash-alt"></i> 删除反应\n                </button>\n            </section>\n\n  </div>\n\n  <!-- 导出弹窗 -->\n  <div class="modal-overlay" id="exportModal">\n    <div class="modal-box">\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">\n        <h3 style="font-weight:700;font-size:16px">\n          <i class="fas fa-code" style="color:var(--accent);margin-right:6px"></i>导出数据\n        </h3>\n        <button class="btn-i" onclick="closeModal(\'exportModal\')">\n          <i class="fas fa-times"></i>\n        </button>\n      </div>\n      <textarea id="exportText" readonly></textarea>\n      <div style="display:flex;gap:8px;margin-top:12px">\n        <button class="btn-a" onclick="copyExport()">\n          <i class="fas fa-copy"></i> 复制代码\n        </button>\n        <button class="btn-o" onclick="downloadExport()">\n          <i class="fas fa-download"></i> 下载 .json\n        </button>\n      </div>\n    </div>\n  </div>\n\n  <!-- 导入弹窗 -->\n  <div class="modal-overlay" id="importModal">\n    <div class="modal-box">\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">\n        <h3 style="font-weight:700;font-size:16px">\n          <i class="fas fa-file-import" style="color:var(--accent);margin-right:6px"></i>导入数据\n        </h3>\n        <button class="btn-i" onclick="closeModal(\'importModal\')">\n          <i class="fas fa-times"></i>\n        </button>\n      </div>\n      <div class="file-drop" id="fileDrop" onclick="document.getElementById(\'fileInput\').click()">\n        <i class="fas fa-cloud-upload-alt" style="font-size:28px;color:var(--muted);margin-bottom:8px;display:block"></i>\n        <p style="font-size:13px;color:var(--muted)">点击选择或拖拽文件到此处</p>\n        <p style="font-size:11px;color:var(--muted);margin-top:4px;opacity:.7">支持 .json, .csv 格式</p>\n        <input type="file" id="fileInput" accept=".json,.csv" style="display:none" onchange="handleFileSelect(event)">\n      </div>\n      <div style="margin:14px 0;display:flex;align-items:center;gap:10px">\n        <div style="flex:1;height:1px;background:var(--border)"></div>\n        <span style="font-size:11px;color:var(--muted)">或粘贴 JSON 代码</span>\n        <div style="flex:1;height:1px;background:var(--border)"></div>\n      </div>\n      <textarea id="importText" placeholder=\'粘贴 JSON 数据或与导出到表格模板格式相同的数据（兼容部分数据缺失）例如：\n      名称	质量\n乙酸	2.0000 g\n乙醇	1.5343 g\n乙酸乙酯	2.9343 g...\'></textarea>\n      <div style="display:flex;gap:8px;margin-top:12px">\n        <button class="btn-a" onclick="doImport()">\n          <i class="fas fa-check"></i> 确认导入\n        </button>\n        <button class="btn-o" onclick="closeModal(\'importModal\')">取消</button>\n      </div>\n    </div>\n  </div>\n\n  <!-- 确认弹窗 -->\n  <div class="modal-overlay" id="confirmModal">\n    <div class="modal-box" style="max-width:400px;text-align:center">\n      <div style="margin-bottom:16px">\n        <i class="fas fa-exclamation-triangle" style="font-size:48px;color:var(--danger)"></i>\n      </div>\n      <h3 style="font-weight:700;font-size:18px;margin-bottom:8px" id="confirmTitle">确认操作</h3>\n      <p style="color:var(--muted);font-size:13px;margin-bottom:20px" id="confirmMessage">此操作不可恢复，确定要继续吗？</p>\n      <div style="display:flex;gap:8px;justify-content:center">\n        <button class="btn-o" onclick="closeModal(\'confirmModal\')">取消</button>\n        <button class="btn-a" id="confirmBtn" style="background:var(--danger)">确认</button>\n      </div>\n    </div>\n  </div>\n<!-- 模板弹窗 -->\n<div class="modal-overlay" id="templateModal">\n <div class="modal-box" style="max-width:520px">\n <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">\n <h3 style="font-weight:700;font-size:16px">\n <i class="fas fa-clipboard-list" style="color:#8b5cf6;margin-right:6px"></i>投料模板 \n </h3>\n <button class="btn-i" onclick="closeModal(\'templateModal\')">\n <i class="fas fa-times"></i>\n </button>\n </div>\n <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6">\n 格式：name，（m，eq，mol）类型 — 纯文字，方便粘贴到实验记录\n </div>\n <textarea id="templateText" readonly style="font-family:\'JetBrains Mono\',monospace;font-size:12px;line-height:2;min-height:160px;background:rgba(139,92,246,0.04);border-color:rgba(139,92,246,0.15)"></textarea>\n <div style="display:flex;gap:8px;margin-top:12px">\n <button class="btn-a" onclick="doCopyTemplate()" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">\n <i class="fas fa-copy"></i> 复制到剪贴板\n </button>\n <button class="btn-a" onclick="copyAsTable()" style="background:linear-gradient(135deg,#10b981,#059669)">\n <i class="fas fa-table"></i> 复制到表格\n </button>\n      </div>\n    </div>\n  </div>\n  <!-- 批量导出PDF弹窗 -->\n  <div class="modal-overlay" id="batchPdfModal">\n    <div class="modal-box" style="max-width:600px">\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">\n        <h3 style="font-weight:700;font-size:16px">\n          <i class="fas fa-file-pdf" style="color:#ef4444;margin-right:6px"></i>批量导出PDF\n        </h3>\n        <button class="btn-i" onclick="closeModal(\'batchPdfModal\')">\n          <i class="fas fa-times"></i>\n        </button>\n      </div>\n      <div style="display:flex;justify-content:space-between;margin-bottom:10px">\n        <button class="btn-o" onclick="batchSelectAll(true)" style="font-size:11px;padding:4px 10px">全选</button>\n        <button class="btn-o" onclick="batchSelectAll(false)" style="font-size:11px;padding:4px 10px">取消全选</button>\n      </div>\n      <div id="batchPdfList" style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:14px"></div>\n      <button class="btn-a" onclick="doBatchDownloadPDF()" style="background:linear-gradient(135deg,#ef4444,#dc2626);width:100%;justify-content:center">\n        <i class="fas fa-download"></i> 生成多页PDF (<span id="batchPdfSelectedCount">0</span>)\n      </button>\n    </div>\n  </div>\n</div>\n<script>\n\n/* ========== 全局状态 ========== */\nvar STORE_KEY = \'stoich_lab_reactions\';\nvar allReactions = [];\nvar currentId = null;\nvar rows = [];\nvar nid = 1;\nvar baseId = null;\nvar timers = {};\nvar autoSaveTimer = null;\nvar searchQuery = \'\';\nvar massUnitFactor = 1;\nvar lastCalcTime = null;\nvar curSamples = [];\n\nfunction getCurrentDpi() {\n  return parseInt(document.getElementById(\'dpiSlider\').value) || 288;\n}\nfunction updateDpiLabel(val) {\n  document.getElementById(\'dpiLabel\').textContent = val + \' DPI\';\n}\n/* ========== PDF字体管理 ========== */\n\n/* --- IndexedDB 操作封装 --- */\nvar FONT_DB_NAME = \'StoichFontDB\';\nvar FONT_DB_VERSION = 1;\nvar FONT_DB_STORE = \'fonts\';\n\nfunction openFontDB() {\n    return new Promise(function(resolve, reject) {\n        var request = indexedDB.open(FONT_DB_NAME, FONT_DB_VERSION);\n        request.onupgradeneeded = function(e) {\n            var db = e.target.result;\n            if (!db.objectStoreNames.contains(FONT_DB_STORE)) {\n                db.createObjectStore(FONT_DB_STORE);\n            }\n        };\n        request.onsuccess = function(e) {\n            resolve(e.target.result);\n        };\n        request.onerror = function(e) {\n            reject(e.target.error);\n        };\n    });\n}\n\nasync function saveFontToIDB(fileName, base64) {\n    var displayName = fileName.replace(/\\.[^.]+$/, \'\');\n    if (displayName.length > 30) {\n        displayName = displayName.substring(0, 27) + \'...\';\n    }\n    var fontData = {\n        fileName: fileName,\n        displayName: displayName,\n        base64: base64,\n        savedAt: Date.now()\n    };\n    try {\n        var db = await openFontDB();\n        var tx = db.transaction(FONT_DB_STORE, \'readwrite\');\n        var store = tx.objectStore(FONT_DB_STORE);\n        store.put(fontData, \'current_font\');\n        return new Promise(function(resolve, reject) {\n            tx.oncomplete = function() { resolve(true); };\n            tx.onerror = function(e) { reject(e.target.error); };\n        });\n    } catch (e) {\n        console.error(\'IndexedDB 保存字体失败:\', e);\n        return false;\n    }\n}\n\nasync function loadFontFromIDB() {\n    try {\n        var db = await openFontDB();\n        var tx = db.transaction(FONT_DB_STORE, \'readonly\');\n        var store = tx.objectStore(FONT_DB_STORE);\n        var request = store.get(\'current_font\');\n        return new Promise(function(resolve, reject) {\n            request.onsuccess = function() {\n                resolve(request.result || null);\n            };\n            request.onerror = function(e) {\n                reject(e.target.error);\n            };\n        });\n    } catch (e) {\n        console.error(\'IndexedDB 读取字体失败:\', e);\n        return null;\n    }\n}\n\nasync function removeFontFromIDB() {\n    try {\n        var db = await openFontDB();\n        var tx = db.transaction(FONT_DB_STORE, \'readwrite\');\n        var store = tx.objectStore(FONT_DB_STORE);\n        store.delete(\'current_font\');\n        return new Promise(function(resolve, reject) {\n            tx.oncomplete = function() { resolve(true); };\n            tx.onerror = function(e) { reject(e.target.error); };\n        });\n    } catch (e) {\n        console.error(\'IndexedDB 删除字体失败:\', e);\n        return false;\n    }\n}\n\nvar FONT_STORE_KEY = \'stoich_pdf_font_v2\';\n\nvar pdfFontLoaded = false;\nvar pdfFontFamilyName = \'StoichCustomFont\';\nvar pdfFontFileName = \'custom_font.ttf\';\nvar pdfFontDisplayName = \'\';\nvar pdfFontBase64 = \'\';\n\n/* 十六进制颜色转RGB数组 */\nfunction hexToRgb(hex) {\n  if (!hex) return [30, 30, 30];\n  hex = hex.replace(\'#\', \'\');\n  if (hex.length === 3) {\n    hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];\n  }\n  return [\n    parseInt(hex.substring(0, 2), 16) || 0,\n    parseInt(hex.substring(2, 4), 16) || 0,\n    parseInt(hex.substring(4, 6), 16) || 0\n  ];\n}\n/* 从 IndexedDB 加载字体（兼容旧版 localStorage 数据迁移） */\nasync function loadPdfFont() {\n    try {\n        /* 优先从 IndexedDB 加载 */\n        var data = await loadFontFromIDB();\n        if (data && data.base64 && data.fileName && data.displayName) {\n            pdfFontBase64 = data.base64;\n            pdfFontFileName = data.fileName;\n            pdfFontDisplayName = data.displayName;\n            pdfFontLoaded = true;\n            updateFontStatusUI();\n            return;\n        }\n        /* 兼容：如果 IndexedDB 没有数据，尝试从旧版 localStorage 迁移 */\n        var stored = localStorage.getItem(FONT_STORE_KEY);\n        if (stored) {\n            var oldData = JSON.parse(stored);\n            if (oldData && oldData.base64 && oldData.fileName && oldData.displayName) {\n                var migrated = await saveFontToIDB(oldData.fileName, oldData.base64);\n                if (migrated) {\n                    pdfFontBase64 = oldData.base64;\n                    pdfFontFileName = oldData.fileName;\n                    pdfFontDisplayName = oldData.displayName;\n                    pdfFontLoaded = true;\n                    localStorage.removeItem(FONT_STORE_KEY);\n                }\n            }\n        } else {\n            pdfFontLoaded = false;\n        }\n    } catch (e) {\n        pdfFontLoaded = false;\n        console.error(\'加载字体失败:\', e);\n    }\n    updateFontStatusUI();\n}\n/* 保存字体到 IndexedDB */\nasync function savePdfFont(fileName, base64) {\n    try {\n        var saved = await saveFontToIDB(fileName, base64);\n        if (saved) {\n            var displayName = fileName.replace(/\\.[^.]+$/, \'\');\n            if (displayName.length > 30) {\n                displayName = displayName.substring(0, 27) + \'...\';\n            }\n            pdfFontBase64 = base64;\n            pdfFontFileName = fileName;\n            pdfFontDisplayName = displayName;\n            pdfFontLoaded = true;\n            updateFontStatusUI();\n        } else {\n            toast(\'字体保存失败，请检查浏览器存储权限\', \'err\');\n            pdfFontLoaded = false;\n            updateFontStatusUI();\n        }\n    } catch (e) {\n        toast(\'字体保存失败: \' + e.message, \'err\');\n        pdfFontLoaded = false;\n        updateFontStatusUI();\n    }\n}\n/* 移除已保存的字体 */\nasync function removePdfFont() {\n    try {\n        await removeFontFromIDB();\n        localStorage.removeItem(FONT_STORE_KEY);\n    } catch (e) {}\n    pdfFontBase64 = \'\';\n    pdfFontFileName = \'custom_font.ttf\';\n    pdfFontDisplayName = \'\';\n    pdfFontLoaded = false;\n    updateFontStatusUI();\n    toast(\'字体已移除，PDF将使用图片渲染中文\', \'inf\');\n}\n\n/* 更新字体状态UI显示 */\nfunction updateFontStatusUI() {\n  var statusEl = document.getElementById(\'fontStatus\');\n  var removeBtn = document.getElementById(\'removeFontBtn\');\n  var hintEl = document.getElementById(\'fontHint\');\n  if (!statusEl) return;\n  if (pdfFontLoaded && pdfFontDisplayName) {\n    statusEl.innerHTML = \'<i class="fas fa-check-circle" style="font-size:10px"></i>\' + esc(pdfFontDisplayName);\n    statusEl.className = \'font-status loaded\';\n    if (removeBtn) removeBtn.style.display = \'inline-flex\';\n    if (hintEl) hintEl.textContent = \'已启用原生文字渲染\';\n  } else {\n    statusEl.innerHTML = \'<i class="fas fa-circle" style="font-size:6px"></i>未导入(图片渲染)\';\n    statusEl.className = \'font-status\';\n    if (removeBtn) removeBtn.style.display = \'none\';\n    if (hintEl) hintEl.textContent = \'\';\n  }\n}\n\n/* 处理字体文件选择 */\nfunction handleFontFileSelect(event) {\n  var file = event.target.files[0];\n  if (!file) return;\n  var ext = \'.\' + file.name.split(\'.\').pop().toLowerCase();\n  var validExts = [\'.ttf\', \'.otf\', \'.woff\', \'.woff2\'];\n  if (validExts.indexOf(ext) === -1) {\n    toast(\'不支持的字体格式，请选择 TTF/OTF/WOFF/WOFF2 文件\', \'err\');\n    event.target.value = \'\';\n    return;\n  }\n  if (file.size > 20 * 1024 * 1024) {\n    toast(\'字体文件超过20MB，请选择更小的字体文件\', \'err\');\n    event.target.value = \'\';\n    return;\n  }\n  if (file.size > 4 * 1024 * 1024) {\n    toast(\'字体文件较大(\' + (file.size / 1024 / 1024).toFixed(1) + \'MB)，可能超出本地存储限制\', \'inf\');\n  }\n  toast(\'正在读取字体文件...\', \'inf\');\n  var reader = new FileReader();\n     reader.onload = async function(e) {\n        var dataUrl = e.target.result;\n        var base64Part = dataUrl.split(\',\')[1];\n        if (!base64Part) {\n            toast(\'字体文件解析失败\', \'err\');\n            return;\n        }\n        await savePdfFont(file.name, base64Part);\n        if (pdfFontLoaded) {\n            toast(\'字体导入成功: \' + file.name + \' (\' + (file.size / 1024).toFixed(0) + \'KB)\', \'ok\');\n        }\n    };\n\n  reader.onerror = function() {\n    toast(\'字体文件读取失败\', \'err\');\n  };\n  reader.readAsDataURL(file);\n  event.target.value = \'\';\n}\n\n/* 将已加载的字体注册到jsPDF文档实例 */\nfunction registerFontToDoc(doc) {\n  if (!pdfFontLoaded || !pdfFontBase64 || !pdfFontFileName) return false;\n  try {\n    doc.addFileToVFS(pdfFontFileName, pdfFontBase64);\n    doc.addFont(pdfFontFileName, pdfFontFamilyName, \'normal\', \'Identity-H\');\n    doc.addFont(pdfFontFileName, pdfFontFamilyName, \'bold\', \'Identity-H\');\n    doc.addFont(pdfFontFileName, pdfFontFamilyName, \'italic\', \'Identity-H\');\n    doc.addFont(pdfFontFileName, pdfFontFamilyName, \'bolditalic\', \'Identity-H\');\n    doc.setFont(pdfFontFamilyName, \'normal\');\n    return true;\n  } catch (e) {\n    console.error(\'字体注册到PDF文档失败:\', e);\n    return false;\n  }\n}\n\n/* ========== 补全缺失的 fetchWikidataInfo 函数 ========== */\nasync function fetchWikidataInfo(query) {\n  if (!query) return null;\n  try {\n    var enName = await fetchEnglishNameFromWikidata(query);\n    if (!enName) return null;\n    var formula = \'\';\n    var mw = 0;\n    try {\n      formula = await fetchCactusFormula(enName) || \'\';\n    } catch (fe) {}\n    try {\n      var mwStr = await fetchMolWeightFromAPI(enName);\n      if (mwStr) mw = parseFloat(mwStr) || 0;\n    } catch (me) {}\n    return {\n      nameEN: enName,\n      nameCN: query,\n      formula: formula,\n      mw: mw\n    };\n  } catch (e) {\n    return null;\n  }\n}\n\n/* ========== 结构式白背景裁剪 ========== */\nfunction trimWhitespace(img) {\n  var w = img.naturalWidth, h = img.naturalHeight;\n  if (w < 2 || h < 2) return null;\n  var c = document.createElement(\'canvas\');\n  c.width = w; c.height = h;\n  var ctx = c.getContext(\'2d\');\n  ctx.drawImage(img, 0, 0);\n  var data = ctx.getImageData(0, 0, w, h).data;\n  var hasTransparent = false;\n  for (var i = 3; i < data.length; i += 4) {\n    if (data[i] < 20) { hasTransparent = true; break; }\n  }\n  function isBg(idx) {\n    if (hasTransparent) return data[idx + 3] < 20;\n    var brightness = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];\n    return brightness > 248;\n  }\n  var top = 0, bottom = h - 1, left = 0, right = w - 1;\n  while (top < h) { var found = false; for (var x = 0; x < w; x++) { if (!isBg((top * w + x) * 4)) { found = true; break; } } if (found) break; top++; }\n  while (bottom > top) { var found = false; for (var x = 0; x < w; x++) { if (!isBg((bottom * w + x) * 4)) { found = true; break; } } if (found) break; bottom--; }\n  while (left < w) { var found = false; for (var y = top; y <= bottom; y++) { if (!isBg((y * w + left) * 4)) { found = true; break; } } if (found) break; left++; }\n  while (right > left) { var found = false; for (var y = top; y <= bottom; y++) { if (!isBg((y * w + right) * 4)) { found = true; break; } } if (found) break; right--; }\n  if (top >= bottom || left >= right) return null;\n  var pad = Math.max(20, Math.round(Math.min(right - left, bottom - top) * 0.06));\n  top = Math.max(0, top - pad); bottom = Math.min(h - 1, bottom + pad);\n  left = Math.max(0, left - pad); right = Math.min(w - 1, right + pad);\n  var cw = right - left + 1, ch = bottom - top + 1;\n  var tc = document.createElement(\'canvas\');\n  tc.width = cw; tc.height = ch;\n  tc.getContext(\'2d\').drawImage(c, left, top, cw, ch, 0, 0, cw, ch);\n  return tc.toDataURL(\'image/png\');\n}\n\n/* ========== 结构式加载后自动裁剪白边 ========== */\nfunction onStructImgLoad(img, onFail) {\n  var trimmed = trimWhitespace(img);\n  if (trimmed) {\n    img.onload = null; img.onerror = null;\n    img.src = trimmed;\n  } else if (onFail) {\n    onFail();\n  }\n}\n\n/* ========== 结构式图片URL（与库房保持一致） ========== */\nfunction cactusImg(name, size) {\n  size = size || \'5000px\';\n  if (!name) return \'\';\n  return \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/image?format=png&image_size=\' + size;\n}\n\n/* ========== 反应方程式HTML构建（加裁剪） ========== */\nfunction buildEquationHtml(reactants, products) {\n  if (!reactants.length && !products.length) return \'\';\n  var parts = [];\n  var arrowSrc = getArrowImage(64, \'#00d68f\');\n  reactants.forEach(function(r, i) {\n    var name = getDisplayName(r);\n    if (!name) return;\n    var coeff = (r.eq && r.eq !== 1) ? \'<span class="eq-coeff">\' + r.eq + \'</span>\' : \'\';\n    parts.push(\n      \'<span class="eq-item">\' + coeff +\n      \'<img class="sub-img" src="\' + cactusImg(name, \'small\') + \'" alt="\' + esc(name) + \'" \' +\n      \'loading="lazy" decoding="async" onload="onStructImgLoad(this,function(){this.style.display=\\\'none\\\'})" \' +\n      \'onerror="this.style.display=\\\'none\\\'">\' +\n      \'<span class="eq-name">\' + esc(name.length > 20 ? name.substring(0, 20) + \'\\u2026\' : name) + \'</span>\' +\n      \'</span>\'\n    );\n    if (i < reactants.length - 1) parts.push(\'<span class="eq-plus">+</span>\');\n  });\n  if (reacts.length && products.length) {\n    parts.push(\n        \'<span class="eq-sep"></span>\' +\n        \'<span style="color:var(--accent);font-size:22px;font-weight:300;letter-spacing:-2px;padding:0 6px">→</span>\' +\n        \'<span class="eq-sep"></span>\'\n    );\n}\n  products.forEach(function(r, i) {\n    var name = getDisplayName(r);\n    if (!name) return;\n    parts.push(\n      \'<span class="eq-item">\' +\n      \'<img class="sub-img" src="\' + cactusImg(name, \'small\') + \'" alt="\' + esc(name) + \'" \' +\n      \'loading="lazy" decoding="async" onload="onStructImgLoad(this,function(){this.style.display=\\\'none\\\'})" \' +\n      \'onerror="this.style.display=\\\'none\\\'">\' +\n      \'<span class="eq-name">\' + esc(name.length > 20 ? name.substring(0, 20) + \'\\u2026\' : name) + \'</span>\' +\n      \'</span>\'\n    );\n    if (i < products.length - 1) parts.push(\'<span class="eq-plus">+</span>\');\n  });\n  return parts.join(\'\');\n}\n\n/* ========== 编辑器结构式预览（加裁剪） ========== */\nfunction updateStructPreview() {\n  var box = document.getElementById(\'structPreview\');\n  var items = rows.filter(function(r) {\n    return r.nameIn.trim() && (r.nameEN || r.formula);\n  });\n  if (!items.length) { box.style.display = \'none\'; return; }\n  box.style.display = \'flex\';\n  box.innerHTML = items.map(function(r) {\n    var nm = getDisplayName(r);\n    return \'<div class="struct-card">\' +\n      \'<img src="\' + cactusImg(nm, \'small\') + \'" alt="\' + esc(nm) + \'" \' +\n      \'loading="lazy" decoding="async" \' +\n      \'onload="onStructImgLoad(this,function(){this.parentNode.style.display=\\\'none\\\'})" \' +\n      \'onerror="this.parentNode.style.display=\\\'none\\\'">\' +\n      \'<div class="sc-name">\' + esc(nm) + (r.nameCN ? \' (\' + esc(r.nameCN) + \')\' : \'\') + \'</div></div>\';\n  }).join(\'\');\n}\n\n/* ========== 生成箭头图片（Canvas绘制） ========== */\nvar arrowImgCache = {};\nfunction getArrowImage(height, color) {\n  height = height || 64;\n  color = color || \'#00d68f\';\n  var key = height + \'_\' + color;\n  if (arrowImgCache[key]) return arrowImgCache[key];\n  var w = Math.round(height * 1.2);\n  var canvas = document.createElement(\'canvas\');\n  canvas.width = w;\n  canvas.height = height;\n  var ctx = canvas.getContext(\'2d\');\n  var midY = height / 2;\n  var arrowTipX = w - 4;\n  var shaftStartX = 4;\n  var shaftEndX = arrowTipX - height * 0.28;\n  var headBaseX = shaftEndX;\n  var headHalfH = height * 0.32;\n  ctx.lineWidth = Math.max(2, height * 0.055);\n  ctx.lineCap = \'round\';\n  ctx.strokeStyle = color;\n  ctx.shadowColor = color;\n  ctx.shadowBlur = 6;\n  ctx.beginPath();\n  ctx.moveTo(shaftStartX, midY);\n  ctx.lineTo(shaftEndX, midY);\n  ctx.stroke();\n  ctx.shadowBlur = 0;\n  ctx.fillStyle = color;\n  ctx.beginPath();\n  ctx.moveTo(arrowTipX, midY);\n  ctx.lineTo(headBaseX, midY - headHalfH);\n  ctx.lineTo(headBaseX, midY + headHalfH);\n  ctx.closePath();\n  ctx.fill();\n  var dataURL = canvas.toDataURL(\'image/png\');\n  arrowImgCache[key] = dataURL;\n  return dataURL;\n}\n\n\n/* ========== 本地化学词典 ========== */\nvar DICT = {\n  \'水\': \'water\', \'乙醇\': \'ethanol\', \'甲醇\': \'methanol\', \'丙酮\': \'acetone\',\n  \'乙醚\': \'diethyl ether\', \'二氯甲烷\': \'dichloromethane\', \'氯仿\': \'chloroform\',\n  \'甲苯\': \'toluene\', \'苯\': \'benzene\', \'四氢呋喃\': \'tetrahydrofuran\',\n  \'THF\': \'tetrahydrofuran\', \'N,N-二甲基甲酰胺\': \'N,N-dimethylformamide\',\n  \'DMF\': \'N,N-dimethylformamide\', \'二甲基亚砜\': \'dimethyl sulfoxide\',\n  \'DMSO\': \'dimethyl sulfoxide\', \'乙酸乙酯\': \'ethyl acetate\',\n  \'正己烷\': \'n-hexane\', \'石油醚\': \'petroleum ether\',\n  \'碳酸钠\': \'sodium carbonate\', \'碳酸氢钠\': \'sodium bicarbonate\',\n  \'氯化钠\': \'sodium chloride\', \'硫酸钠\': \'sodium sulfate\',\n  \'硫酸镁\': \'magnesium sulfate\', \'无水硫酸钠\': \'anhydrous sodium sulfate\',\n  \'氢氧化钠\': \'sodium hydroxide\', \'氢氧化钾\': \'potassium hydroxide\',\n  \'盐酸\': \'hydrochloric acid\', \'硫酸\': \'sulfuric acid\', \'硝酸\': \'nitric acid\',\n  \'醋酸\': \'acetic acid\', \'乙酸\': \'acetic acid\', \'冰醋酸\': \'glacial acetic acid\',\n  \'氨水\': \'aqueous ammonia\', \'三乙胺\': \'triethylamine\', \'吡啶\': \'pyridine\',\n  \'DMAP\': \'4-dimethylaminopyridine\', \'碘\': \'iodin
