';\n	var prodAppearEn = (data && data.prodAppearEn) || \'\';\n	var prodAmountDetail = (data && data.prodAmountDetail) || \'\';\n	var showCustomAppear = prodAppear === \'__custom__\';\n	var html = \'\';\n	html += \'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">\';\n	html += \'<span class="badge \' + ti.cls + \'">\' + ti.zh + \'</span>\';\n	html += \'<button class="btn btn-sm btn-danger" onclick="removeEl(\\\'rg-\' + id + \'\\\')">删除</button>\';\n	html += \'</div>\';\n	html += \'<div class="reagent-row">\';\n	html += \'<input type="text" placeholder="名称 / Name" data-field="name">\';\n	if (!isProduct) {\n		html += \'<input type="text" placeholder="用量" data-field="amount">\';\n		html += \'<select data-field="unit">\';\n		html += UNITS.map(function(u) { return \'<option value="\' + u + \'">\' + u + \'</option>\'; }).join(\'\');\n		html += \'</select>\';\n	} else {\n		html += \'<div style="display:none"><input type="text" data-field="amount"><select data-field="unit"></select></div>\';\n	}\n	html += \'<select data-field="type" onchange="onTypeChange(this,\' + id + \')">\';\n	html += TYPES.map(function(t) { return \'<option value="\' + t.v + \'"\' + (t.v === type ? \' selected\' : \'\') + \'>\' + t.zh + \'</option>\'; }).join(\'\');\n	html += \'</select>\';\n	html += \'</div>\';\n	if (!isProduct) {\n		html += \'<div class="amount-detail-row">\';\n		html += \'<label>详细用量</label>\';\n		html += \'<input type="text" placeholder="如：1.06 g，1 eq.，10 mmol（留空则使用上方用量）" data-field="amountDetail">\';\n		html += \'</div>\';\n	}\n	html += \'<div class="reagent-sub" id="rg-feed-\' + id + \'" style="display:\' + (type === \'reagent\' ? \'grid\' : \'none\') + \'">\';\n	html += \'<label>投料方式</label>\';\n	html += \'<select data-field="feedMethod" onchange="onFeedChange(this,\' + id + \')">\';\n	html += Object.keys(FEEDS).map(function(k) { return \'<option value="\' + k + \'">\' + FEEDS[k].zh + \'</option>\'; }).join(\'\');\n	html += \'</select>\';\n	html += \'<div id="rg-feed-params-\' + id + \'"></div>\';\n	html += \'</div>\';\n	html += \'<div class="product-sub" id="rg-prod-\' + id + \'" style="display:\' + (isProduct ? \'grid\' : \'none\') + \'">\';\n	/* ★★★ 新增：详细物料框 ★★★ */\n	html += \'<label>详细物料</label>\';\n	html += \'<input type="text" placeholder="如：15.96 g，2 eq.，56.54 mmol" data-field="prodAmountDetail" value="\' + prodAmountDetail + \'">\';\n	html += \'<label>理论产量(投料量)</label>\';\n	html += \'<input type="text" placeholder="如：10.0 g" data-field="theoreticalAmount" value="\' + ((data && data.theoreticalAmount) || \'\') + \'">\';\n	html += \'<label>实际产量</label>\';\n	html += \'<div style="display:flex;gap:6px">\';\n	html += \'<input type="text" placeholder="如：8.5 g" data-field="actualAmount" value="\' + ((data && data.actualAmount) || \'\') + \'">\';\n	html += \'<button class="btn btn-sm btn-accent" onclick="calcYield(\' + id + \')">计算产率</button></div>\';\n	/* ★★★ 新增：纯度框（默认100%不显示不体现） ★★★ */\n	html += \'<label>纯度</label>\';\n	html += \'<input type="text" placeholder="默认100%，不填不显示" data-field="prodPurity" value="\' + prodPurity + \'">\';\n	html += \'<label>粗品产率</label>\';\n	html += \'<input type="text" placeholder="未乘以纯度的值" data-field="prodYield" value="\' + prodYield + \'">\';\n	html += \'<label>产物性状</label>\';\n	html += \'<select data-field="prodAppearance" onchange="onProdAppearChange(this,\' + id + \')">\';\n	html += buildAppearanceOptions(prodAppear);\n	html += \'</select>\';\n	html += \'<div class="product-custom\' + (showCustomAppear ? \' show\' : \'\') + \'" id="rg-prod-custom-\' + id + \'">\';\n	html += \'<label>自定义性状(中)</label>\';\n	html += \'<input type="text" placeholder="中文描述" data-field="prodAppearZh" value="\' + prodAppearZh + \'">\';\n	html += \'<label>自定义性状(英)</label>\';\n	html += \'<input type="text" placeholder="English" data-field="prodAppearEn" value="\' + prodAppearEn + \'">\';\n	html += \'</div>\';\n	html += \'</div>\';\n	return html;\n}\n\n\n\nfunction setReagentData(id, data) {\n    var item = document.getElementById(\'rg-\' + id);\n    if (!item) return;\n    item.querySelector(\'[data-field="name"]\').value = data.name || \'\';\n    if (data.type !== \'product\') {\n        item.querySelector(\'[data-field="amount"]\').value = data.amount || \'\';\n        item.querySelector(\'[data-field="unit"]\').value = data.unit || \'g\';\n        var detailField = item.querySelector(\'[data-field="amountDetail"]\');\n        if (detailField) detailField.value = data.amountDetail || \'\';\n    }\n    item.querySelector(\'[data-field="type"]\').value = data.type || \'substrate\';\n    onTypeChange(item.querySelector(\'[data-field="type"]\'), id);\n    var feedMethodField = item.querySelector(\'[data-field="feedMethod"]\');\n    if (feedMethodField) {\n        feedMethodField.value = data.feedMethod || \'one_time\';\n        onFeedChange(feedMethodField, id);\n    }\n    if (data.feedParams) {\n        Object.keys(data.feedParams).forEach(function(k) {\n            var inp = item.querySelector(\'[data-fparam="\' + k + \'"]\');\n            if (inp) inp.value = data.feedParams[k];\n        });\n    }\n    		if (data.type === \'product\') {\n			/* ★★★ 新增：回填详细物料 ★★★ */\n			if (data.prodAmountDetail) {\n				var padField = item.querySelector(\'[data-field="prodAmountDetail"]\');\n				if (padField) padField.value = data.prodAmountDetail;\n			}\n			if (data.theoreticalAmount) {\n				var ta = item.querySelector(\'[data-field="theoreticalAmount"]\');\n				if (ta) ta.value = data.theoreticalAmount;\n			}\n			if (data.actualAmount) {\n				var aa = item.querySelector(\'[data-field="actualAmount"]\');\n				if (aa) aa.value = data.actualAmount;\n			}\n			/* ★★★ 新增：回填纯度 ★★★ */\n			if (data.prodPurity) {\n				var puField = item.querySelector(\'[data-field="prodPurity"]\');\n				if (puField) puField.value = data.prodPurity;\n			}\n			if (data.prodYield) {\n				var yf = item.querySelector(\'[data-field="prodYield"]\');\n				if (yf) yf.value = data.prodYield;\n			}\n			if (data.prodAppearance) {\n				var pa = item.querySelector(\'[data-field="prodAppearance"]\');\n				if (pa) {\n					pa.value = data.prodAppearance;\n					onProdAppearChange(pa, id);\n				}\n			}\n			if (data.prodAppearZh) {\n				var paz = item.querySelector(\'[data-field="prodAppearZh"]\');\n				if (paz) paz.value = data.prodAppearZh;\n			}\n			if (data.prodAppearEn) {\n				var pae = item.querySelector(\'[data-field="prodAppearEn"]\');\n				if (pae) pae.value = data.prodAppearEn;\n			}\n		}\n\n}\n\n\nfunction calcYield(id) {\nvar item = document.getElementById(\'rg-\' + id);\nvar theoInput = item.querySelector(\'[data-field="theoreticalAmount"]\');\nvar actInput = item.querySelector(\'[data-field="actualAmount"]\');\nvar yieldInput = item.querySelector(\'[data-field="prodYield"]\');\nvar theoVal = parseFloat(theoInput.value);\nvar actVal = parseFloat(actInput.value);\nif (!theoVal || !actVal || theoVal <= 0) {\nshowToast(\'请输入有效的理论和实际产量数值\');\nreturn;\n}\nvar yieldPercent = (actVal / theoVal) * 100;\nyieldInput.value = yieldPercent.toFixed(1) + \'%\';\nshowToast(\'产率计算完成：\' + yieldPercent.toFixed(1) + \'%\');\n}\nfunction onTypeChange(sel, id) {\nvar info = TYPES.find(function(t) { return t.v === sel.value; });\nvar item = sel.closest(\'.reagent-item\');\nvar badge = item.querySelector(\'.badge\');\nbadge.className = \'badge \' + info.cls;\nbadge.textContent = info.zh;\nitem.classList.toggle(\'type-product\', sel.value === \'product\');\nvar feedDiv = document.getElementById(\'rg-feed-\' + id);\nif (feedDiv) feedDiv.style.display = sel.value === \'reagent\' ? \'grid\' : \'none\';\nvar prodDiv = document.getElementById(\'rg-prod-\' + id);\nif (prodDiv) prodDiv.style.display = sel.value === \'product\' ? \'grid\' : \'none\';\n}\nfunction onProdAppearChange(sel, id) {\nvar customDiv = document.getElementById(\'rg-prod-custom-\' + id);\nif (customDiv) customDiv.classList.toggle(\'show\', sel.value === \'__custom__\');\n}\nfunction onFeedChange(sel, id) {\nvar feed = FEEDS[sel.value];\nvar pd = document.getElementById(\'rg-feed-params-\' + id);\nif (!feed.params.length) {\npd.innerHTML = \'\';\nreturn;\n}\npd.style.gridColumn = \'1/-1\';\npd.innerHTML = feed.params.map(function(p) {\nreturn \'<label>\' + p.l + \'</label><input type="text" placeholder="\' + p.p + \'" data-fparam="\' + p.k + \'">\';\n}).join(\'\');\n}\nfunction removeEl(id) {\nvar el = document.getElementById(id);\nif (el) el.remove();\n}\n/* ===== 导入反应物文本 ===== */\nfunction openImportDialog() {\ndocument.getElementById(\'importDialog\').classList.add(\'show\');\ndocument.getElementById(\'importText\').value = \'\';\ndocument.getElementById(\'importText\').focus();\n}\nfunction closeImportDialog() {\ndocument.getElementById(\'importDialog\').classList.remove(\'show\');\n}\n\n\n\nfunction parseReagentText(text) {\n    var lines = text.split(\'\\n\').map(function(l) { return l.trim(); }).filter(function(l) { return l; });\n    var results = [];\n    for (var i = 0; i < lines.length; i++) {\n        var line = lines[i];\n        /* 第一层：优先匹配中文全角括号（），避免被名称中的英文半角括号干扰 */\n        var match = line.match(/^(.+?)[，\\s]*（(.+?)）(.+?)$/);\n        if (!match) {\n            /* 第二层：降级尝试英文半角括号（仅当名称中不含半角括号时才能正确匹配） */\n            match = line.match(/^(.+?)[，\\s]*\\((.+?)\\)(.+?)$/);\n        }\n        if (!match) {\n            /* 第三层：混合括号（如英文左括号 + 中文右括号）\n               使用贪婪匹配 (.*) 让名称尽可能长，配合末尾类型关键词锚定，\n               确保匹配到最后一对括号，避免名称中的括号被误截断 */\n            match = line.match(/^(.*)[\\(（](.+?)[\\)）]\\s*(底物|试剂|溶剂|产物|反应物)\\s*$/);\n        }\n        if (!match) continue;\n        var name = match[1].trim();\n        var detail = match[2].trim();\n        var typeStr = match[3].trim();\n        var type = \'reagent\';\n        if (typeStr.indexOf(\'溶剂\') !== -1) type = \'solvent\';\n        else if (typeStr.indexOf(\'底物\') !== -1) type = \'substrate\';\n        else if (typeStr.indexOf(\'产物\') !== -1) type = \'product\';\n        else if (typeStr.indexOf(\'反应物\') !== -1 || typeStr.indexOf(\'试剂\') !== -1) type = \'reagent\';\n        var entry = { name: name, type: type, feedMethod: \'one_time\', feedParams: {}, amountDetail: detail };\n        if (type === \'product\') {\n            entry.prodAmountDetail = detail;\n            var yieldMatch = detail.match(/(\\d+\\.?\\d*\\s*%)/);\n            if (yieldMatch) {\n                entry.prodYield = yieldMatch[1];\n                detail = detail.replace(yieldMatch[0], \'\').replace(/[，,\\s]+$/, \'\').replace(/^[，,\\s]+/, \'\');\n            }\n            var massMatch = detail.match(/^([\\d.]+\\s*[a-zA-Zμ]+)[^a-zA-Z]?/);\n            if (massMatch) entry.theoreticalAmount = massMatch[1];\n            for (var j = 0; j < APPEARANCES.length; j++) {\n                var ap = APPEARANCES[j];\n                if (ap.zh !== \'__custom__\' && detail.indexOf(ap.zh) !== -1) {\n                    entry.prodAppearance = ap.zh;\n                    break;\n                }\n            }\n        } else {\n            var parts = detail.split(/[，,]/).map(function(s) { return s.trim(); });\n            var firstPart = parts[0] || \'\';\n            var amountMatch = firstPart.match(/^([\\d.]+)\\s*(.+)/);\n            entry.amount = amountMatch ? amountMatch[1] : \'\';\n            entry.unit = amountMatch ? amountMatch[2] : \'\';\n            if (entry.unit && UNITS.indexOf(entry.unit) === -1) {\n                var volMatch = detail.match(/([\\d.]+)\\s*(mL|L|μL)/);\n                if (volMatch) {\n                    entry.amount = volMatch[1];\n                    entry.unit = volMatch[2];\n                }\n            }\n        }\n        results.push(entry);\n    }\n    return results;\n}\n\n\n\nfunction doImportReagents() {\nvar text = document.getElementById(\'importText\').value.trim();\nif (!text) return;\nvar reagents = parseReagentText(text);\nif (reagents.length === 0) {\nshowToast(\'未识别到有效数据\');\nreturn;\n}\ndocument.getElementById(\'reagentList\').innerHTML = \'\';\nreagentId = 0;\nreagents.forEach(function(r) { addReagent(r); });\ncloseImportDialog();\nshowToast(\'成功导入 \' + reagents.length + \' 条数据\');\n}\n/* ===== 后处理搜索选择器 ===== */\nfunction buildWorkupOptionsHTML(id) {\nvar html = \'\';\nObject.keys(WCAT).forEach(function(catId) {\nvar catInfo = WCAT[catId];\nvar items = Object.keys(W).filter(function(k) { return W[k].cat === catId; });\nif (!items.length) return;\nhtml += \'<div class="search-group" data-cat="\' + catId + \'">\';\nhtml += \'<div class="search-group-label">\' + catInfo.zh + \' / \' + catInfo.en + \'</div>\';\nitems.forEach(function(k) {\nvar v = W[k];\nhtml += \'<div class="search-option" data-value="\' + k + \'" data-search="\' + v.zh + \' \' + v.en + \' \' + k + \'" onclick="selectWorkupOption(\' + id + \',\\\'\' + k + \'\\\')">\' + v.zh + \'<span class="so-en">\' + v.en + \'</span></div>\';\n});\nhtml += \'</div>\';\n});\nreturn html;\n}\nfunction addWorkup(data) {\nvar id = ++workupId;\nvar list = document.getElementById(\'workupList\');\nvar div = document.createElement(\'div\');\ndiv.className = \'workup-item\';\ndiv.id = \'wu-\' + id;\ndiv.innerHTML = \'<div class="workup-top">\' +\n\'<div class="search-select" id="ss-\' + id + \'">\' +\n\'<input type="text" placeholder="输入关键词搜索后处理步骤..." id="ss-input-\' + id + \'" onfocus="openWorkupDropdown(\' + id + \')" oninput="filterWorkupOptions(\' + id + \')">\' +\n\'<span class="ss-icon">&#9662;</span>\' +\n\'<div class="search-dropdown" id="ss-drop-\' + id + \'">\' + buildWorkupOptionsHTML(id) + \'</div>\' +\n\'</div>\' +\n\'<input type="hidden" data-field="type" id="ss-val-\' + id + \'">\' +\n\'<button class="btn btn-sm btn-danger" onclick="removeEl(\\\'wu-\' + id + \'\\\')">删除</button>\' +\n\'</div>\' +\n\'<div class="workup-params" id="wu-params-\' + id + \'"></div>\';\nlist.appendChild(div);\nif (data) setWorkupData(id, data);\n}\nfunction setWorkupData(id, data) {\nif (!data.type) return;\nvar def = W[data.type];\nif (!def) return;\ndocument.getElementById(\'ss-val-\' + id).value = data.type;\nvar input = document.getElementById(\'ss-input-\' + id);\ninput.value = def.zh + \' / \' + def.en;\ninput.style.color = \'var(--accent)\';\nonWorkupTypeChange(id, data.type);\nif (data.params) {\nObject.keys(data.params).forEach(function(k) {\nvar inp = document.querySelector(\'#wu-params-\' + id + \' [data-wparam="\' + k + \'"]\');\nif (inp) inp.value = data.params[k];\n});\n}\n}\nfunction openWorkupDropdown(id) {\nif (openDropdownId && openDropdownId !== id) closeWorkupDropdown(openDropdownId);\nopenDropdownId = id;\ndocument.getElementById(\'ss-drop-\' + id).classList.add(\'open\');\nfilterWorkupOptions(id);\n}\nfunction closeWorkupDropdown(id) {\nvar drop = document.getElementById(\'ss-drop-\' + id);\nif (drop) drop.classList.remove(\'open\');\nif (openDropdownId === id) openDropdownId = null;\n}\nfunction filterWorkupOptions(id) {\nvar input = document.getElementById(\'ss-input-\' + id);\nvar kw = input.value.trim().toLowerCase();\nvar drop = document.getElementById(\'ss-drop-\' + id);\nvar options = drop.querySelectorAll(\'.search-option\');\nvar groups = drop.querySelectorAll(\'.search-group\');\nvar anyVisible = false;\noptions.forEach(function(opt) {\nvar text = opt.dataset.search.toLowerCase();\nvar match = !kw || text.indexOf(kw) !== -1;\nopt.classList.toggle(\'hidden\', !match);\nif (match) anyVisible = true;\n});\ngroups.forEach(function(g) {\nvar visOpts = g.querySelectorAll(\'.search-option:not(.hidden)\');\ng.style.display = visOpts.length ? \'\' : \'none\';\n});\nvar noRes = drop.querySelector(\'.search-no-result\');\nif (!anyVisible) {\nif (!noRes) {\nnoRes = document.createElement(\'div\');\nnoRes.className = \'search-no-result\';\nnoRes.textContent = \'未找到匹配步骤\';\ndrop.appendChild(noRes);\n}\n} else {\nif (noRes) noRes.remove();\n}\n}\nfunction selectWorkupOption(id, val) {\nvar def = W[val];\ndocument.getElementById(\'ss-val-\' + id).value = val;\nvar input = document.getElementById(\'ss-input-\' + id);\ninput.value = def.zh + \' / \' + def.en;\ninput.style.color = \'var(--accent)\';\ncloseWorkupDropdown(id);\nonWorkupTypeChange(id, val);\n}\nfunction onWorkupTypeChange(id, val) {\nvar def = W[val];\nvar pd = document.getElementById(\'wu-params-\' + id);\nif (!def.params.length) {\npd.innerHTML = \'\';\nreturn;\n}\npd.innerHTML = def.params.map(function(p) {\nreturn \'<label>\' + p.l + \'</label><input type="text" placeholder="\' + p.p + \'" data-wparam="\' + p.k + \'">\';\n}).join(\'\');\n}\ndocument.addEventListener(\'click\', function(e) {\nif (openDropdownId === null) return;\nvar ss = document.getElementById(\'ss-\' + openDropdownId);\nif (ss && !ss.contains(e.target)) closeWorkupDropdown(openDropdownId);\n});\n/* ===== API Key 保存/恢复 ===== */\nfunction saveApiKey(provider, key) {\ntry {\nvar stored = JSON.parse(localStorage.getItem(\'chem_ai_keys\') || \'{}\');\nstored[provider] = key;\nlocalStorage.setItem(\'chem_ai_keys\', JSON.stringify(stored));\n} catch (e) {}\n}\nfunction loadApiKey(provider) {\ntry {\nvar stored = JSON.parse(localStorage.getItem(\'chem_ai_keys\') || \'{}\');\nreturn stored[provider] || \'\';\n} catch (e) {\nreturn \'\';\n}\n}\nfunction saveCustomApiSettings() {\ntry {\nvar obj = {\nurl: document.getElementById(\'customApiUrl\').value.trim(),\nmodel: document.getElementById(\'customModel\').value.trim()\n};\nlocalStorage.setItem(\'chem_custom_api\', JSON.stringify(obj));\n} catch (e) {}\n}\nfunction loadCustomApiSettings() {\ntry {\nvar obj = JSON.parse(localStorage.getItem(\'chem_custom_api\') || \'{}\');\nif (obj.url) document.getElementById(\'customApiUrl\').value = obj.url;\nif (obj.model) document.getElementById(\'customModel\').value = obj.model;\n} catch (e) {}\n}\nfunction saveDeepseekModel() {\ntry {\nlocalStorage.setItem(\'chem_ds_model\', document.getElementById(\'deepseekModel\').value);\n} catch (e) {}\n}\nfunction loadDeepseekModel() {\ntry {\nvar m = localStorage.getItem(\'chem_ds_model\');\nif (m) document.getElementById(\'deepseekModel\').va ht: 16px;\n  border-radius: 8px;\n  background: var(--border);\n  position: relative;\n  transition: background .2s;\n  flex-shrink: 0;\n}\n.source-chip .toggle::after {\n  content: \'\';\n  position: absolute;\n  top: 2px;\n  left: 2px;\n  width: 12px;\n  height: 12px;\n  border-radius: 50%;\n  background: var(--muted);\n  transition: all .2s;\n}\n.source-chip .toggle.on { background: var(--accent) }\n.source-chip .toggle.on::after { left: 14px; background: #fff }\n\n\n    /* ====== 修改部分：历史和数据管理布局重调 ====== */\n    /* 调整底部区域为单列紧凑布局，放在搜索栏下方 */\n    .bottom-section {\n        margin-top: 16px;\n        margin-bottom: 20px;\n        display: flex;\n        flex-direction: column;\n        gap: 12px;\n        max-width: 720px; /* 与搜索框对齐 */\n        margin-left: auto;\n        margin-right: auto;\n        width: 100%;\n    }\n\n    .bottom-card {\n        background: var(--card);\n        border: 1px solid var(--border);\n        border-radius: var(--radius);\n        padding: 12px 16px;\n    }\n\n    .bottom-card h4 {\n        font-size: 12px;\n        color: var(--fg2);\n        margin-bottom: 8px;\n        display: flex;\n        align-items: center;\n        gap: 6px;\n        font-weight: 600;\n    }\n\n    .bottom-card h4 i {\n        color: var(--accent);\n        font-size: 11px;\n    }\n\n    .history-list {\n        display: flex;\n        flex-wrap: wrap;\n        gap: 6px;\n    }\n\n    .history-item {\n        padding: 3px 10px;\n        background: var(--bg2);\n        border: 1px solid var(--border);\n        border-radius: 18px;\n        font-size: 11px;\n        color: var(--fg2);\n        cursor: pointer;\n        transition: all .2s;\n    }\n\n    .history-item:hover {\n        border-color: var(--accent);\n        color: var(--accent);\n    }\n\n    /* 数据管理：改为横向图标布局 */\n    .clear-btns {\n        display: flex;\n        flex-direction: row; /* 横向排列 */\n        justify-content: center; /* 居中 */\n        align-items: center;\n        gap: 16px; /* 图标间距 */\n    }\n\n    .clear-btn {\n        width: 42px;\n        height: 42px;\n        border-radius: 50%; /* 圆形图标 */\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        padding: 0;\n        background: var(--bg2);\n        border: 1px solid var(--border);\n        color: var(--fg2);\n        transition: all 0.2s;\n        position: relative;\n    }\n\n    .clear-btn:hover {\n        border-color: var(--err);\n        color: var(--err);\n        transform: translateY(-2px);\n        box-shadow: 0 4px 8px rgba(0,0,0,0.2);\n    }\n\n    .clear-btn i {\n        font-size: 16px;\n        width: auto; /* 重置宽度 */\n        text-align: center;\n    }\n\n    /* 隐藏原文字确认提示 */\n    .clear-btn .confirm {\n        display: none;\n    }\n\n    /* 确认状态样式：红圈+抖动 */\n    .clear-btn.confirming {\n        background: rgba(240,80,80,0.15);\n        border-color: var(--err);\n        color: var(--err);\n        animation: shake 0.3s;\n    }\n\n    @keyframes shake {\n        0%, 100% { transform: translateX(0); }\n        25% { transform: translateX(-3px); }\n        75% { transform: translateX(3px); }\n    }\n\n    .cache-info {\n        font-size: 11px;\n        color: var(--muted);\n        text-align: center;\n        margin-bottom: 10px;\n    }\n    .cache-info span {\n        color: var(--accent);\n        font-weight: 600;\n    }\n\n\n/* 搜索 */\n.search-section{margin-bottom:24px}\n.search-box{position:relative;max-width:720px;margin:0 auto}\n.search-box input{width:100%;padding:16px 120px 16px 48px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--fg);font-size:15px;font-family:\'Noto Sans SC\',sans-serif;outline:none;transition:all .3s}\n.search-box input::placeholder{color:var(--muted)}\n.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim),0 8px 32px rgba(0,0,0,0.3)}\n.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;transition:color .3s}\n.search-box input:focus~.search-icon{color:var(--accent)}\n.search-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:9px 22px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:var(--bg);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;font-family:\'Noto Sans SC\',sans-serif}\n.search-btn:hover{box-shadow:0 4px 20px rgba(0,232,144,0.3);transform:translateY(-50%) scale(1.03)}\n.search-btn:active{transform:translateY(-50%) scale(0.98)}\n.search-btn:disabled{opacity:0.5;cursor:not-allowed;transform:translateY(-50%)}\n.search-tips{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}\n.search-tips span{padding:4px 12px;border-radius:18px;font-size:11px;background:var(--accent-dim);color:var(--accent2);border:1px solid rgba(0,232,144,0.1);cursor:pointer;transition:all .2s}\n.search-tips span:hover{background:rgba(0,232,144,0.15);border-color:var(--accent)}\n\n/* 查询进度 */\n.progress-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;animation:fadeUp .3s ease}\n.progress-panel.active{display:block}\n.progress-title{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}\n.progress-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px}\n.progress-row .p-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}\n.progress-row .p-name{flex:1;color:var(--fg2);font-weight:500}\n.progress-row .p-status{font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}\n.progress-row .p-status.waiting{color:var(--muted)}\n.progress-row .p-status.running{color:var(--warn)}\n.progress-row .p-status.success{color:var(--accent)}\n.progress-row .p-status.fail{color:var(--err)}\n.progress-row .p-status.skipped{color:var(--muted);opacity:0.6}\n.progress-row .p-fields{font-size:10px;color:var(--muted);margin-left:8px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n\n/* 状态区 */\n.loading-state,.error-state,.empty-state{display:none;text-align:center}\n.loading-state.active,.error-state.active,.empty-state.active{display:block}\n.empty-state{padding:60px 0}\n.empty-mol{font-size:70px;margin-bottom:16px;opacity:0.1;color:var(--accent);font-family:\'JetBrains Mono\',monospace}\n.empty-state h3{color:var(--fg2);font-size:18px;margin-bottom:6px}\n.empty-state p{color:var(--muted);font-size:13px}\n.loading-state{padding:50px 0}\n.spinner{width:40px;height:40px;margin:0 auto 16px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}\n@keyframes spin{to{transform:rotate(360deg)}}\n.loading-state p{color:var(--muted);font-size:13px}\n.error-state{padding:50px 0}\n.error-icon{width:56px;height:56px;margin:0 auto 14px;border-radius:50%;background:rgba(240,80,80,0.1);display:flex;align-items:center;justify-content:center;color:var(--err);font-size:24px}\n.error-state h3{color:var(--fg);font-size:16px;margin-bottom:6px}\n.error-state p{color:var(--muted);font-size:13px;max-width:460px;margin:0 auto;line-height:1.6}\n.error-state .error-detail{font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--err);opacity:0.7;margin-top:10px;padding:10px 14px;background:rgba(240,80,80,0.06);border:1px solid rgba(240,80,80,0.15);border-radius:8px;word-break:break-all;text-align:left;max-width:460px;margin-left:auto;margin-right:auto}\n\n/* 结果 */\n.results{display:none}.results.active{display:block;animation:fadeUp .5s ease}\n/* 添加到 CSS 中 */\n.copy-icon {\n    margin-left: 6px;\n    cursor: pointer;\n    opacity: 0.4;\n    transition: opacity 0.2s, color 0.2s;\n    font-size: 0.8em;\n}\n\n.copy-icon:hover {\n    opacity: 1;\n    color: var(--accent);\n}\n\n.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}\n.info-card::before{content:\'\';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent)}\n.compound-names{margin-bottom:20px}\n.compound-names h2{font-size:26px;font-weight:900;margin-bottom:4px;color:var(--fg);line-height:1.3}\n.compound-names .en-name{font-size:16px;color:var(--fg2);font-weight:400;font-style:italic;margin-bottom:3px}\n.compound-names .cn-name{font-size:15px;color:var(--accent2);font-weight:500}\n.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}\n.info-item{padding:12px 14px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border);transition:border-color .2s}\n.info-item:hover{border-color:var(--border2)}\n.info-item .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:500}\n.info-item .value{font-size:14px;color:var(--fg);font-weight:600;font-family:\'JetBrains Mono\',monospace;word-break:break-all}\n.info-item .value.accent{color:var(--accent)}\n.source-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-left:6px;vertical-align:middle;border:1px solid}\n.source-tag[data-src="pubchem"]{color:#00e890;border-color:rgba(0,232,144,0.2);background:rgba(0,232,144,0.06)}\n.source-tag[data-src="nci"]{color:#4ecdc4;border-color:rgba(78,205,196,0.2);background:rgba(78,205,196,0.06)}\n.source-tag[data-src="wikidata"]{color:#a78bfa;border-color:rgba(167,139,250,0.2);background:rgba(167,139,250,0.06)}\n.source-tag[data-src="wikipedia"]{color:#f0a030;border-color:rgba(240,160,48,0.2);background:rgba(240,160,48,0.06)}\n.source-tag[data-src="fallback"]{color:var(--warn);border-color:rgba(240,160,48,0.2);background:rgba(240,160,48,0.06)}\n\n.structure-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}\n@media(max-width:768px){.structure-section{grid-template-columns:1fr}}\n.structure-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;min-height:260px;display:flex;flex-direction:column}\n.structure-card h3{font-size:13px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:7px;font-weight:500}\n.structure-card h3 i{color:var(--accent);font-size:13px}\n.structure-view{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);position:relative;overflow:hidden}\n.structure-view canvas,.structure-view img{max-width:100%;max-height:100%}\n.structure-placeholder{color:var(--muted);font-size:12px;text-align:center;padding:16px}\n.structure-placeholder i{font-size:32px;display:block;margin-bottom:8px;opacity:0.3}\n.smiles-display{font-family:\'JetBrains Mono\',monospace;font-size:14px;color:var(--accent);word-break:break-all;line-height:1.8;padding:10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);flex:1;display:flex;align-items:center}\n.copy-btn{padding:4px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;font-family:\'Noto Sans SC\',sans-serif}\n.copy-btn:hover{color:var(--accent);border-color:var(--accent)}\n\n.props-section{margin-bottom:20px}\n.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--fg)}\n.section-title i{color:var(--accent);font-size:15px}\n.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}\n@media(max-width:640px){.props-grid{grid-template-columns:1fr}}\n.prop-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);transition:all .2s}\n.prop-item:hover{border-color:var(--border2);background:var(--card2)}\n.prop-icon{width:32px;height:32px;border-radius:7px;flex-shrink:0;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:13px}\n.prop-content{flex:1;min-width:0}\n.prop-label{font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:500;display:flex;align-items:center;gap:4px}\n.prop-value{font-size:13px;color:var(--fg);line-height:1.5;word-break:break-word}\n.prop-value .unit{color:var(--muted);font-size:11px;margin-left:2px}\n\n.offline-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(240,160,48,0.1);color:var(--warn);border:1px solid rgba(240,160,48,0.15);margin-top:6px}\n.source-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;background:var(--accent-dim);color:var(--accent2);border:1px solid rgba(0,232,144,0.12);margin-top:6px}\n\n/* Toast */\n.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}\n.toast{padding:10px 18px;border-radius:9px;font-size:13px;background:var(--card2);border:1px solid var(--border);color:var(--fg);box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px}\n.toast.success{border-color:var(--accent)}.toast.success i{color:var(--accent)}\n.toast.error{border-color:var(--err)}.toast.error i{color:var(--err)}\n.toast.warn{border-color:var(--warn)}.toast.warn i{color:var(--warn)}\n@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}\n@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}\n::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}\n@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}\n/* 一键粘贴提示 */\n.paste-hint {\n    position: absolute;\n    left: 48px;\n    top: 50%;\n    transform: translateY(-50%);\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    padding: 5px 12px;\n    background: var(--accent-dim);\n    border: 1px solid rgba(0,232,144,0.15);\n    border-radius: 7px;\n    color: var(--accent2);\n    font-size: 12px;\n    cursor: pointer;\n    transition: all .25s;\n    pointer-events: auto;\n    z-index: 2;\n    white-space: nowrap;\n    animation: fadeUp .25s ease;\n}\n.paste-hint:hover {\n    background: rgba(0,232,144,0.15);\n    border-color: rgba(0,232,144,0.3);\n    color: var(--accent);\n}\n.paste-hint i {\n    font-size: 11px;\n}\n.paste-hint.hidden {\n    display: none;\n}\n\n\n</style>\n<style>\n:root {\n  --bg: #060a10;\n  --bg2: #0a1018;\n  --card: #101a28;\n  --card-h: #162236;\n  --bdr: #1c2c44;\n  --bdr2: #28405e;\n  --fg: #dce6f4;\n  --muted: #6882a6;\n  --dim: #3e5470;\n  --accent: #38bdf8;\n  --accent2: #7dd3fc;\n  --accent-bg: rgba(56,189,248,.1);\n  --danger: #ff5c5c;\n  --danger-bg: rgba(255,92,92,.1);\n  --warn: #f0a030;\n  --success: #22c55e;\n  --success-bg: rgba(34,197,94,.1);\n  --info: #38bdf8;\n  --info-bg: rgba(56,189,248,.1);\n  --text-primary: #f0f9ff;\n  --text-secondary: #94a3b8;\n  --surface-1: #0a1018;\n  --surface-2: #162236;\n  --surface-3: #28405e;\n  --shadow: rgba(0,0,0,.35);\n  --gradient-start: #38bdf8;\n  --gradient-end: #7dd3fc;\n  --highlight: #fbbf24;\n  --code-bg: #060c14;\n  --border-light: #162438;\n  --border-focus: #38bdf8;\n  --text-muted: #7890b0;\n  --text-dim: #4a6480;\n  --text-accent: #7dd3fc;\n  --text-danger: #ff7a7a;\n  --text-success: #4ade80;\n  --text-warn: #fbbf24;\n  --text-info: #60c5f8;\n  --surface-hover: #162236;\n  --surface-active: #1e2a42;\n  --overlay: rgba(0,0,0,.6);\n  --overlay-light: rgba(0,0,0,.3);\n  --tag-bg: rgba(56,189,248,.08);\n  --tag-text: #38bdf8;\n  --input-bg: #060a10;\n  --input-border: #1c2c44;\n  --input-focus: #38bdf8;\n  --scrollbar: #28405e;\n  --scrollbar-hover: #3a5880;\n  --selection: rgba(56,189,248,.2);\n}\n</style>\n</head>\n<body>\n<div class="bg-layer"></div>\n<div class="grid-overlay"></div>\n<div class="floating-mol">C&#8326;H&#8326;</div>\n<div class="floating-mol">NaCl</div>\n<div class="floating-mol">H&#8322;O</div>\n<div class="toast-container" id="toastContainer"></div>\n<div class="app">\n<header>\n  <div class="logo-icon"><i class="fas fa-flask"></i></div>\n  <h1>ChemQuery</h1>\n  <p>多源聚合化学物质查询 — 自动切换 / 字段合并 / 智能降级</p>\n</header>\n\n<!-- 数据源面板 -->\n<div class="source-panel" id="sourcePanel">\n  <div class="source-panel-header">\n    <!-- 修改：增加 onclick 和箭头图标 -->\n    <div class="source-panel-title" onclick="toggleSourcePanel()">\n      <i class="fas fa-chevron-down toggle-arrow" id="sourcePanelArrow"></i>\n      <i class="fas fa-layer-group"></i> 数据源配置\n    </div>\n    <div class="mode-switch">\n      <button class="mode-btn active" data-mode="auto" onclick="setMode(\'auto\')"><i class="fas fa-arrow-down-short-wide"></i> 自动切换</button>\n      <button class="mode-btn" data-mode="parallel" onclick="setMode(\'parallel\')"><i class="fas fa-grip"></i> 并行查询</button>\n    </div>\n  </div>\n  <div class="source-list" id="sourceList"></div>\n</div>\n\n    <!-- 搜索 -->\n    <section class="search-section">\n        <div class="search-box">\n            <input type="text" id="searchInput" placeholder="输入化学物质名称、CAS号或SMILES..." autocomplete="off" aria-label="化学物质搜索">\n            <!-- 新增：一键粘贴提示 -->\n            <div class="paste-hint hidden" id="pasteHint" onclick="pasteFromClipboard()">\n                <i class="fas fa-clipboard"></i> 点击粘贴剪贴板内容\n            </div>\n            <i class="fas fa-search search-icon"></i>\n            <button class="search-btn" id="searchBtn" onclick="doSearch()"><i class="fas fa-bolt"></i> 查询</button>\n        </div>\n        <div class="search-tips">\n            <span onclick="quickSearch(\'Ethanol\')">Ethanol</span>\n            <span onclick="quickSearch(\'Aspirin\')">Aspirin</span>\n            <span onclick="quickSearch(\'Caffeine\')">Caffeine</span>\n            <span onclick="quickSearch(\'7732-18-5\')">7732-18-5</span>\n            <span onclick="quickSearch(\'Acetone\')">Acetone</span>\n            <span onclick="quickSearch(\'CCO\')">CCO (SMILES)</span>\n        </div>\n    </section>\n\n    <!-- ====== 修改部分：历史 + 数据管理 (移动到搜索栏下方) ====== -->\n    <div class="bottom-section" id="bottomSection">\n        <!-- 搜索历史 -->\n        <div class="bottom-card" id="historyCard" style="display:none;">\n            <h4><i class="fas fa-clock-rotate-left"></i> 搜索历史</h4>\n            <div class="history-list" id="historyList"></div>\n        </div>\n        \n        <!-- 数据管理 -->\n        <div class="bottom-card">\n            <div class="cache-info">本地缓存: <span id="cacheCount">0</span> 条记录</div>\n            <div class="clear-btns">\n                <!-- 修改为圆形图标按钮 -->\n                <div class="clear-btn" id="btnClearHistory" onclick="handleClear(\'history\')" title="清除历史">\n                    <i class="fas fa-clock-rotate-left"></i>\n                </div>\n                <div class="clear-btn" id="btnClearCache" onclick="handleClear(\'cache\')" title="清除缓存">\n                    <i class="fas fa-box-archive"></i>\n                </div>\n                <div class="clear-btn" id="btnClearAll" onclick="handleClear(\'all\')" title="清除全部">\n                    <i class="fas fa-trash-can"></i>\n                </div>\n            </div>\n        </div>\n    </div>\n    <!-- ====== 修改结束 ====== -->\n\n    <!-- 查询进度 -->\n    <div class="progress-panel" id="progressPanel">\n        <div class="progress-title"><i class="fas fa-signal"></i> 查询进度</div>\n        <div id="progressRows"></div>\n    </div>\n\n<!-- 各状态区 -->\n<div class="empty-state" id="emptyState">\n  <div class="empty-mol">Ben</div>\n  <h3>输入关键词开始查询</h3>\n  <p>支持英文名、中文名、CAS号、SMILES，多数据源自动聚合</p>\n</div>\n<div class="loading-state" id="loadingState"><div class="spinner"></div><p>正在初始化查询...</p></div>\n<div class="error-state" id="errorState">\n  <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>\n  <h3 id="errorTitle">查询失败</h3>\n  <p id="errorMsg">请检查输入内容后重试</p>\n  <div class="error-detail" id="errorDetail" style="display:none;"></div>\n</div>\n\n<!-- 结果区 -->\n<div class="results" id="resultsSection">\n  <div class="info-card" id="infoCard"></div>\n  <div class="structure-section">\n    <div class="structure-card">\n      <h3><i class="fas fa-project-diagram"></i> 化学结构式</h3>\n      <div class="structure-view" id="structureView"><div class="structure-placeholder"><i class="fas fa-atom"></i>—</div></div>\n    </div>\n    <div class="structure-card">\n      <h3><i class="fas fa-code"></i> SMILES 表示</h3>\n      <div class="smiles-display" id="smilesDisplay">—</div>\n      <button class="copy-btn" onclick="copySmiles()" style="margin-top:8px;align-self:flex-end;"><i class="fas fa-copy"></i> 复制</button>\n    </div>\n  </div>\n  <div class="props-section" id="propsSection">\n    <div class="section-title"><i class="fas fa-list-check"></i> 理化性质</div>\n    <div class="props-grid" id="propsGrid"></div>\n  </div>\n</div>\n\n<!-- 底部：历史 + 数据管理 -->\n<div class="bottom-section" id="bottomSection" style="display:none;">\n  <div class="bottom-card" id="historyCard">\n    <h4><i class="fas fa-clock-rotate-left"></i> 搜索历史</h4>\n    <div class="history-list" id="historyList"></div>\n  </div>\n  <div class="bottom-card">\n    <h4><i class="fas fa-database"></i> 数据管理</h4>\n    <div class="cache-info">本地缓存: <span id="cacheCount">0</span> 条记录</div>\n    <div class="clear-btns">\n      <div class="clear-btn" id="btnClearHistory" onclick="handleClear(\'history\')">\n        <i class="fas fa-clock-rotate-left"></i> 清除搜索历史\n        <span class="confirm">点击确认</span>\n      </div>\n      <div class="clear-btn" id="btnClearCache" onclick="handleClear(\'cache\')">\n        <i class="fas fa-box-archive"></i> 清除查询缓存\n        <span class="confirm">点击确认</span>\n      </div>\n      <div class="clear-btn" id="btnClearAll" onclick="handleClear(\'all\')">\n        <i class="fas fa-trash-can"></i> 清除全部数据\n        <span class="confirm">点击确认</span>\n      </div>\n    </div>\n  </div>\n</div>\n</div>\n\n<script>\n// ========== 数据源配置 ==========\nconst API_SOURCES = [\n  { id:\'pubchem\', name:\'PubChem\', desc:\'最全面的化学数据库\', icon:\'fa-flask\', color:\'#00e890\', priority:1,\n    checkUrl:\'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/water/cids/TXT\',\n    fields:[\'cid\',\'molecularFormula\',\'molecularWeight\',\'exactMass\',\'canonicalSMILES\',\'isomericSMILES\',\'iupacName\',\'inchi\',\'inchiKey\',\'charge\',\'complexity\',\'hBondDonorCount\',\'hBondAcceptorCount\',\'rotatableBondCount\',\'tpsa\',\'heavyAtomCount\',\'covalentUnitCount\',\'isotopeAtomCount\',\'volume3D\',\'xlogp3\',\'imgBlob\',\'synonyms\',\'enName\',\'cnName\'] },\n  { id:\'nci\', name:\'NCI CADD\', desc:\'美国国家癌症研究所\', icon:\'fa-microscope\', color:\'#4ecdc4\', priority:2,\n    checkUrl:\'https://cactus.nci.nih.gov/chemical/structure/water/smiles\',\n    fields:[\'canonicalSMILES\',\'iupacName\',\'molecularFormula\',\'molecularWeight\',\'imgBlob\'] },\n    \n    // —— wikidata 条目（替换原 fields 行）——\n    {\n        id: \'wikidata\',\n        name: \'Wikidata\',\n        desc: \'维基数据，中文信息丰富\',\n        icon: \'fa-globe\',\n        color: \'#a78bfa\',\n        priority: 3,\n        checkUrl: \'https://www.wikidata.org/w/api.php?action=wbsearchentities&search=water&language=en&format=json&origin=*\' ,\n        fields: [\n            \'cnName\', \'enName\', \'molecularFormula\', \'molecularWeight\',\n            \'canonicalSMILES\', \'inchi\', \'inchiKey\', \'casNumber\',\n            \'meltingPoint\', \'boilingPoint\', \'density\', \'opticalRotation\'\n        ]\n    },\n    \n    // —— wikipedia 条目（替换原 fields 行）——\n    {\n        id: \'wikipedia\',\n        name: \'Wikipedia\',\n        desc: \'维基百科描述信息\',\n        icon: \'fa-book-open\',\n        color: \'#f0a030\',\n        priority: 4,\n        checkUrl: \'https://zh.wikipedia.org/api/rest_v1/page/summary/%E6%B0%B4\' ,\n        fields: [\n            \'cnName\', \'enName\', \'description\',\n            \'meltingPoint\', \'boilingPoint\', \'density\',\n            \'pKa\', \'pKb\', \'opticalRotation\'\n        ]\n    },\n    \n     // ========== 新增数据源 ==========\n  { id: \'chembl\', name: \'ChEMBL\', desc: \'生物活性分子数据库\', icon: \'fa-dna\', color: \'#ff6b6b\', priority: 5, checkUrl: \'https://www.ebi.ac.uk/chembl/api/data/molecule/search.json?q=aspirin\', fields: [\'canonicalSMILES\', \'molecularFormula\', \'molecularWeight\', \'iupacName\', \'synonyms\'] },\n  { id: \'epa\', name: \'EPA CompTox\', desc: \'美国环保署化学品数据\', icon: \'fa-leaf\', color: \'#339af0\', priority: 6, checkUrl: \'https://comptox.epa.gov/dashboard-api/ccdapp/search/by-name/water\', fields: [\'casNumber\', \'inchiKey\', \'synonyms\', \'cnName\', \'enName\'] }\n];\n\n// ========== 内置降级数据 ==========\nconst FALLBACK_DATA = {\n  \'ethanol\':{cid:702,enName:\'Ethanol\',cnName:\'乙醇\',iupacName:\'ethanol\',molecularFormula:\'C2H6O\',molecularWeight:46.0684,exactMass:46.041865,canonicalSMILES:\'CCO\',isomericSMILES:\'CCO\',inchi:\'InChI=1S/C2H6O/c1-2-3/h3H,2H2,1H3\',inchiKey:\'LFQSCWFLJHTTHZ-UHFFFAOYSA-N\',charge:0,complexity:6,hBondDonorCount:1,hBondAcceptorCount:1,rotatableBondCount:0,tpsa:20.23,heavyAtomCount:3,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:-0.1,synonyms:[\'Ethanol\',\'ethyl alcohol\',\'alcohol\',\'乙醇\',\'酒精\']},\n  \'aspirin\':{cid:2244,enName:\'Aspirin\',cnName:\'阿司匹林\',iupacName:\'2-acetyloxybenzoic acid\',molecularFormula:\'C9H8O4\',molecularWeight:180.1574,exactMass:180.042259,canonicalSMILES:\'CC(=O)OC1=CC=CC=C1C(=O)O\',isomericSMILES:\'CC(=O)OC1=CC=CC=C1C(=O)O\',inchi:\'InChI=1S/C9H8O4/c1-6(10)13-8-5-3-2-4-7(8)9(11)12/h2-5H,1H3,(H,11,12)\',inchiKey:\'BSYNRYMUTXBXSQ-UHFFFAOYSA-N\',charge:0,complexity:181,hBondDonorCount:1,hBondAcceptorCount:4,rotatableBondCount:3,tpsa:63.6,heavyAtomCount:13,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:1.2,synonyms:[\'Aspirin\',\'acetylsalicylic acid\',\'阿司匹林\',\'乙酰水杨酸\']},\n  \'caffeine\':{cid:2519,enName:\'Caffeine\',cnName:\'咖啡因\',iupacName:\'1,3,7-trimethyl-3,7-dihydro-1H-purine-2,6-dione\',molecularFormula:\'C8H10N4O2\',molecularWeight:194.1906,exactMass:194.080375,canonicalSMILES:\'CN1C=NC2=C1C(=O)NC(=O)N2C\',isomericSMILES:\'CN1C=NC2=C1C(=O)NC(=O)N2C\',inchi:\'InChI=1S/C8H10N4O2/c1-10-4-9-6-5(10)7(13)12(3)8(14)11(6)2/h4H,1-3H3\',inchiKey:\'RYYVLZVUVIJVGH-UHFFFAOYSA-N\',charge:0,complexity:222,hBondDonorCount:0,hBondAcceptorCount:4,rotatableBondCount:0,tpsa:58.6,heavyAtomCount:14,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:-0.1,synonyms:[\'Caffeine\',\'1,3,7-trimethylxanthine\',\'咖啡因\',\'咖啡碱\']},\n  \'acetone\':{cid:180,enName:\'Acetone\',cnName:\'丙酮\',iupacName:\'propan-2-one\',molecularFormula:\'C3H6O\',molecularWeight:58.0791,exactMass:58.041865,canonicalSMILES:\'CC(=O)C\',isomericSMILES:\'CC(=O)C\',inchi:\'InChI=1S/C3H6O/c1-3(2)4/h1-2H3\',inchiKey:\'CSCPPACGZOOCGX-UHFFFAOYSA-N\',charge:0,complexity:24.7,hBondDonorCount:0,hBondAcceptorCount:1,rotatableBondCount:0,tpsa:17.07,heavyAtomCount:4,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:-0.2,synonyms:[\'Acetone\',\'propanone\',\'dimethyl ketone\',\'丙酮\',\'二甲基酮\']},\n  \'water\':{cid:962,enName:\'Water\',cnName:\'水\',iupacName:\'water\',molecularFormula:\'H2O\',molecularWeight:18.0153,exactMass:18.010565,canonicalSMILES:\'O\',isomericSMILES:\'O\',inchi:\'InChI=1S/H2O/h1H2\',inchiKey:\'XLYOFNOQVPJJNP-UHFFFAOYSA-N\',charge:0,complexity:0,hBondDonorCount:1,hBondAcceptorCount:1,rotatableBondCount:0,tpsa:12.46,heavyAtomCount:1,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:-0.5,synonyms:[\'Water\',\'H2O\',\'水\',\'7732-18-5\']},\n  \'benzene\':{cid:241,enName:\'Benzene\',cnName:\'苯\',iupacName:\'benzene\',molecularFormula:\'C6H6\',molecularWeight:78.1118,exactMass:78.046850,canonicalSMILES:\'C1=CC=CC=C1\',isomericSMILES:\'C1=CC=CC=C1\',inchi:\'InChI=1S/C6H6/c1-2-4-6-5-3-1/h1-6H\',inchiKey:\'UHOVQNZJYSORNB-UHFFFAOYSA-N\',charge:0,complexity:54.9,hBondDonorCount:0,hBondAcceptorCount:0,rotatableBondCount:0,tpsa:0,heavyAtomCount:6,covalentUnitCount:1,isotopeAtomCount:0,xlogp3:2.0,synonyms:[\'Benzene\',\'benzol\',\'苯\',\'安息油\']}\n};\n\n// ========== 应用状态 ==========\n    const TIMEOUT_MS = 12000;\n    let sourceReachable = {}; \n    let sourceEnabled = {}; \n    // let queryMode = \'auto\'; // 删除这行直接定义\n    let queryMode = localStorage.getItem(\'cq_query_mode\') || \'auto\'; // 【修改点】：从本地存储读取模式\n    let queryCache = {}; \n    let searchHistory = []; \n    let lastQuery = \'\';\n    let clearTimers = {}; \n// --- 新增：面板折叠状态 ---\n// 从本地存储读取状态，默认为 false (展开)\nlet sourcePanelCollapsed = localStorage.getItem(\'cq_source_panel_collapsed\') === \'true\';\n\n\n    // 初始化状态\n    API_SOURCES.forEach(s => {\n        sourceReachable[s.id] = null;\n        const storedEnabled = localStorage.getItem(\'cq_src_enabled_\' + s.id);\n        sourceEnabled[s.id] = storedEnabled === null ? true : storedEnabled === \'true\';\n    });\n\n    try { searchHistory = JSON.parse(localStorage.getItem(\'cq_history\') || \'[]\'); } catch(e) { searchHistory = []; }\n    try { queryCache = JSON.parse(localStorage.getItem(\'cq_cache\') || \'{}\'); } catch(e) { queryCache = {}; }\n\n\n// ========== 工具函数 ==========\nfunction showToast(msg, type=\'success\') {\n  const c = document.getElementById(\'toastContainer\');\n  const t = document.createElement(\'div\');\n  t.className = \'toast \' + type;\n  const icons = {success:\'check-circle\',error:\'times-circle\',warn:\'exclamation-circle\'};\n  t.innerHTML = `<i class="fas fa-${icons[type]||\'info-circle\'}"></i> ${msg}`;\n  c.appendChild(t);\n  setTimeout(() => { t.style.animation=\'toastOut .3s ease forwards\'; setTimeout(()=>t.remove(),300); }, 2500);\n}\n\nfunction showState(state) {\n  [\'emptyState\',\'loadingState\',\'errorState\',\'resultsSection\'].forEach(id => document.getElementById(id).classList.remove(\'active\'));\n  if (state) document.getElementById(state).classList.add(\'active\');\n}\n\nfunction fetchWithTimeout(url, timeout=TIMEOUT_MS) {\n  const ctrl = new AbortController();\n  const timer = setTimeout(() => ctrl.abort(), timeout);\n  return fetch(url, {signal:ctrl.signal}).then(r => { clearTimeout(timer); return r; }).catch(e => { clearTimeout(timer); if(e.name===\'AbortError\') throw new Error(\'请求超时\'); throw e; });\n}\n\nasync function fetchText(url, timeout=TIMEOUT_MS) {\n  const r = await fetchWithTimeout(url, timeout);\n  return r.text();\n}\n\nfunction formatFormula(f) { return f ? f.replace(/(\\d+)/g,\'<sub>$1</sub>\') : \'—\'; }\nfunction getSourceCfg(id) { return API_SOURCES.find(s => s.id === id); }\nfunction srcTag(id) { const s = getSourceCfg(id); return `<span class="source-tag" data-src="${id}">${s?s.name:id}</span>`; }\nfunction isVal(v) { return v !== null && v !== undefined && v !== \'\' && v !== \'—\'; }\n\n// ========== 新增：中英文互译工具函数 ==========\n/**\n * 使用 MyMemory 免费翻译 API 进行翻译\n * @param {string} text 待翻译文本\n * @param {string} sourceLang 源语言代码 (如 \'zh-CN\', \'en\')\n * @param {string} targetLang 目标语言代码\n * @returns {Promise<string|null>} 翻译结果，失败返回 null\n */\nasync function translateText(text, sourceLang, targetLang) {\n    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;\n    try {\n        const res = await fetchWithTimeout(url, 5000); // 复用现有的超时请求函数\n        const data = await res.json();\n        if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {\n            // MyMemory 有时会返回 \'MYMEMORY WARNING\'，需过滤\n            const translated = data.responseData.translatedText;\n            if (!translated.includes(\'MYMEMORY WARNING\')) {\n                return translated;\n            }\n        }\n        return null;\n    } catch (e) {\n        console.warn(\'翻译接口调用失败:\', e);\n        return null;\n    }\n}\n// ========== 工具函数 ==========\n// ... 原有 showToast 函数 ...\n\n// --- 新增：数据源面板折叠控制 ---\nfunction toggleSourcePanel() {\n  sourcePanelCollapsed = !sourcePanelCollapsed;\n  localStorage.setItem(\'cq_source_panel_collapsed\', sourcePanelCollapsed);\n  updateSourcePanelState();\n}\n\nfunction updateSourcePanelState() {\n  const panel = document.getElementById(\'sourcePanel\');\n  if (sourcePanelCollapsed) {\n    panel.classList.add(\'collapsed\');\n  } else {\n    panel.classList.remove(\'collapsed\');\n  }\n}\n\n  // ========== 数据源面板渲染 (修改点：增加按钮状态同步) ==========\n    function renderSourcePanel() {\n        const list = document.getElementById(\'sourceList\');\n        list.innerHTML = API_SOURCES.map(s => {\n            const reach = sourceReachable[s.id];\n            const dotCls = reach===true?\'ok\':reach===false?\'fail\':reach===\'checking\'?\'checking\':\'unknown\';\n            const statusTxt = reach===true?\'可达\':reach===false?\'不可达\':reach===\'checking\'?\'检测中...\':\'未知\';\n            const enabled = sourceEnabled[s.id];\n            return `<div class="source-chip ${!enabled?\'disabled\':\'\'}" onclick="toggleSource(\'${s.id}\')">\n                <div class="dot ${dotCls}"></div>\n                <div>\n                    <div class="s-name" style="color:${s.color}"><i class="fas${s.icon}"></i> ${s.name}</div>\n                    <div class="s-status">${statusTxt} ·${s.desc}</div>\n                </div>\n                <div class="toggle ${enabled?\'on\':\'\'}"></div>\n            </div>`;\n        }).join(\'\');\n        document.querySelectorAll(\'.mode-btn\').forEach(b => {\n            b.classList.toggle(\'active\', b.dataset.mode === queryMode);\n        });\n}\n\nfunction toggleSource(id) {\n  sourceEnabled[id] = !sourceEnabled[id];\n  // 修改点：将启用状态保存到 localStorage\n  localStorage.setItem(\'cq_src_enabled_\' + id, sourceEnabled[id]);\n  \n  renderSourcePanel();\n  showToast(`${getSourceCfg(id).name} 已${sourceEnabled[id]?\'启用\':\'禁用\'}`, \'warn\');\n}\n\n// ========== 模式切换 (修改点：增加记忆功能) ==========\n    function setMode(mode) {\n        queryMode = mode;\n        // 保存到 localStorage\n        localStorage.setItem(\'cq_query_mode\', mode);\n        \n        document.querySelectorAll(\'.mode-btn\').forEach(b => b.classList.toggle(\'active\', b.dataset.mode === mode));\n        showToast(`切换为${mode===\'auto\'?\'自动切换\':\'并行查询\'}模式`);\n    }\n\n\n// ========== 网络检测 ==========\nasync function checkAllSources() {\n  API_SOURCES.forEach(s => { sourceReachable[s.id] = \'checking\'; });\n  renderSourcePanel();\n\n  const checks = API_SOURCES.map(async (s) => {\n    try {\n      const r = await fetchWithTimeout(s.checkUrl, 8000);\n      const txt = await r.text();\n      // 判断是否返回了有效内容\n      const valid = txt.trim().length > 0 && !txt.includes(\'Error\') && !txt.includes(\'"error"\') && r.ok;\n      sourceReachable[s.id] = valid;\n    } catch(e) {\n      sourceReachable[s.id] = false;\n    }\n    renderSourcePanel();\n  });\n  await Promise.allSettled(checks);\n}\n\n// 页面加载时检测\ncheckAllSources();\n\n// ========== 查询进度面板 ==========\n\nfunction showProgress(sources) {\n    const panel = document.getElementById(\'progressPanel\');\n    panel.classList.add(\'active\');\n    const rows = document.getElementById(\'progressRows\');\n    rows.innerHTML = sources.map(s => {\n        if (s === \'fallback\') {\n            return `<div class="progress-row" id="prow_fallback">\n                <div class="p-icon" style="background:rgba(240,160,48,0.15);color:#f0a030"><i class="fas fa-database"></i></div>\n                <div class="p-name">内置降级</div>\n                <div class="p-status waiting" id="pstatus_fallback"><i class="fas fa-hourglass-half"></i> 等待中</div>\n                <div class="p-fields" id="pfields_fallback"></div>\n            </div>`;\n        }\n        const cfg = getSourceCfg(s);\n        if (!cfg) return \'\';\n        return `<div class="progress-row" id="prow_${s}">\n            <div class="p-icon" style="background:${cfg.color}22;color:${cfg.color}"><i class="fas ${cfg.icon}"></i></div>\n            <div class="p-name">${cfg.name}</div>\n            <div class="p-status waiting" id="pstatus_${s}"><i class="fas fa-hourglass-half"></i> 等待中</div>\n            <div class="p-fields" id="pfields_${s}"></div>\n        </div>`;\n    }).join(\'\');\n}\n\nfunction updateProgress(sourceId, status, detail=\'\') {\n  const el = document.getElementById(\'pstatus_\' + sourceId);\n  const fieldsEl = document.getElementById(\'pfields_\' + sourceId);\n  if (!el) return;\n  const cfg = {waiting:[\'fa-hourglass-half\',\'等待中\'],running:[\'fa-spinner fa-spin\',\'查询中...\'],success:[\'fa-check\',\'成功\'],fail:[\'fa-xmark\',\'失败\'],skipped:[\'fa-forward\',\'跳过\']};\n  const [icon, text] = cfg[status] || cfg.waiting;\n  el.className = \'p-status \' + status;\n  el.innerHTML = `<i class="fas ${icon}"></i> ${text}`;\n  if (fieldsEl && detail) fieldsEl.textContent = detail;\n}\n\nfunction hideProgress() {\n  document.getElementById(\'progressPanel\').classList.remove(\'active\');\n}\n\n// ========== 各数据源查询函数 ==========\n\n\n\n// ========== PubChem 202 轮询辅助函数 ==========\n\nasync function pollPubChemReady(waitUrl, maxAttempts = 5, interval = 3000) {\n    for (let i = 0; i < maxAttempts; i++) {\n        await new Promise(r => setTimeout(r, interval));\n        try {\n            const resp = await fetchWithTimeout(waitUrl, 10000);\n            if (resp.status === 200) return true;\n            if (resp.status !== 202) return false;\n        } catch (e) {\n            if (i === maxAttempts - 1) return false;\n            continue;\n        }\n    }\n    return false;\n}\n\n\nasync function fetchPubChemText(url) {\n    const resp = await fetchWithTimeout(url);\n    if (resp.status === 202) {\n        const body = await resp.text();\n        const waitMatch = body.match(/https?:\\/\\/[^\\s\\n]+/);\n        if (waitMatch) {\n            const ready = await pollPubChemReady(waitMatch[0]);\n            if (ready) {\n                const retryResp = await fetchWithTimeout(url);\n                if (retryResp.ok) {\n                    const text = await retryResp.text();\n                    return text.replace(/^\\uFEFF/, \'\');\n                }\n            }\n        }\n        return null;\n    }\n    if (!resp.ok) return null;\n    const text = await resp.text();\n    return text.replace(/^\\uFEFF/, \'\');\n}\n\nasync function fetchPubChemJson(url) {\n    const resp = await fetchWithTimeout(url);\n    if (resp.status === 202) {\n        const body = await resp.text();\n        const waitMatch = body.match(/https?:\\/\\/[^\\s\\n]+/);\n        if (waitMatch) {\n            const ready = await pollPubChemReady(waitMatch[0]);\n            if (ready) {\n                const retryResp = await fetchWithTimeout(url);\n                if (retryResp.ok) return retryResp.json();\n            }\n        }\n        return null;\n    }\n    if (!resp.ok) return null;\n    return resp.json();\n}\n\n// --- PubChem ---\nasync function queryPubChem(query) {\n    let cid = null;\n\n    // ===== 修复：精确 SMILES 检测 =====\n    // 关键问题：/^C/.test("Methanol") 为 true 导致英文名被误判为 SMILES\n    // 新逻辑：用连续小写字母排除英文单词\n    const isSMILES = (() => {\n        if (!/^[A-Za-z0-9@+\\-\\[\\]\\(\\)\\/\\\\\\.#=?]+$/.test(query)) return false;\n        if (/^\\d+$/.test(query)) return false;\n        if (query.length < 2) return false;\n\n        // 包含 SMILES 专属符号 → 直接判定\n        if (/[\\[\\]@\\/\\\\=#]/.test(query)) return true;\n        if (/\\(/.test(query)) return true;\n\n        // 纯字母情况（CCO, Br, NaCl 等）\n        if (/^[A-Za-z]+$/.test(query)) {\n            // 核心修复：连续 3+ 小写字母 = 英文单词，不是 SMILES\n            // "Methanol" → "ethanol" 匹配 → false\n            // "Ethanol"  → "thanol"  匹配 → false\n            // "CCO"      → 无匹配          → true\n            if (/[a-z]{3,}/.test(query)) return false;\n            if (query.length > 30) return false;\n            if (/\\d/.test(query)) return true;\n            if (/[A-Z][a-z]/.test(query)) return true;\n            if (query.length <= 10) return true;\n            return false;\n        }\n\n        // 包含数字（C1=CC=CC=C1 等环结构）\n        if (/\\d/.test(query)) return true;\n\n        return false;\n    })();\n\n    const isCAS = /^\\d{2,7}-\\d{2}-\\d$/.test(query);\n\n    // ===== 修复：重构 URL 策略 =====\n    // 关键修复：name/ 路径始终为第一优先级\n    const urlCandidates = [];\n\n    if (isCAS) {\n        urlCandidates.push(\n            \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/xref/RegistryID/\'\n                + encodeURIComponent(query) + \'/cids/TXT\',\n            \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/\'\n                + encodeURIComponent(query) + \'/cids/TXT\'\n        );\n    } else {\n        // 始终先尝试 name 查询\n        // "Methanol" → name/methanol/cids → CID 887 → 成功\n        urlCandidates.push(\n            \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/\'\n                + encodeURIComponent(query) + \'/cids/TXT\'\n        );\n        // 如果判定为 SMILES，追加 fastidentity 作为补充\n        if (isSMILES) {\n            urlCandidates.push(\n                \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/fastidentity/smiles/\'\n                    + encodeURIComponent(query) + \'/cids/TXT\'\n            );\n        }\n    }\n\n    // ===== 修复：增强返回文本解析 =====\n    for (const url of urlCandidates) {\n        try {\n            const t = await fetchPubChemText(url);\n            if (!t) continue;\n            const trimmed = t.trim();\n            if (!trimmed) continue;\n            if (\n                trimmed.startsWith(\'Error\') ||\n                trimmed.startsWith(\'Status:\') ||\n                trimmed.startsWith(\'NotFound\') ||\n                trimmed.includes(\'not found\') ||\n                trimmed.includes(\'Not Found\') ||\n                trimmed.includes(\'Invalid\') ||\n                trimmed === \'0\'\n            ) {\n                continue;\n            }\n            const firstLine = trimmed.split(\'\\n\')[0].trim();\n            const parsed = parseInt(firstLine, 10);\n            if (parsed && !isNaN(parsed) && parsed > 0) {\n                cid = parsed;\n                break;\n            }\n        } catch (e) {\n            continue;\n        }\n    }\n\n    if (!cid) return null;\n\n    const propsUrl = \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/\' + cid\n        + \'/property/MolecularFormula,MolecularWeight,CanonicalSMILES,IsomericSMILES,\'\n        + \'IUPACName,ExactMass,Charge,Complexity,HBondDonorCount,HBondAcceptorCount,\'\n        + \'RotatableBondCount,TPSA,HeavyAtomCount,CovalentUnitCount,IsotopeAtomCount,\'\n        + \'Volume3D,XLogP3,InChI,InChIKey/FALSE\';\n\n    const [propsRes, imgBlob, synRes] = await Promise.all([\n        fetchPubChemJson(propsUrl).catch(() => null),\n        fetchWithTimeout(\n            \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/\' + cid + \'/PNG\'\n        )\n            .then(r => r.ok ? r.blob() : null)\n            .catch(() => null),\n        fetchPubChemText(\n            \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/\' + cid + \'/synonyms/TXT\'\n        ).catch(() => \'\')\n    ]);\n\n    if (\n        !propsRes\n        || !propsRes.PropertyTable\n        || !propsRes.PropertyTable.Properties\n        || !propsRes.PropertyTable.Properties.length\n    ) {\n        return null;\n    }\n\n    const p = propsRes.PropertyTable.Properties[0];\n    const synonyms = (synRes || \'\')\n        .replace(/^\\uFEFF/, \'\')\n        .trim()\n        .split(\'\\n\')\n        .filter(s => s.trim().length > 0);\n\n    return {\n        _source: \'pubchem\',\n        cid: cid,\n        molecularFormula: p.MolecularFormula || \'\',\n        molecularWeight: p.MolecularWeight || \'\',\n        exactMass: p.ExactMass || \'\',\n        canonicalSMILES: p.CanonicalSMILES || \'\',\n        isomericSMILES: p.IsomericSMILES || \'\',\n        iupacName: p.IUPACName || \'\',\n        inchi: p.InChI || \'\',\n        inchiKey: p.InChIKey || \'\',\n        charge: p.Charge || 0,\n        complexity: p.Complexity || \'\',\n        hBondDonorCount: p.HBondDonorCount || 0,\n        hBondAcceptorCount: p.HBondAcceptorCount || 0,\n        rotatableBondCount: p.RotatableBondCount || 0,\n        tpsa: p.TPSA || \'\',\n        heavyAtomCount: p.HeavyAtomCount || 0,\n        covalentUnitCount: p.CovalentUnitCount || 1,\n        isotopeAtomCount: p.IsotopeAtomCount || 0,\n        volume3D: p.Volume3D || \'\',\n        xlogp3: p.XLogP3,\n        imgBlob: imgBlob,\n        synonyms: synonyms\n    };\n}\n\n// --- NCI CADD ---\nasync function queryNCI(query) {\n  const q = encodeURIComponent(query);\n  const [smiles, iupac, formula, mwTxt] = await Promise.all([\n    fetchText(`https://cactus.nci.nih.gov/chemical/structure/${q}/smiles`).catch(()=>null),\n    fetchText(`https://cactus.nci.nih.gov/chemical/structure/${q}/iupac_name`).catch(()=>null),\n    fetchText(`https://cactus.nci.nih.gov/chemical/structure/${q}/formula`).catch(()=>null),\n    fetchText(`https://cactus.nci.nih.gov/chemical/structure/${q}/mw`).catch(()=>null)\n  ]);\n  const result = { _source:\'nci\' };\n  let hasData = false;\n  if (smiles && !smiles.includes(\'Error\') && smiles.trim().length > 0) { result.canonicalSMILES = smiles.trim(); hasData = true; }\n  if (iupac && !iupac.includes(\'Error\') && iupac.trim().length > 0) { result.iupacName = iupac.trim(); hasData = true; }\n  if (formula && !formula.includes(\'Error\') && formula.trim().length > 0) { result.molecularFormula = formula.trim(); hasData = true; }\n  if (mwTxt && !mwTxt.includes(\'Error\')) { const mw = parseFloat(mwTxt.trim()); if (!isNaN(mw)) { result.molecularWeight = mw; hasData = true; } }\n  if (!hasData) return null;\n  // 尝试获取结构图\n  try {\n    const imgRes = await fetch(`https://cactus.nci.nih.gov/chemical/structure/${q}/image`);\n    if (imgRes.ok) result.imgBlob = await imgRes.blob();\n  } catch(e) {}\n  return result;\n}\n\n// --- Wikidata（增强：修复温度K→°C转换，智能选择最佳声明值） ---\nasync function queryWikidata(query) {\n    // 第一步：搜索实体\n    const searchUrl = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(query)}&language=en&format=json&origin=*`;\n    const searchRes = await fetchWithTimeout(searchUrl);\n    const searchData = await searchRes.json();\n    if (!searchData.search || searchData.search.length === 0) return null;\n    \n    // 优先选择化学物质类型的实体\n    let entityId = searchData.search[0].id;\n    for (const item of searchData.search) {\n        if ( item.description && ( item.description.includes(\'化学\') || item.description.toLowerCase().includes(\'chemical\') || item.description.toLowerCase().includes(\'compound\') ) ) {\n            entityId = item.id;\n            break;\n        }\n    }\n    \n    // 第二步：获取属性\n    const propsUrl = `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${entityId}&props=labels|claims&format=json&origin=*`;\n    const propsRes = await fetchWithTimeout(propsUrl);\n    const propsData = await propsRes.json();\n    const entity = propsData.entities?.[entityId];\n    if (!entity) return null;\n    \n    const result = { _source: \'wikidata\' };\n    let hasData = false;\n    \n    // 标签\n    const labels = entity.labels || {};\n    if (labels.zh) { result.cnName = labels.zh.value; hasData = true; }\n    if (labels.en) { result.enName = labels.en.value; hasData = true; }\n    \n    // Wikidata 单位 URL → 符号映射\n    const UNIT_MAP = {\n        \'Q25267\': \'°C\',\n        \'Q11570\': \'K\',\n        \'Q25517\': \'g/mL\',\n        \'Q211260\': \'kg/m³\',\n        \'Q1977313\': \'g/cm³\',\n        \'Q7309\': \'°\',\n    };\n    \n    function resolveUnit(unitUrl) {\n        if (!unitUrl) return \'\';\n        const m = unitUrl.match(/Q\\d+$/);\n        return m ? (UNIT_MAP[m[0]] || \'\') : \'\';\n    }\n    \n			// 需要进行K→°C自动转换的温度字段\n			const TEMP_FIELDS = new Set([\'meltingPoint\', \'boilingPoint\']);\n\n			// 需要进行 kg/m³ → g/cm³ 自动转换的密度字段\n			const DENSITY_FIELDS = new Set([\'density\']);\n\n			// 各理化性质的默认单位\n			const defaultUnits = {\n				\'meltingPoint\': \'°C\',\n				\'boilingPoint\': \'°C\',\n				\'density\': \'g/cm³\',\n				\'opticalRotation\': \'°\',\n			};\n\n			// 属性声明映射\n			const claims = entity.claims || {};\n			const propMap = {\n				\'P274\': \'molecularFormula\',\n				\'P2067\': \'molecularWeight\',\n				\'P233\': \'canonicalSMILES\',\n				\'P234\': \'inchi\',\n				\'P235\': \'inchiKey\',\n				\'P231\': \'casNumber\',\n				\'P2101\': \'meltingPoint\',\n				\'P2102\': \'boilingPoint\',\n				\'P2054\': \'density\',\n				\'P2330\': \'opticalRotation\',\n			};\n\n			// ========== 增强辅助函数：从多个声明中智能提取最佳值 ==========\n			function extractBestValue(pid, field) {\n				if (!claims[pid] || claims[pid].length === 0) return null;\n				const isTemp = TEMP_FIELDS.has(field);\n				const isDensity = DENSITY_FIELDS.has(field);\n				// 收集所有有效声明的候选值\n				const candidates = [];\n				for (const claim of claims[pid]) {\n					const snak = claim.mainsnak;\n					if (!snak?.datavalue) continue;\n					const dv = snak.datavalue;\n					if (dv.type === \'quantity\' && dv.value?.amount) {\n						const num = parseFloat(dv.value.amount.replace(\'+\', \'\'));\n						if (isNaN(num)) continue;\n						const rawUnit = resolveUnit(dv.value.unit);\n						let finalValue = num;\n						let finalUnit = rawUnit || defaultUnits[field] || \'\';\n						// 核心修复：K→°C 自动转换\n						if (rawUnit === \'K\' && isTemp) {\n							finalValue = parseFloat((num - 273.15).toFixed(1));\n							finalUnit = \'°C\';\n						}\n						// 新增：kg/m³ → g/cm³ 自动转换（除以1000）\n						if (rawUnit === \'kg/m³\' && isDensity) {\n							finalValue = parseFloat((num / 1000).toFixed(4));\n							finalUnit = \'g/cm³\';\n						}\n						// 新增：g/mL → g/cm³ 等价转换（1 g/mL = 1 g/cm³）\n						if (rawUnit === \'g/mL\' && isDensity) {\n							finalValue = num;\n							finalUnit = \'g/cm³\';\n						}\n						candidates.push({\n							value: finalValue + (finalUnit ? \' \' + finalUnit : \'\'),\n							rawNum: num,\n							rawUnit: rawUnit,\n							isKelvin: rawUnit === \'K\',\n							isKgPerM3: rawUnit === \'kg/m³\',\n							rank: claim.rank, // \'preferred\' > \'normal\' > \'deprecated\'\n							claim: claim // 保存完整声明\n						});\n					} else if (dv.type === \'string\' && dv.value) {\n						candidates.push({\n							value: dv.value,\n							rank: claim.rank\n						});\n					} else if (dv.type === \'external-id\' && dv.value) {\n						candidates.push({\n							value: dv.value,\n							rank: claim.rank\n						});\n					}\n				}\n				if (candidates.length === 0) return null;\n\n				// ========== 温度字段的智能选择策略（修复关键点）==========\n				if (isTemp) {\n					// 新增策略0：优先选择有明确参考文献的值\n					const withRef = candidates.filter(c => c.claim && c.claim.references && c.claim.references.length > 0);\n					if (withRef.length > 0) {\n						// 在有参考文献的中，优先选preferred\n						const refPreferred = withRef.filter(c => c.rank === \'preferred\');\n						if (refPreferred.length > 0) return refPreferred[0].value;\n						// 否则优先选开尔文值\n						const refKelvin = withRef.filter(c => c.isKelvin);\n						if (refKelvin.length > 0) return refKelvin[0].value;\n						return withRef[0].value;\n					}\n					// 策略1：优先选择 rank=preferred 的声明\n					const preferred = candidates.filter(c => c.rank === \'preferred\');\n					if (preferred.length > 0) {\n						// 在 preferred 中优先选开尔文来源（经转换后最准确）\n						const kelvinPreferred = preferred.filter(c => c.isKelvin);\n						if (kelvinPreferred.length > 0) return kelvinPreferred[0].value;\n						return preferred[0].value;\n					}\n					// 策略2：无 preferred 时，优先选开尔文值（SI 单位最可靠）\n					const kelvinCandidates = candidates.filter(c => c.isKelvin);\n					if (kelvinCandidates.length > 0) return kelvinCandidates[0].value;\n					// 策略3：对非开尔文值进行合理性检查\n					// 如果值 > 100 且单位标注为 °C，可能是未转换的开尔文值，自动修正\n					for (const c of candidates) {\n						if (c.rawUnit === \'°C\' && c.rawNum > 100) {\n							const corrected = parseFloat((c.rawNum - 273.15).toFixed(1));\n							// 修正后的值在合理温度范围内（-200°C ~ 600°C）\n							if (corrected > -200 && corrected < 600) {\n								return corrected + \' °C\';\n							}\n						}\n					}\n					// 新增策略4：选择第一个normal rank的值（作为保底）\n					const normal = candidates.filter(c => c.rank === \'normal\');\n					if (normal.length > 0) return normal[0].value;\n				}\n\n				// ========== 新增：密度字段的智能选择策略 ==========\n				if (isDensity) {\n					// 策略0：优先选择有参考文献的值\n					const withRef = candidates.filter(c => c.claim && c.claim.references && c.claim.references.length > 0);\n					if (withRef.length > 0) {\n						const refPreferred = withRef.filter(c => c.rank === \'preferred\');\n						if (refPreferred.length > 0) return refPreferred[0].value;\n						// 优先选 kg/m³ 来源（经转换后最准确）\n						const refKgM3 = withRef.filter(c => c.isKgPerM3);\n						if (refKgM3.length > 0) return refKgM3[0].value;\n						return withRef[0].value;\n					}\n					// 策略1：优先选择 rank=preferred 的声明\n					const preferred = candidates.filter(c => c.rank === \'preferred\');\n					if (preferred.length > 0) {\n						const kgM3Preferred = preferred.filter(c => c.isKgPerM3);\n						if (kgM3Preferred.length > 0) return kgM3Preferred[0].value;\n						return preferred[0].value;\n					}\n					// 策略2：无 preferred 时，优先选 kg/m³ 值（SI 单位最可靠）\n					const kgM3Candidates = candidates.filter(c => c.isKgPerM3);\n					if (kgM3Candidates.length > 0) return kgM3Candidates[0].value;\n					// 策略3：合理性检查 — 如果值 > 10 且单位标注为 g/cm³，可能是未转换的 kg/m³\n					for (const c of candidates) {\n						if (c.rawUnit === \'g/cm³\' && c.rawNum > 10) {\n							const corrected = parseFloat((c.rawNum / 1000).toFixed(4));\n							// 常见物质密度范围 0.5~22 g/cm³\n							if (corrected > 0.5 && corrected < 22) {\n								return corrected + \' g/cm³\';\n							}\n						}\n					}\n					// 策略4：选择第一个normal rank的值（作为保底）\n					const normal = candidates.filter(c => c.rank === \'normal\');\n					if (normal.length > 0) return normal[0].value;\n				}\n\n				// ========== 非温度、非密度字段：优先选 preferred，否则选第一个 ==========\n				const preferred = candidates.filter(c => c.rank === \'preferred\');\n				if (preferred.length > 0) return preferred[0].value;\n				return candidates[0].value;\n			}\n\n			// ========== 辅助函数结束 ==========\n\n    // 使用新的智能提取函数替换原来的 claims[pid][0] 直接取值\n    for (const [pid, field] of Object.entries(propMap)) {\n        const value = extractBestValue(pid, field);\n        if (value) {\n            result[field] = value;\n            hasData = true;\n        }\n    }\n    \n    return hasData ? result : null;\n}\n\n\n// --- Wikipedia 信息框解析辅助函数 ---\nfunction parseInfoboxValue(wikitext, ...keys) {\n    for (const key of keys) {\n        // 匹配 |键名 = 值 或 |键名=值\n        const patterns = [\n            new RegExp(\'\\\\|\\\\s*\' + key.replace(/[.*+?^${}()|[\\]\\\\]/g, \'\\\\$&\') + \'\\\\s*=\\\\s*([^\\\\n|}]+)\'),\n            new RegExp(\'\\\\|\\\\s*\' + key.replace(/[.*+?^${}()|[\\]\\\\]/g, \'\\\\$&\') + \'\\\\s*=\\\\s*([^\\\\n|}]+)\', \'i\')\n        ];\n        for (const pattern of patterns) {\n            const match = wikitext.match(pattern);\n            if (match && match[1]) {\n                let val = match[1].trim();\n                // 去除末尾的注释、模板标记\n                val = val.replace(/<!--.*?-->/g, \'\').replace(/\\{\\{.*?\\}\\}/g, \'\').trim();\n                // 去除 <br /> <ref> 等标签\n                val = val.replace(/<[^>]+>/g, \'\').trim();\n                if (val.length > 0 && val !== \'—\' && val !== \'-\' && val !== \'unknown\') {\n                    return val;\n                }\n            }\n        }\n    }\n    return null;\n}\n\n// --- Wikipedia（增强：解析信息框中的理化性质） ---\nasync function queryWikipedia(query) {\n    const result = { _source: \'wikipedia\' };\n    let hasData = false;\n    let zhWikitext = \'\';\n    let enWikitext = \'\';\n\n    // 先查中文维基\n    try {\n        const zhUrl = \'https://zh.wikipedia.org/w/api.php?\' +\n            \'action=query\' +\n            \'&titles=\' + encodeURIComponent(query) +\n            \'&prop=revisions|extracts\' +\n            \'&rvprop=content\' +\n            \'&exintro&exsentences=3\' +\n            \'&format=json&origin=*\';\n        const zhRes = await fetchWithTimeout(zhUrl, 8000);\n        const zhData = await zhRes.json();\n        const pages = zhData.query?.pages;\n        if (pages) {\n            for (const [pid, page] of Object.entries(pages)) {\n                if (page.missing !== undefined) continue;\n                if (!result.cnName && page.title) {\n                    result.cnName = page.title;\n                    hasData = true;\n                }\n                if (page.extract) {\n                    result.description = page.extract\n                        .replace(/<[^>]+>/g, \'\')\n                        .substring(0, 200);\n                    hasData = true;\n                }\n                if (page.revisions?.[0]?.[\'*\']) {\n                    zhWikitext = page.revisions[0][\'*\'];\n                }\n                break;\n            }\n        }\n    } catch (e) {}\n\n    // 再查英文维基\n    try {\n        const enUrl = \'https://en.wikipedia.org/w/api.php?\' +\n            \'action=query\' +\n            \'&titles=\' + encodeURIComponent(query) +\n            \'&prop=revisions|extracts\' +\n            \'&rvprop=content\' +\n            \'&exintro&exsentences=2\' +\n            \'&format=json&origin=*\';\n        const enRes = await fetchWithTimeout(enUrl, 8000);\n        const enData = await enRes.json();\n        const pages = enData.query?.pages;\n        if (pages) {\n            for (const [pid, page] of Object.entries(pages)) {\n                if (page.missing !== undefined) continue;\n                if (!result.enName && page.title) {\n                    result.enName = page.title;\n                    hasData = true;\n                }\n                if (!result.description && page.extract) {\n                    result.description = page.extract\n                        .replace(/<[^>]+>/g, \'\')\n                        .substring(0, 200);\n                    hasData = true;\n                }\n                if (page.revisions?.[0]?.[\'*\']) {\n                    enWikitext = page.revisions[0][\'*\'];\n                }\n                break;\n            }\n        }\n    } catch (e) {}\n\n    // 解析信息框中的理化性质\n    const wikitexts = [zhWikitext, enWikitext].filter(w => w.length > 0);\n    for (const wikitext of wikitexts) {\n        if (!result.meltingPoint) {\n            const v = parseInfoboxValue(\n                wikitext, \'熔点\', \'MeltingPt\', \'MeltingPoint\', \'MP\', \'melting_point\', \'Meltingpt\'\n            );\n            if (v) { result.meltingPoint = v; hasData = true; }\n        }\n        if (!result.boilingPoint) {\n            const v = parseInfoboxValue(\n                wikitext, \'沸点\', \'BoilingPt\', \'BoilingPoint\', \'BP\', \'boiling_point\', \'Boilingpt\'\n            );\n            if (v) { result.boilingPoint = v; hasData = true; }\n        }\n        if (!result.density) {\n            const v = parseInfoboxValue(\n                wikitext, \'密度\', \'Density\', \'density\', \'DensityF\'\n            );\n            if (v) { result.density = v; hasData = true; }\n        }\n        if (!result.pKa) {\n            const v = parseInfoboxValue(\n                wikitext, \'pKa\', \'pKa1\', \'pKa2\', \'pKa3\', \'PKA\', \'pKa \'\n            );\n            if (v) { result.pKa = v; hasData = true; }\n        }\n        if (!result.pKb) {\n            const v = parseInfoboxValue(\n                wikitext, \'pKb\', \'pKb1\', \'pKb2\', \'PKB\', \'pKb \'\n            );\n            if (v) { result.pKb = v; hasData = true; }\n        }\n        if (!result.opticalRotation) {\n            const v = parseInfoboxValue(\n                wikitext, \'旋光度\', \'OpticalRotation\', \'SpecificRotation\', \'optical_rotation\', \'OpticalRot\'\n            );\n            if (v) { result.opticalRotation = v; hasData = true; }\n        }\n    }\n\n    return hasData ? result : null;\n}\n\n\n\n// --- ChEMBL 查询函数 ---\nasync function queryChEMBL(query) {\n    const q = encodeURIComponent(query);\n    const searchUrl = `https://www.ebi.ac.uk/chembl/api/data/molecule/search.json?q=${q}`;\n    \n    try {\n        const res = await fetchWithTimeout(searchUrl);\n        const data = await res.json();\n        \n        if (data && data.molecules && data.molecules.length > 0) {\n            const mol = data.molecules[0];\n            const result = { _source: \'chembl\' };\n            let hasData = false;\n\n            // 提取名称作为同义词\n            if (mol.pref_name) {\n                result.synonyms = [mol.pref_name];\n                hasData = true;\n            }\n            \n            // 提取结构信息\n            if (mol.molecule_structures && mol.molecule_structures.canonical_smiles) {\n                result.canonicalSMILES = mol.molecule_structures.canonical_smiles;\n                hasData = true;\n            }\n            \n            // 提取计算属性\n            if (mol.molecule_properties) {\n                if (mol.molecule_properties.full_molformula) {\n                    result.molecularFormula = mol.molecule_properties.full_molformula;\n                    hasData = true;\n                }\n                if (mol.molecule_properties.mw_freebase) {\n                    result.molecularWeight = mol.molecule_properties.mw_freebase;\n                    hasData = true;\n                }\n            }\n            \n            return hasData ? result : null;\n        }\n    } catch (e) {\n        console.warn(\'[ChEMBL] 查询失败:\', e.message);\n    }\n    return null;\n}\n\n// --- EPA CompTox 查询函数 ---\nasync function queryEPA(query) {\n    const q = encodeURIComponent(query);\n    const sea
