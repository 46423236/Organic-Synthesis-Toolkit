rchUrl = `https://comptox.epa.gov/dashboard-api/ccdapp/search/by-name/${q}`;\n    \n    try {\n        const res = await fetchWithTimeout(searchUrl);\n        const data = await res.json();\n        \n        // EPA API 返回的是列表，取第一个匹配项\n        if (data && Array.isArray(data) && data.length > 0) {\n            const hit = data[0];\n            const result = { _source: \'epa\' };\n            let hasData = false;\n\n            if (hit.casrn) {\n                result.casNumber = hit.casrn;\n                hasData = true;\n            }\n            if (hit.inchikey) {\n                result.inchiKey = hit.inchikey;\n                hasData = true;\n            }\n            // EPA 返回的 synonyms 通常包含中文名\n            if (hit.synonyms && hit.synonyms.length > 0) {\n                result.synonyms = hit.synonyms;\n                // 尝试提取中文名\n                const cnSyn = hit.synonyms.find(s => /[\\u4e00-\\u9fa5]/.test(s));\n                if (cnSyn) result.cnName = cnSyn;\n                hasData = true;\n            }\n            \n            return hasData ? result : null;\n        }\n    } catch (e) {\n        console.warn(\'[EPA] 查询失败:\', e.message);\n    }\n    return null;\n}\n\n// --- 内置降级 ---\nfunction findFallback(query) {\n  const q = query.toLowerCase().trim();\n  for (const [key, data] of Object.entries(FALLBACK_DATA)) {\n    if (key === q) return { ...data, _source:\'fallback\', imgBlob:null, synonyms:[...(data.synonyms||[])] };\n    for (const syn of (data.synonyms||[])) {\n      if (syn.toLowerCase() === q) return { ...data, _source:\'fallback\', imgBlob:null, synonyms:[...(data.synonyms||[])] };\n    }\n    if (data.canonicalSMILES === q) return { ...data, _source:\'fallback\', imgBlob:null, synonyms:[...(data.synonyms||[])] };\n  }\n  return null;\n}\n\n// ========== 统一查询调度 ==========\n\nconst queryFns = {\n    pubchem: queryPubChem,\n    nci: queryNCI,\n    wikidata: queryWikidata,\n    wikipedia: queryWikipedia,\n    chembl: queryChEMBL,    // 新增\n    epa: queryEPA           // 新增\n};\n\n// 获取需要查询的字段集合（尚未有值的字段）\nfunction getMissingFields(merged) {\n  const allFields = new Set();\n  API_SOURCES.forEach(s => s.fields.forEach(f => allFields.add(f)));\n  return [...allFields].filter(f => !isVal(merged[f]) && f !== \'imgBlob\' && f !== \'synonyms\');\n}\n\n// 检查源是否可能提供缺失字段\nfunction sourceCanProvide(sourceId, missingFields) {\n  const cfg = getSourceCfg(sourceId);\n  if (!cfg) return false;\n  return cfg.fields.some(f => missingFields.includes(f));\n}\n\n// 自动切换模式：按优先级顺序，逐源查询并合并\nasync function queryAutoMode(query) {\n  const sortedSources = API_SOURCES\n    .filter(s => sourceEnabled[s.id] && queryFns[s.id])\n    .sort((a,b) => a.priority - b.priority)\n    .map(s => s.id);\n\n  // 附加降级源\n  sortedSources.push(\'fallback\');\n\n  showProgress(sortedSources);\n  const merged = {};\n  const sourceResults = {};\n\n  for (const srcId of sortedSources) {\n    // 检查该源是否能补充缺失字段\n    if (srcId !== \'fallback\') {\n      const missing = getMissingFields(merged);\n      if (missing.length === 0) {\n        updateProgress(srcId, \'skipped\', \'所有字段已覆盖\');\n        continue;\n      }\n      if (!sourceCanProvide(srcId, missing)) {\n        updateProgress(srcId, \'skipped\', \'无可用字段\');\n        continue;\n      }\n    }\n\n    updateProgress(srcId, \'running\');\n    let result = null;\n    try {\n      if (srcId === \'fallback\') {\n        result = findFallback(query);\n      } else {\n        result = await queryFns[srcId](query);\n      }\n    } catch(e) {\n      console.warn(`[${srcId}] 查询异常:`, e.message);\n    }\n\n    if (result) {\n      sourceResults[srcId] = result;\n      // 字段级合并：只填充空字段\n      const newFields = [];\n      for (const [k, v] of Object.entries(result)) {\n        if (k.startsWith(\'_\')) continue;\n        if (!isVal(merged[k]) && isVal(v)) {\n          merged[k] = v;\n          merged[\'_src_\' + k] = srcId;  // 记录字段来源\n          newFields.push(k);\n        }\n      }\n      // synonyms特殊合并\n      if (result.synonyms && !merged.synonyms) {\n        merged.synonyms = result.synonyms;\n        merged._src_synonyms = srcId;\n      } else if (result.synonyms && merged.synonyms) {\n        const existing = new Set(merged.synonyms);\n        result.synonyms.forEach(s => { if (!existing.has(s)) merged.synonyms.push(s); });\n      }\n      // imgBlob：优先使用有图片的\n      if (result.imgBlob && !merged.imgBlob) { merged.imgBlob = result.imgBlob; merged._src_imgBlob = srcId; }\n\n      updateProgress(srcId, \'success\', newFields.length > 0 ? `获取 ${newFields.length} 个字段` : \'无新字段\');\n    } else {\n      updateProgress(srcId, \'fail\', srcId===\'fallback\'?\'无匹配数据\':\'查询失败\');\n    }\n  }\n\n  hideProgress();\n  return Object.keys(merged).some(k => !k.startsWith(\'_\')) ? merged : null;\n}\n\n// 并行模式：同时查询所有源，然后合并\nasync function queryParallelMode(query) {\n  const sources = API_SOURCES\n    .filter(s => sourceEnabled[s.id] && queryFns[s.id])\n    .map(s => s.id);\n  sources.push(\'fallback\');\n\n  showProgress(sources);\n  const promises = sources.map(async (srcId) => {\n    updateProgress(srcId, \'running\');\n    try {\n      if (srcId === \'fallback\') return { srcId, result: findFallback(query) };\n      const result = await queryFns[srcId](query);\n      return { srcId, result };\n    } catch(e) {\n      return { srcId, result: null, error: e.message };\n    }\n  });\n\n  const results = await Promise.allSettled(promises);\n  const merged = {};\n\n  // 按优先级顺序合并\n  const sorted = results\n    .map(r => r.status === \'fulfilled\' ? r.value : { srcId:\'unknown\', result:null })\n    .sort((a, b) => {\n      const pa = API_SOURCES.find(s=>s.id===a.srcId)?.priority ?? 99;\n      const pb = API_SOURCES.find(s=>s.id===b.srcId)?.priority ?? 99;\n      return pa - pb;\n    });\n\n  for (const {srcId, result, error} of sorted) {\n    if (error) {\n      updateProgress(srcId, \'fail\', error.substring(0, 30));\n      continue;\n    }\n    if (!result) {\n      updateProgress(srcId, \'fail\', srcId===\'fallback\'?\'无匹配\':\'查询失败\');\n      continue;\n    }\n    const newFields = [];\n    for (const [k, v] of Object.entries(result)) {\n      if (k.startsWith(\'_\')) continue;\n      if (!isVal(merged[k]) && isVal(v)) {\n        merged[k] = v;\n        merged[\'_src_\' + k] = srcId;\n        newFields.push(k);\n      }\n    }\n    if (result.synonyms && !merged.synonyms) { merged.synonyms = result.synonyms; merged._src_synonyms = srcId; }\n    else if (result.synonyms && merged.synonyms) {\n      const existing = new Set(merged.synonyms);\n      result.synonyms.forEach(s => { if (!existing.has(s)) merged.synonyms.push(s); });\n    }\n    if (result.imgBlob && !merged.imgBlob) { merged.imgBlob = result.imgBlob; merged._src_imgBlob = srcId; }\n    updateProgress(srcId, \'success\', newFields.length > 0 ? `获取 ${newFields.length} 个字段` : \'无新字段\');\n  }\n\n  hideProgress();\n  return Object.keys(merged).some(k => !k.startsWith(\'_\')) ? merged : null;\n}\n\n// ========== 缓存管理 ==========\nfunction saveToCache(query, result) {\n  // 缓存时去除不可序列化的字段(imgBlob)\n  const cacheable = {};\n  for (const [k, v] of Object.entries(result)) {\n    if (k === \'imgBlob\') continue;\n    cacheable[k] = v;\n  }\n  queryCache[query.toLowerCase().trim()] = cacheable;\n  try {\n    // 限制缓存大小\n    const keys = Object.keys(queryCache);\n    if (keys.length > 100) {\n      const toDelete = keys.slice(0, keys.length - 80);\n      toDelete.forEach(k => delete queryCache[k]);\n    }\n    localStorage.setItem(\'cq_cache\', JSON.stringify(queryCache));\n  } catch(e) { /* 存储满等异常 */ }\n  updateCacheInfo();\n}\n\nfunction loadFromCache(query) {\n  const cached = queryCache[query.toLowerCase().trim()];\n  return cached ? {...cached, _fromCache: true} : null;\n}\n\nfunction updateCacheInfo() {\n  const el = document.getElementById(\'cacheCount\');\n  if (el) el.textContent = Object.keys(queryCache).length;\n}\n\n// ========== 搜索入口 (已修改) ==========\nconst searchInput = document.getElementById(\'searchInput\');\nconst searchBtn = document.getElementById(\'searchBtn\');\nconst pasteHint = document.getElementById(\'pasteHint\');\n\n// ====== 原代码（保留） ======\nsearchInput.addEventListener(\'keydown\', e => {\n    if (e.key === \'Enter\') doSearch();\n});\n\n// ====== 新增：粘贴提示显示/隐藏逻辑 ======\nsearchInput.addEventListener(\'focus\', () => {\n    if (searchInput.value.trim() === \'\') {\n        pasteHint.classList.remove(\'hidden\');\n    }\n});\n\nsearchInput.addEventListener(\'blur\', () => {\n    // 延迟隐藏，避免点击提示时已触发 blur 导致点击无效\n    setTimeout(() => {\n        pasteHint.classList.add(\'hidden\');\n    }, 150);\n});\n\nsearchInput.addEventListener(\'input\', () => {\n    if (searchInput.value.trim() !== \'\') {\n        pasteHint.classList.add(\'hidden\');\n    } else {\n        pasteHint.classList.remove(\'hidden\');\n    }\n});\n// ====== 新增：一键粘贴函数 ======\nasync function pasteFromClipboard() {\n    // 检查 Clipboard API 是否可用\n    if (!navigator.clipboard || !navigator.clipboard.readText) {\n        showToast(\'当前浏览器不支持剪贴板读取，请手动粘贴\', \'error\');\n        pasteHint.classList.add(\'hidden\');\n        searchInput.focus();\n        return;\n    }\n    try {\n        const text = await navigator.clipboard.readText();\n        if (!text || text.trim().length === 0) {\n            showToast(\'剪贴板为空\', \'warn\');\n            pasteHint.classList.add(\'hidden\');\n            searchInput.focus();\n            return;\n        }\n        // 填入搜索框（去除首尾空白）\n        searchInput.value = text.trim();\n        pasteHint.classList.add(\'hidden\');\n        searchInput.focus();\n        showToast(\'已粘贴内容到搜索框\', \'success\');\n    } catch (err) {\n        // 常见原因：用户未授予剪贴板权限\n        console.warn(\'剪贴板读取失败:\', err.message);\n        showToast(\'无法读取剪贴板，请检查浏览器权限或手动粘贴\', \'error\');\n        pasteHint.classList.add(\'hidden\');\n        searchInput.focus();\n    }\n}\n\n\nfunction quickSearch(term) {\n    searchInput.value = term;\n    doSearch();\n}\nfunction doRefresh() {\n  showToast(\'正在重新查询最新数据...\', \'warn\');\n  // 传入 true 强制跳过缓存\n  doSearch(true);\n}\n\n\nasync function doSearch(forceRefresh = false) {\n  const q = searchInput.value.trim();\n  if (!q) {\n    showToast(\'请输入查询内容\', \'error\');\n    return;\n  }\n  lastQuery = q; \n  searchBtn.disabled = true;\n  showState(\'loadingState\');\n  document.getElementById(\'bottomSection\').style.display = \'grid\';\n  \n  try {\n    let result = null;\n    let finalQuery = q; \n    let detectedCnName = \'\'; \n    \n    const isChineseInput = /[\\u4e00-\\u9fa5]/.test(q);\n    if (isChineseInput) {\n      showToast(\'检测到中文输入，正在翻译...\', \'warn\');\n      const translatedEn = await translateText(q, \'zh-CN\', \'en\');\n      if (translatedEn) {\n        finalQuery = translatedEn; \n        detectedCnName = q; \n        showToast(`翻译结果: ${translatedEn}`, \'success\');\n      } else {\n        showToast(\'翻译服务暂不可用，尝试使用原名查询\', \'error\');\n      }\n    }\n\n    // --- 2. 先查缓存 (修改点：判断 forceRefresh) ---\n    if (!forceRefresh) {\n      result = loadFromCache(q);\n      if (result) {\n        showToast(\'使用本地缓存数据\', \'warn\');\n        renderResult(result);\n        addHistory(q);\n        showState(\'resultsSection\');\n        return;\n      }\n    }\n\n    // --- 3. 在线查询 ---\n    if (queryMode === \'auto\') {\n      result = await queryAutoMode(finalQuery);\n    } else {\n      result = await queryParallelMode(finalQuery);\n    }\n    \n    if (!result) throw new Error(\'所有数据源均未找到匹配的化学物质信息\');\n\n    // --- 4. 结果补全与回译 ---\n    if (isChineseInput && detectedCnName) {\n      result.cnName = detectedCnName;\n      result._src_cnName = \'user_input\';\n    } else if (!isChineseInput && !result.cnName && result.enName) {\n      const translatedCn = await translateText(result.enName, \'en\', \'zh-CN\');\n      if (translatedCn) {\n        result.cnName = translatedCn;\n        result._src_cnName = \'translator\';\n      }\n    }\n\n    saveToCache(q, result);\n    renderResult(result);\n    addHistory(q);\n    showState(\'resultsSection\');\n  } catch(err) {\n    document.getElementById(\'errorTitle\').textContent = \'查询失败\';\n    document.getElementById(\'errorMsg\').textContent = err.message || \'请检查输入或网络连接\';\n    const detail = document.getElementById(\'errorDetail\');\n    detail.style.display = \'block\';\n    detail.textContent = `查询词: "${lastQuery}" | 模式: ${queryMode===\'auto\'?\'自动切换\':\'并行\'} | 启用源: ${API_SOURCES.filter(s=>sourceEnabled[s.id]).map(s=>s.name).join(\', \')||\'无\'} | 时间: ${new Date().toLocaleTimeString()}`;\n    showState(\'errorState\');\n  } finally {\n    searchBtn.disabled = false;\n  }\n}\n\n\n// ========== 搜索历史 ==========\nfunction addHistory(term) {\n  searchHistory = searchHistory.filter(h => h !== term);\n  searchHistory.unshift(term);\n  if (searchHistory.length > 20) searchHistory = searchHistory.slice(0, 20);\n  localStorage.setItem(\'cq_history\', JSON.stringify(searchHistory));\n  renderHistory();\n}\n\nfunction renderHistory() {\n  const sec = document.getElementById(\'historyCard\');\n  const list = document.getElementById(\'historyList\');\n  if (searchHistory.length === 0) {\n    sec.style.display = \'none\'; return;\n  }\n  sec.style.display = \'block\';\n  list.innerHTML = searchHistory.slice(0, 15).map(h =>\n    `<span class="history-item" onclick="quickSearch(\'${h.replace(/\'/g,"\\\\\'")}\')">${h}</span>`\n  ).join(\'\');\n}\n\n// ========== 数据清除 ==========\nfunction handleClear(type) {\n  const btnMap = { history:\'btnClearHistory\', cache:\'btnClearCache\', all:\'btnClearAll\' };\n  const btn = document.getElementById(btnMap[type]);\n  if (!btn) return;\n\n  // 如果已经是确认状态，执行清除\n  if (btn.classList.contains(\'confirming\')) {\n    if (type === \'history\' || type === \'all\') {\n      searchHistory = [];\n      localStorage.removeItem(\'cq_history\');\n      renderHistory();\n    }\n    if (type === \'cache\' || type === \'all\') {\n      queryCache = {};\n      localStorage.removeItem(\'cq_cache\');\n      updateCacheInfo();\n    }\n    btn.classList.remove(\'confirming\');\n    showToast(`${type===\'all\'?\'全部数据\':type===\'history\'?\'搜索历史\':\'查询缓存\'}已清除`);\n    return;\n  }\n\n  // 进入确认状态\n  btn.classList.add(\'confirming\');\n  if (clearTimers[type]) clearTimeout(clearTimers[type]);\n  clearTimers[type] = setTimeout(() => { btn.classList.remove(\'confirming\'); }, 3000);\n}\n// ========== 新增：通用复制函数 ==========\n/**\n * 复制文本到剪贴板\n * @param {string} text 待复制文本\n * @param {string} label 文本标签（用于提示）\n */\nfunction copyToClipboard(text, label = \'内容\') {\n    if (!text || text === \'—\') {\n        showToast(`无可复制的${label}`, \'error\');\n        return;\n    }\n    \n    navigator.clipboard.writeText(text).then(() => {\n        showToast(`${label}已复制到剪贴板`, \'success\');\n    }).catch(() => {\n        // 降级方案\n        const ta = document.createElement(\'textarea\');\n        ta.value = text;\n        ta.style.position = \'fixed\';\n        ta.style.opacity = \'0\';\n        document.body.appendChild(ta);\n        ta.select();\n        try {\n            document.execCommand(\'copy\');\n            showToast(`${label}已复制到剪贴板`, \'success\');\n        } catch (err) {\n            showToast(`复制失败，请手动复制`, \'error\');\n        }\n        document.body.removeChild(ta);\n    });\n}\n\n// ========== 渲染结果 ==========\n\nfunction renderResult(data) {\n  const {enName, cnName} = extractNames(data);\n  \n  const offlineTag = data._source === \'fallback\' ? \'<span class="offline-badge"><i class="fas fa-wifi" style="opacity:0.5"></i> 内置示例数据</span>\' : \'\';\n  const cacheTag = data._fromCache ? \'<span class="offline-badge"><i class="fas fa-box-archive"></i> 来自本地缓存</span>\' : \'\';\n  \n  // 修改点：如果是缓存数据，显示刷新按钮\n  const refreshBtn = data._fromCache ? \n    `<button class="copy-btn" onclick="doRefresh()" style="margin-left:8px;background:rgba(0,232,144,0.1);border-color:rgba(0,232,144,0.3);color:var(--accent)"><i class="fas fa-rotate-right"></i> 刷新数据</button>` : \'\';\n\n  const nameSrc = data._src_cnName ? srcTag(data._src_cnName) : data._src_enName ? srcTag(data._src_enName) : \'\';\n  const formulaSrc = data._src_molecularFormula ? srcTag(data._src_molecularFormula) : \'\';\n  const mwSrc = data._src_molecularWeight ? srcTag(data._src_molecularWeight) : \'\';\n  const keySrc = data._src_inchiKey ? srcTag(data._src_inchiKey) : \'\';\n  \n  // ====== info-grid 替换开始（含别名/同义词上移） ======\n\n// --- 新增：提前计算别名/同义词 HTML ---\nconst otherNames = (data.synonyms||[]).filter(s => {\n    if (s===enName||s===cnName||s===data.iupacName) return false;\n    if (/^\\s*$/.test(s)) return false;\n    if (s.length > 200) return false;\n    return true;\n}).slice(0, 30);\n\nconst aliasHtml = otherNames.length > 0\n    ? `<div style="margin-bottom:16px">\n        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-weight:600">\n            <i class="fas fa-tags" style="color:var(--accent);font-size:11px"></i>\n            别名 / 同义词 (${data.synonyms.length})\n            ${data._src_synonyms ? srcTag(data._src_synonyms) : \'\'}\n        </div>\n        <div style="display:flex;flex-wrap:wrap;gap:6px">\n            ${otherNames.map(n => `<span style="padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--fg2);cursor:pointer;transition:all .2s" onclick="quickSearch(\'${n.replace(/\'/g,"\\\\\'")}\')" title="点击搜索" onmouseover="this.style.borderColor=\'var(--accent)\';this.style.color=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--fg2)\'">${n}</span>`).join(\'\')}\n        </div>\n    </div>`\n    : \'\';\n\ndocument.getElementById(\'infoCard\').innerHTML = `\n<div class="compound-names">\n    <h2>\n        ${enName || data.iupacName || \'未知化合物\'}\n        ${nameSrc}\n        ${enName ? `<i class="fas fa-copy copy-icon" onclick="copyToClipboard(\'${enName}\', \'英文名称\')" title="点击复制英文名称"></i>` : \'\'}\n    </h2>\n    ${cnName ? `\n    <div class="cn-name">\n        ${cnName}\n        <i class="fas fa-copy copy-icon" onclick="copyToClipboard(\'${cnName}\', \'中文名称\')" title="点击复制中文名称" style="color: var(--accent2)"></i>\n    </div>` : \'\'}\n    ${data.iupacName && data.iupacName !== enName ? `\n    <div class="en-name" style="font-size:12px;opacity:0.7;margin-top:3px">\n        IUPAC: ${data.iupacName}\n        <i class="fas fa-copy copy-icon" onclick="copyToClipboard(\'${data.iupacName}\', \'IUPAC名称\')" title="点击复制IUPAC名称" style="font-size:10px"></i>\n    </div>` : \'\'}\n    ${data.cid ? `<span class="source-badge"><i class="fas fa-database"></i> PubChem CID: ${data.cid}</span>` : \'\'}\n    ${data.casNumber ? `<span class="source-badge" style="background:rgba(167,139,250,0.06);color:#a78bfa;border-color:rgba(167,139,250,0.12)"><i class="fas fa-certificate"></i> CAS: ${data.casNumber}</span>` : \'\'}\n    ${offlineTag}${cacheTag}${refreshBtn}\n</div>\n\n${aliasHtml}\n\n<div class="info-grid">\n    <div class="info-item">\n        <div class="label">分子式</div>\n        <div class="value">${formatFormula(data.molecularFormula)}${formulaSrc}</div>\n    </div>\n    <div class="info-item">\n        <div class="label">分子量</div>\n        <div class="value">${ data.molecularWeight ? (typeof data.molecularWeight === \'number\' ? data.molecularWeight.toFixed(4) : data.molecularWeight) : \'—\' }<span class="unit" style="margin-left:3px">g/mol</span>${mwSrc}</div>\n    </div>\n    ${data.meltingPoint ? `\n    <div class="info-item">\n        <div class="label">熔点</div>\n        <div class="value">${data.meltingPoint}${ data._src_meltingPoint ? srcTag(data._src_meltingPoint) : \'\' }</div>\n    </div>` : \'\'}\n    ${data.boilingPoint ? `\n    <div class="info-item">\n        <div class="label">沸点</div>\n        <div class="value">${data.boilingPoint}${ data._src_boilingPoint ? srcTag(data._src_boilingPoint) : \'\' }</div>\n    </div>` : \'\'}\n    ${data.density ? `\n    <div class="info-item" c14;\n  --border-light: #162438;\n  --border-focus: #38bdf8;\n  --text-muted: #7890b0;\n  --text-dim: #4a6480;\n  --text-accent: #7dd3fc;\n  --text-danger: #ff7a7a;\n  --text-success: #4ade80;\n  --text-warn: #fbbf24;\n  --text-info: #60c5f8;\n  --surface-hover: #162236;\n  --surface-active: #1e2a42;\n  --overlay: rgba(0,0,0,.6);\n  --overlay-light: rgba(0,0,0,.3);\n  --tag-bg: rgba(56,189,248,.08);\n  --tag-text: #38bdf8;\n  --input-bg: #060a10;\n  --input-border: #1c2c44;\n  --input-focus: #38bdf8;\n  --scrollbar: #28405e;\n  --scrollbar-hover: #3a5880;\n  --selection: rgba(56,189,248,.2);\n}\n</style>\n</head>\n<body>\n<header class="top-header">\n    <h1><i class="fas fa-flask"></i>化学文献助手</h1>\n    <nav class="tab-nav">\n        <button class="tab-btn active" id="tabTrans" onclick="switchTab(\'trans\')"><i class="fas fa-language"></i> 文献翻译</button>\n        <button class="tab-btn" id="tabChem" onclick="switchTab(\'chem\')"><i class="fas fa-vial"></i> 投料提取</button>\n    </nav>\n</header>\n<div class="page active" id="pageTrans">\n    <div class="trans-hdr">\n        <div class="lang-switch">\n            <button class="lang-btn" id="btnZhEn" onclick="setDir(\'zh2en\')">中 → 英</button>\n            <span class="lang-arrow"><i class="fas fa-exchange-alt"></i></span>\n            <button class="lang-btn active" id="btnEnZh" onclick="setDir(\'en2zh\')">英 → 中</button>\n        </div>\n        <button class="hdr-btn stop-btn" id="stopBtn" onclick="stopTrans()"><i class="fas fa-stop"></i> 停止</button>\n        <button class="hdr-btn translate-btn" id="transBtn" onclick="startTrans()"><span class="spinner"></span><span>开始翻译</span></button>\n    </div>\n    <div class="main-area">\n        <section class="panel panel-left">\n            <div class="panel-header"><span><i class="fas fa-file-alt"></i>原文输入</span><span class="info" id="inputInfo">0 段落 · 0 字符</span></div>\n            <div class="input-wrap"><textarea class="text-input" id="sourceText" placeholder="在此粘贴文献原文，或导入文件..."></textarea></div>\n            <div class="file-bar">\n                <button class="file-btn" onclick="document.getElementById(\'fileInput\').click()"><i class="fas fa-folder-open"></i> 导入文件</button>\n                <input type="file" id="fileInput" accept=".txt,.pdf" onchange="handleFile(event)">\n                <span class="sm-label">OCR语言:</span>\n                <select class="ocr-sel" id="ocrLang"><option value="eng">English</option><option value="chi_sim">中文简体</option><option value="eng+chi_sim">英文+中文</option></select>\n                <label class="chk-label"><input type="checkbox" id="ocrAuto" checked> 文本不足时自动OCR</label>\n            </div>\n        </section>\n        <section class="panel panel-right">\n            <div class="panel-header"><span><i class="fas fa-align-left"></i>翻译结果</span><span class="info" id="outputInfo"></span></div>\n            <div class="progress-wrap" id="progWrap"><div class="prog-outer"><div class="prog-inner" id="progBar"></div></div><div class="prog-text" id="progText">准备中...</div></div>\n            <div class="output-wrap" id="outputArea"><div class="output-placeholder" id="outPlaceholder"><i class="fas fa-book-open"></i><p>翻译结果将在此处显示</p></div></div>\n            <div class="output-bar">\n                <button class="file-btn" onclick="copyAll()"><i class="fas fa-copy"></i> 复制全部</button>\n                <button class="file-btn" onclick="exportTxt()"><i class="fas fa-download"></i> 导出TXT</button>\n                <button class="file-btn" onclick="clearOut()"><i class="fas fa-trash-alt"></i> 清空</button>\n            </div>\n        </section>\n    </div>\n    <footer class="api-footer">\n        <div class="af-header"><h3><i class="fas fa-plug"></i>翻译接口配置</h3><button class="test-btn" id="testBtn" onclick="testAll()"><i class="fas fa-wifi"></i> 测试连接</button></div>\n        <div class="key-config">\n            <label><i class="fas fa-key" style="color:var(--cyan);margin-right:5px;"></i>DeepSeek API Key</label>\n            <div class="key-row">\n                <input type="password" class="key-input masked" id="deepseekKeyInput" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx">\n                <button class="key-sm-btn" id="keyToggleBtn" onclick="toggleKeyVisibility()"><i class="fas fa-eye"></i> 显示</button>\n                <button class="key-sm-btn save" onclick="saveDeepSeekKey()"><i class="fas fa-save"></i> 保存</button>\n                <button class="key-sm-btn clear" onclick="clearDeepSeekKey()"><i class="fas fa-times"></i> 清除</button>\n            </div>\n            <div class="key-status" id="keyStatus">Key 未设置</div>\n        </div>\n        <div class="api-grid" id="apiGrid"></div>\n    </footer>\n</div>\n<div class="page" id="pageChem">\n    <div class="chem-page-hdr">\n        <h2><i class="fas fa-flask"></i>化学投料量提取</h2>\n        <div class="chem-mode-tog">\n            <button class="chem-mode-btn active" id="chemModeLocal" onclick="setChemMode(\'local\')"><i class="fas fa-microchip"></i> 本地提取</button>\n            <button class="chem-mode-btn" id="chemModeAI" onclick="setChemMode(\'ai\')"><i class="fas fa-robot"></i> AI 提取</button>\n        </div>\n        <button class="file-btn" onclick="openRegexModal()" style="border-color:var(--cyan);color:var(--cyan);"><i class="fas fa-code"></i> 正则管理</button>\n<button class="chem-extract-btn" id="chemExtractBtn" onclick="startChemExtract()"><span class="spinner"></span><span>提取投料信息</span></button>\n\n    </div>\n    <div class="chem-main">\n        <section class="chem-panel chem-panel-left">\n            <div class="panel-header"><span><i class="fas fa-file-alt"></i>文献原文</span><span class="info" id="chemInputInfo">0 字符</span></div>\n            <div class="input-wrap"><textarea class="text-input" id="chemSourceText" placeholder="在此粘贴文献中的实验步骤段落...&#10;&#10;例如：&#10;To a solution of toluene (5.00 g, 54.27 mmol) in ethanol (5.00 g, 108.53 mmol) was added acetone (10.00 mL).&#10;&#10;未提取到的数据字段使用&quot;-&quot;代替。"></textarea></div>\n            <div class="file-bar">\n                <button class="file-btn" onclick="document.getElementById(\'chemFileInput\').click()"><i class="fas fa-folder-open"></i> 导入文件</button>\n                <input type="file" id="chemFileInput" accept=".txt,.pdf" onchange="handleChemFile(event)">\n            </div>\n        </section>\n        <section class="chem-panel chem-panel-right">\n            <div class="panel-header"><span><i class="fas fa-list-ol"></i>投料信息</span><span class="info" id="chemOutputInfo"></span></div>\n            <div class="chem-output-wrap"><div class="chem-result-box empty" id="chemResultBox">提取结果将在此处显示，格式示例（Tab分隔）：&#10;&#10;序号	名称	角色	分子量	当量	纯度	质量	摩尔量	浓度	计算体积	体积比	溶剂体积&#10;1	甲苯	试剂	92.14	1	100%	5.0000 g	54.2652 mmol	-	-	-	-&#10;2	乙醇	试剂	46.07	2	100%	4.9999 g	108.5305 mmol	-	-	-	-&#10;3	丙酮	溶剂	58.08	1	100%	-	-	-	-	2 mL/g	10.00 mL&#10;4	1-[(E)-(phenylmethylidene)amino]propan-2-ol	产物	163.22	1	100%	8.8571 g	54.2652 mmol	-	-	-	-&#10;5	丁基锂	试剂	64.06	1	100%	-	54.2652 mmol	2 M	27.133 mL	-	-&#10;&#10;未提取到的数据使用"-"代替。</div>\n</div>\n            <div class="chem-output-bar">\n                <button class="file-btn" onclick="copyChemResult()"><i class="fas fa-copy"></i> 一键复制</button>\n                <button class="file-btn" onclick="clearChemResult()"><i class="fas fa-trash-alt"></i> 清空</button>\n            </div>\n        </section>\n    </div>\n    \n</div>\n<div class="modal-ov" id="ocrModal">\n    <div class="modal-box">\n        <h3><i class="fas fa-eye"></i>OCR 文字识别中</h3>\n        <div class="modal-prog"><div class="modal-prog-bar" id="ocrProgBar"></div></div>\n        <div class="modal-prog-txt" id="ocrProgTxt">正在初始化...</div>\n        <button class="modal-cancel" onclick="cancelOCR()">取消</button>\n    </div>\n</div>\n\n\n<!-- 正则管理弹窗 -->\n<div class="modal-ov" id="regexModal">\n  <div class="modal-box" style="max-width:800px;max-height:85vh;overflow-y:auto;text-align:left;padding:20px;">\n    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">\n      <h3 style="margin:0;"><i class="fas fa-code" style="color:var(--accent);margin-right:8px;"></i>正则表达式管理</h3>\n      <button class="modal-cancel" onclick="closeRegexModal()" style="margin:0;padding:4px 12px;">\n        <i class="fas fa-times"></i> 关闭\n      </button>\n    </div>\n    \n    <!-- 操作按钮栏 -->\n    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">\n      <button class="file-btn" onclick="exportRegexToFile()"><i class="fas fa-download"></i> 导出JSON文件</button>\n      <button class="file-btn" onclick="copyAllRegex()"><i class="fas fa-copy"></i> 复制全部</button>\n      <button class="file-btn" onclick="document.getElementById(\'importRegexFile\').click()"><i class="fas fa-upload"></i> 导入JSON文件</button>\n      <input type="file" id="importRegexFile" accept=".json" style="display:none;" onchange="importRegexFromFile(event)">\n      <button class="file-btn" onclick="showImportTextarea()"><i class="fas fa-paste"></i> 粘贴导入</button>\n      <button class="file-btn" onclick="showAddRegexForm()"><i class="fas fa-plus"></i> 新增正则</button>\n      <button class="file-btn" onclick="confirmResetRegex()" style="border-color:var(--red);color:var(--red);"><i class="fas fa-undo"></i> 恢复默认</button>\n<button class="file-btn" onclick="showClearRegexConfirm()" style="border-color:var(--red);color:var(--red);"><i class="fas fa-trash-alt"></i> 一键清除</button>\n\n    \n    </div>\n\n    <!-- 导入文本框（默认隐藏） -->\n    <div id="importTextareaWrap" style="display:none;margin-bottom:12px;">\n      <label style="font-size:12px;color:var(--fg-sec);display:block;margin-bottom:4px;">粘贴JSON内容：</label>\n      <textarea id="importTextarea" style="width:100%;height:100px;background:var(----surface-3);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:monospace;font-size:11px;padding:8px;resize:vertical;outline:none;" placeholder=\'[{"id":"xxx","name":"名称","desc":"描述","pattern":"正则内容","flags":"gi","enabled":true}]\'></textarea>\n      <div style="display:flex;gap:8px;margin-top:6px;">\n        <button class="file-btn" onclick="doImportFromTextarea()" style="border-color:var(--green);color:var(--green);"><i class="fas fa-check"></i> 确认导入</button>\n        <button class="file-btn" onclick="hideImportTextarea()"><i class="fas fa-times"></i> 取消</button>\n      </div>\n    </div>\n\n    <!-- 新增/编辑正则表单（默认隐藏） -->\n    <div id="addRegexFormWrap" style="display:none;margin-bottom:12px;padding:12px;border:1px solid var(--accent);border-radius:8px;background:var(--accent-dim);">\n      <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px;" id="regexFormTitle">新增正则</div>\n      <div style="display:grid;grid-template-columns:100px 1fr;gap:6px;align-items:center;">\n        <label style="font-size:11px;color:var(--fg-sec);">ID:</label>\n        <input type="text" id="regexFormId" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(----surface-3);color:var(--fg);font-size:12px;outline:none;" placeholder="如: customRe1">\n        <label style="font-size:11px;color:var(--fg-sec);">名称:</label>\n        <input type="text" id="regexFormName" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(----surface-3);color:var(--fg);font-size:12px;outline:none;" placeholder="如: 自定义模式">\n        <label style="font-size:11px;color:var(--fg-sec);">描述:</label>\n        <input type="text" id="regexFormDesc" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(----surface-3);color:var(--fg);font-size:12px;outline:none;" placeholder="如: X (Y g) 格式">\n        <label style="font-size:11px;color:var(--fg-sec);">正则:</label>\n        <input type="text" id="regexFormPattern" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(----surface-3);color:var(--fg);font-family:monospace;font-size:11px;outline:none;" placeholder="如: ([\\w]+)\\s*\\(([\\d.]+)\\s*g\\)">\n        <label style="font-size:11px;color:var(--fg-sec);">标志:</label>\n        <input type="text" id="regexFormFlags" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(----surface-3);color:var(--fg);font-family:monospace;font-size:12px;outline:none;width:80px;" placeholder="gi">\n        <label style="font-size:11px;color:var(--fg-sec);">启用:</label>\n        <label class="chk-label"><input type="checkbox" id="regexFormEnabled" checked> 启用此正则</label>\n      </div>\n      <div style="display:flex;gap:8px;margin-top:8px;">\n        <button class="file-btn" onclick="doSaveRegex()" style="border-color:var(--green);color:var(--green);"><i class="fas fa-save"></i> 保存</button>\n        <button class="file-btn" onclick="hideAddRegexForm()"><i class="fas fa-times"></i> 取消</button>\n      </div>\n    </div>\n\n    <!-- 正则列表 -->\n    <div id="regexListContainer" style="max-height:400px;overflow-y:auto;"></div>\n  </div>\n</div>\n\n<!-- 确认重置弹窗 -->\n<div class="modal-ov" id="confirmResetModal">\n  <div class="modal-box" style="min-width:300px;">\n    <h3><i class="fas fa-exclamation-triangle" style="color:var(--yellow);margin-right:8px;"></i>确认重置</h3>\n    <p style="font-size:13px;color:var(--fg-sec);margin-bottom:16px;">将恢复所有正则为默认配置，自定义正则将丢失。</p>\n    <div style="display:flex;gap:10px;justify-content:center;">\n      <button class="modal-cancel" onclick="closeConfirmReset()" style="margin:0;">取消</button>\n      <button class="hdr-btn translate-btn" onclick="doResetRegex()" style="margin:0;padding:7px 20px;">确认重置</button>\n    </div>\n  </div>\n</div>\n\n\n\n<div class="toast-wrap" id="toastWrap"></div>\n<script>\npdfjsLib.GlobalWorkerOptions.workerSrc = \'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js\';\n\nfunction fetchWithTimeout(url, options, timeoutMs) {\n    timeoutMs = timeoutMs || 10000;\n    var controller = new AbortController();\n    var timer = setTimeout(function() { controller.abort(); }, timeoutMs);\n    var merged = Object.assign({}, options || {}, { signal: controller.signal });\n    return fetch(url, merged).then(function(res) { clearTimeout(timer); return res; }).catch(function(err) { clearTimeout(timer); throw err; });\n}\n\nvar keyVisible = false;\nfunction getStoredKey() { try { return localStorage.getItem(\'deepseek_key\') || \'\'; } catch(e) { return \'\'; } }\nfunction maskKey(key) { if (!key || key.length < 8) return \'****\'; return key.substring(0, 4) + \'****\' + key.substring(key.length - 4); }\nfunction initKeyUI() {\n    var key = getStoredKey();\n    var input = document.getElementById(\'deepseekKeyInput\');\n    var status = document.getElementById(\'keyStatus\');\n    if (key) { input.value = key; input.type = \'password\'; input.className = \'key-input masked\'; keyVisible = false; document.getElementById(\'keyToggleBtn\').innerHTML = \'<i class="fas fa-eye"></i> 显示\'; status.textContent = \'Key 已保存 · \' + maskKey(key); status.style.color = \'var(--green)\'; }\n    else { input.value = \'\'; input.type = \'password\'; input.className = \'key-input masked\'; keyVisible = false; status.textContent = \'Key 未设置\'; status.style.color = \'var(--muted)\'; }\n}\nfunction toggleKeyVisibility() {\n    var input = document.getElementById(\'deepseekKeyInput\');\n    var btn = document.getElementById(\'keyToggleBtn\');\n    keyVisible = !keyVisible;\n    if (keyVisible) { input.type = \'text\'; input.className = \'key-input\'; btn.innerHTML = \'<i class="fas fa-eye-slash"></i> 隐藏\'; }\n    else { input.type = \'password\'; input.className = \'key-input masked\'; btn.innerHTML = \'<i class="fas fa-eye"></i> 显示\'; }\n}\nfunction saveDeepSeekKey() { var key = document.getElementById(\'deepseekKeyInput\').value.trim(); if (!key) { toast(\'请输入 API Key\', \'warning\'); return; } try { localStorage.setItem(\'deepseek_key\', key); initKeyUI(); toast(\'Key 已保存\', \'success\'); } catch(e) { toast(\'保存失败\', \'error\'); } }\nfunction clearDeepSeekKey() { try { localStorage.removeItem(\'deepseek_key\'); } catch(e) {} document.getElementById(\'deepseekKeyInput\').value = \'\'; initKeyUI(); toast(\'Key 已清除\', \'info\'); }\n\nfunction deepseekChat(messages, useJson) {\n    var key = getStoredKey();\n    if (!key) return Promise.reject(new Error(\'DeepSeek Key 未设置\'));\n    var body = { model: \'deepseek-chat\', messages: messages, temperature: 0.1, max_tokens: 4096 };\n    if (useJson) body.response_format = { type: \'json_object\' };\n    return fetchWithTimeout(\'https://api.deepseek.com/chat/completions\', { method: \'POST\', headers: { \'Content-Type\': \'application/json\', \'Authorization\': \'Bearer \' + key }, body: JSON.stringify(body) }, 60000).then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(\'HTTP \' + r.status + \': \' + t.substring(0, 200)); }); } return r.json(); }).then(function(d) { if (d.choices && d.choices[0] && d.choices[0].message) { return d.choices[0].message.content; } throw new Error(\'返回格式异常\'); });\n}\n\nvar APIS = {\n    mymemory: { id: \'mymemory\', name: \'MyMemory\', desc: \'免费API，日限额约5000字符\', limit: 500, tagClass: \'mymemory\', status: \'unknown\', selected: true,\n        translate: function(text, from, to) { var lp = from + \'|\' + to; return fetchWithTimeout(\'https://api.mymemory.translated.net/get?q=\' + encodeURIComponent(text) + \'&langpair=\' + encodeURIComponent(lp), null, 12000).then(function(r) { if (!r.ok) throw new Error(\'HTTP \' + r.status); return r.json(); }).then(function(d) { if (d.responseStatus === 200 && d.responseData) { return d.responseData.translatedText; } throw new Error(d.responseDetails || \'翻译失败\'); }); },\n        test: function() { return fetchWithTimeout(\'https://api.mymemory.translated.net/get?q=hello&langpair=en|zh-CN\', null, 6000).then(function(r) { if (!r.ok) throw new Error(\'HTTP \' + r.status); return r.json(); }).then(function(d) { if (d.responseStatus === 200) return true; throw new Error(\'异常响应\'); }); }\n    },\n    deep +/g); } if (!parts || parts.length <= 1) { parts = text.split(/(?<=[,，;；])/g); } if (!parts || parts.length <= 1) { var words = text.split(/\\s+/); parts = []; for (var i = 0; i < words.length; i += 15) { var c = words.slice(i, i + 15).join(\' \'); if (c) parts.push(c); } } var chunks = []; var cur = \'\'; for (var j = 0; j < parts.length; j++) { if (cur.length + parts[j].length > maxLen && cur.length > 0) { chunks.push(cur.trim()); cur = \'\'; } cur += parts[j]; } if (cur.trim()) chunks.push(cur.trim()); return chunks; }\nfunction delay(ms) { return new Promise(function(resolve) { setTimeout(resolve, ms); }); }\nfunction toast(msg, type) { type = type || \'info\'; var w = document.getElementById(\'toastWrap\'); var t = document.createElement(\'div\'); t.className = \'toast \' + type; t.textContent = msg; w.appendChild(t); setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 5200); }\nfunction updateInfo() { var txt = document.getElementById(\'sourceText\').value; var ps = splitParas(txt); document.getElementById(\'inputInfo\').textContent = ps.length + \' 段落 · \' + txt.length + \' 字符\'; }\nfunction updateChemInfo() { document.getElementById(\'chemInputInfo\').textContent = document.getElementById(\'chemSourceText\').value.length + \' 字符\'; }\nfunction escapeHtml(s) { var d = document.createElement(\'div\'); d.textContent = s; return d.innerHTML; }\nfunction switchTab(tab) { document.getElementById(\'tabTrans\').className = \'tab-btn\' + (tab === \'trans\' ? \' active\' : \'\'); document.getElementById(\'tabChem\').className = \'tab-btn\' + (tab === \'chem\' ? \' active\' : \'\');     document.getElementById(\'pageTrans\').className = \'page\' + (tab === \'trans\' ? \' active\' : \'\');\n    document.getElementById(\'pageChem\').className = \'page\' + (tab === \'chem\' ? \' active\' : \'\');\n}\nfunction setDir(d) {\n state.dir = d; document.getElementById(\'btnZhEn\').className = \'lang-btn\' + (d === \'zh2en\' ? \' active\' : \'\'); document.getElementById(\'btnEnZh\').className = \'lang-btn\' + (d === \'en2zh\' ? \' active\' : \'\'); }\nfunction setChemMode(mode) { state.chemMode = mode; document.getElementById(\'chemModeLocal\').className = \'chem-mode-btn\' + (mode === \'local\' ? \' active\' : \'\'); document.getElementById(\'chemModeAI\').className = \'chem-mode-btn\' + (mode === \'ai\' ? \' active\' : \'\'); }\n\nfunction renderGrid() { var g = document.getElementById(\'apiGrid\'); g.innerHTML = \'\'; var keys = Object.keys(APIS); for (var i = 0; i < keys.length; i++) { var k = keys[i]; var api = APIS[k]; var card = document.createElement(\'div\'); card.className = \'api-card\' + (api.selected ? \' sel\' : \'\'); card.id = \'card_\' + k; card.onclick = (function(key) { return function() { toggleApi(key); }; })(k); var stTxt = api.status === \'online\' ? \'在线\' : api.status === \'offline\' ? \'离线\' : api.status === \'checking\' ? \'检测中\' : \'未知\'; card.innerHTML = \'<div class="api-chk"><i class="fas fa-check"></i></div><div class="api-info"><div class="api-name">\' + api.name + \'</div><div class="api-desc">\' + api.desc + \' · 限\' + api.limit + \'字/次</div></div><div class="api-dot \' + api.status + \'" id="dot_\' + k + \'" title="\' + stTxt + \'"></div>\'; g.appendChild(card); } }\nfunction toggleApi(k) { APIS[k].selected = !APIS[k].selected; var c = document.getElementById(\'card_\' + k); if (APIS[k].selected) c.classList.add(\'sel\'); else c.classList.remove(\'sel\'); }\nfunction getSelected() { var keys = Object.keys(APIS); var sel = []; for (var i = 0; i < keys.length; i++) { if (APIS[keys[i]].selected) sel.push(APIS[keys[i]]); } return sel; }\nfunction getOnline() { return getSelected().filter(function(a) { return a.status === \'online\'; }); }\nfunction setDot(k, st) { APIS[k].status = st; var dot = document.getElementById(\'dot_\' + k); if (dot) { dot.className = \'api-dot \' + st; dot.title = st === \'online\' ? \'在线\' : st === \'offline\' ? \'离线\' : st === \'checking\' ? \'检测中\' : \'未知\'; } }\n\nfunction testAll() { var keys = Object.keys(APIS); var btn = document.getElementById(\'testBtn\'); btn.disabled = true; btn.innerHTML = \'<i class="fas fa-spinner fa-spin"></i> 测试中...\'; var idx = 0, onCount = 0; function testNext() { if (idx >= keys.length) { btn.disabled = false; btn.innerHTML = \'<i class="fas fa-wifi"></i> 测试连接\'; toast(\'连接测试完成：\' + onCount + \'/\' + keys.length + \' 个接口可用\', onCount > 0 ? \'success\' : \'error\'); return; } var key = keys[idx]; setDot(key, \'checking\'); APIS[key].test().then(function() { setDot(key, \'online\'); onCount++; }).catch(function() { setDot(key, \'offline\'); if (key === \'deepseek\' && getStoredKey()) setDot(key, \'unknown\'); }).finally(function() { idx++; setTimeout(testNext, 100); }); } testNext(); }\n\nfunction transWithApi(api, text) { var from, to; if (api.id === \'mymemory\') { var ml = getMemLangs(); from = ml.from; to = ml.to; } else { var gl = getLangs(); from = gl.from; to = gl.to; } var chunks = splitChunks(text, api.limit); if (chunks.length === 1) return api.translate(chunks[0], from, to); var results = []; var chain = Promise.resolve(); for (var i = 0; i < chunks.length; i++) { (function(idx) { chain = chain.then(function() { if (state.stopReq) throw new Error(\'已停止\'); return delay(350).then(function() { return api.translate(chunks[idx], from, to); }); }).then(function(t) { results.push(t); }); })(i); } return chain.then(function() { return results.join(\'\'); }); }\n\nfunction createParaEl(idx, orig) { var div = document.createElement(\'div\'); div.className = \'res-para\'; div.id = \'res_\' + idx; div.innerHTML = \'<div class="res-num"><span>段落 \' + (idx+1) + \'</span><button class="copy-p-btn" onclick="copyPara(\' + idx + \')"><i class="fas fa-copy"></i> 复制</button></div><div class="res-orig">\' + escapeHtml(orig) + \'</div><div class="res-trans" id="trans_\' + idx + \'"><div class="res-wait"><i class="fas fa-spinner"></i>等待翻译...</div></div>\'; return div; }\nfunction setParaSingle(idx, api, text) {\n  var el = document.getElementById(\'trans_\' + idx);\n  if (!el) return;\n  el.innerHTML = \'<span class="api-tag \' + api.tagClass + \'">\' + api.name + \'</span><br>\' + escapeHtml(text);\n  el.contentEditable = \'true\';\n  el.setAttribute(\'data-api\', api.name);\n  state.results[idx] = { type: \'single\', api: api.name, text: text };\n}\n\nfunction setParaError(idx, msg) { var el = document.getElementById(\'trans_\' + idx); if (!el) return; el.innerHTML = \'<div class="res-err">错误: \' + escapeHtml(msg) + \'</div>\'; state.results[idx] = { type: \'error\', msg: msg }; }\nfunction updateProgress(done, total) { var pct = total > 0 ? Math.round(done / total * 100) : 0; document.getElementById(\'progBar\').style.width = pct + \'%\'; document.getElementById(\'progText\').textContent = \'已翻译 \' + done + \' / \' + total + \' 段 (\' + pct + \'%)\'; }\n\nfunction startTrans() { if (state.translating) return; var txt = document.getElementById(\'sourceText\').value.trim(); if (!txt) { toast(\'请输入或导入原文\', \'warning\'); return; } var paras = splitParas(txt); if (paras.length === 0) { toast(\'未检测到有效段落\', \'warning\'); return; } state.paras = paras; state.results = new Array(paras.length); state.stopReq = false; state.translating = true; document.getElementById(\'transBtn\').disabled = true; document.getElementById(\'transBtn\').classList.add(\'loading\'); document.getElementById(\'stopBtn\').classList.add(\'visible\'); document.getElementById(\'progWrap\').classList.add(\'visible\'); document.getElementById(\'outPlaceholder\').style.display = \'none\'; updateProgress(0, paras.length); var area = document.getElementById(\'outputArea\'); area.innerHTML = \'\'; for (var i = 0; i < paras.length; i++) { area.appendChild(createParaEl(i, paras[i])); } runSingleTranslation(); }\nfunction runSingleTranslation() { var apis = getOnline(); if (apis.length === 0) { toast(\'无可用接口，请先测试连接或选择接口\', \'error\'); finishTrans(); return; } var api = apis[0]; var paras = state.paras; var idx = 0; toast(\'使用 \' + api.name + \' 翻译中...\', \'info\'); function next() { if (state.stopReq || idx >= paras.length) { finishTrans(); return; } transWithApi(api, paras[idx]).then(function(t) { setParaSingle(idx, api, t); }).catch(function(e) { setParaError(idx, e.message); }).finally(function() { idx++; updateProgress(idx, paras.length); setTimeout(next, 150); }); } next(); }\nfunction stopTrans() { state.stopReq = true; toast(\'正在停止...\', \'warning\'); }\nfunction finishTrans() { state.translating = false; document.getElementById(\'transBtn\').disabled = false; document.getElementById(\'transBtn\').classList.remove(\'loading\'); document.getElementById(\'stopBtn\').classList.remove(\'visible\'); var done = 0; for (var i = 0; i < state.results.length; i++) { if (state.results[i] && state.results[i].text) done++; } document.getElementById(\'outputInfo\').textContent = \'完成 \' + done + \'/\' + state.paras.length + \' 段\'; if (state.stopReq) toast(\'翻译已停止\', \'warning\'); else if (done === state.paras.length) toast(\'全部翻译完成\', \'success\'); else toast(\'翻译结束，部分段落失败\', \'warning\'); }\nfunction copyPara(idx) {\n  var el = document.getElementById(\'trans_\' + idx);\n  if (!el) return;\n  var tag = el.querySelector(\'.api-tag\');\n  var text = el.innerText.replace(tag ? tag.textContent : \'\', \'\').trim();\n  if (!text) return;\n  navigator.clipboard.writeText(text).then(function() {\n    toast(\'已复制段落 \' + (idx + 1), \'success\');\n  }).catch(function() {\n    var ta = document.createElement(\'textarea\');\n    ta.value = text;\n    ta.style.position = \'fixed\';\n    ta.style.opacity = \'0\';\n    document.body.appendChild(ta);\n    ta.select();\n    document.execCommand(\'copy\');\n    document.body.removeChild(ta);\n    toast(\'已复制段落 \' + (idx + 1), \'success\');\n  });\n}\n\nfunction copyAll() {\n  var lines = [];\n  for (var i = 0; i < state.results.length; i++) {\n    if (!state.results[i] || !state.results[i].text) continue;\n    var el = document.getElemen nt = \'\'; }\n\nfunction handleFile(e) { var file = e.target.files[0]; if (!file) return; var name = file.name.toLowerCase(); if (name.endsWith(\'.txt\')) { var reader = new FileReader(); reader.onload = function(ev) { document.getElementById(\'sourceText\').value = ev.target.result; updateInfo(); toast(\'已导入 \' + file.name, \'success\'); }; reader.readAsText(file, \'UTF-8\'); } else if (name.endsWith(\'.pdf\')) { handlePDF(file, \'sourceText\'); } else { toast(\'不支持的文件格式\', \'error\'); } e.target.value = \'\'; }\nfunction handleChemFile(e) { var file = e.target.files[0]; if (!file) return; var name = file.name.toLowerCase(); if (name.endsWith(\'.txt\')) { var reader = new FileReader(); reader.onload = function(ev) { document.getElementById(\'chemSourceText\').value = ev.target.result; updateChemInfo(); toast(\'已导入 \' + file.name, \'success\'); }; reader.readAsText(file, \'UTF-8\'); } else if (name.endsWith(\'.pdf\')) { handlePDF(file, \'chemSourceText\'); } else { toast(\'不支持的文件格式\', \'error\'); } e.target.value = \'\'; }\n\nfunction handlePDF(file, targetId) { toast(\'正在读取PDF...\', \'info\'); var reader = new FileReader(); reader.onload = function(ev) { var buf = new Uint8Array(ev.target.result); extractPDFText(buf).then(function(text) { if (text.trim().length > 50) { document.getElementById(targetId).value = text; if (targetId === \'sourceText\') updateInfo(); if (targetId === \'chemSourceText\') updateChemInfo(); toast(\'PDF文本提取成功\', \'success\'); } else { toast(\'PDF文本层不足，尝试OCR识别...\', \'warning\'); if (document.getElementById(\'ocrAuto\').checked) { doOCR(buf, targetId); } else { toast(\'请手动勾选"文本不足时自动OCR"\', \'warning\'); } } }).catch(function(err) { toast(\'PDF读取失败: \' + err.message, \'error\'); }); }; reader.readAsArrayBuffer(file); }\nfunction extractPDFText(buf) { return pdfjsLib.getDocument({ data: buf }).promise.then(function(pdf) { var total = pdf.numPages; var texts = []; var chain = Promise.resolve(); for (var i = 1; i <= total; i++) { (function(pn) {         }\n\n        /* 提取浓度 */\n        if (it.conc && it.conc !== \'-\') {\n            conc = it.conc.replace(/，/g, \' \').trim();\n        }\n\n        /* 处理用量与体积计算 */\n        if (it.amount && it.amount !== \'-\') {\n            var amtStr = it.amount;\n            /* 如果是浓度表达式（如 2 M，27.13 mL），拆分到对应列 */\n            if (/\\d\\s*M\\s*(，|,)/.test(amtStr) || /mol\\/L/.test(amtStr)) {\n                conc = amtStr.replace(/，/g, \' \').replace(/\\s+/g, \' \').trim();\n                var volMatch = amtStr.match(/([\\d.]+)\\s*mL/i);\n                if (volMatch) calcVol = volMatch[1].trim() + \' mL\';\n                mass = \'-\';\n            } \n            /* 如果是纯百分数 */\n            else if (/^[\\d.]+\\s*%$/.test(amtStr)) {\n                purity = amtStr;\n                mass = \'-\';\n            } \n        /* 如果是体积单位且角色为溶剂 */\n        else if (/(mL|L|μL)$/.test(amtStr) && role === \'溶剂\') {\n          solvVol = amtStr;\n          mass = \'-\';\n          mmol = \'-\';\n        }\n        /* 新增容错：如果是体积单位但不是溶剂（如液体试剂），且有浓度，则填入计算体积 */\n        else if (/(mL|L|μL)$/.test(amtStr) && role !== \'溶剂\') {\n          if (conc !== \'-\') {\n            calcVol = amtStr; // 有浓度的试剂体积，归入计算体积列\n          } else {\n            mass = amtStr; // 无浓度的纯液体试剂，暂存质量列\n          }\n        }\n        /* 常规质量 */\n        else {\n          mass = amtStr;\n        }\n\n        }\n\n        /* 处理溶液型试剂中可能存在的独立体积 */\n        if (it.rawVol && it.rawVol !== \'-\') {\n            if (calcVol === \'-\') calcVol = it.rawVol;\n        }\n\n        /* 处理体积比 */\n        if (it.volRatio && it.volRatio !== \'-\') {\n            volRatio = it.volRatio;\n        }\n\n        /* 针对催化剂/滴定剂等特殊角色的容错处理 */\n        if (role === \'催化剂\' || role === \'滴定剂\') {\n            if (mass === \'-\' && it.amount && it.amount !== \'-\') mass = it.amount;\n        }\n\n        /* 组装行数据 */\n        lines.push(\n            num + \'\\t\' + \n            name + \'\\t\' + \n            role + \'\\t\' + \n            mw + \'\\t\' + \n            eq + \'\\t\' + \n            purity + \'\\t\' + \n            mass + \'\\t\' + \n            mmol + \'\\t\' + \n            conc + \'\\t\' + \n            calcVol + \'\\t\' + \n            volRatio + \'\\t\' + \n            solvVol\n        );\n    }\n    \n    return lines.join(\'\\n\');\n}\n\n\n/* ================================================================\n   ====== DeepSeek AI 提取 ======\n   ================================================================ */\nfunction deepseekExtractChemicals(text) {\n    var messages = [\n        {\n            role: \'system\',\n            content: \'你是一个化学文献分析专家。从给定的实验步骤文本中提取所有化学物质的投料信息。\\n\\n\' +\n                \'输出格式要求（严格JSON）：\\n\' +\n                \'{"chemicals": [{"name": "纯化学名称", "amount": "质量", "eq": "当量数字", "mmol": "摩尔数及原文单位", "purity": "纯度", "concentration": "浓度", "volume": "体积", "role": "角色"}]}\\n\\n\' +\n                \'严格规则：\\n\' +\n                \'1. name：只写纯化学名称，必须去掉"固体"、"商用"、"无水"、"纯"等修饰词，\\n\' +\n                \'2. amount：只写单一的质量（如"3.0 g"），绝对不能包含体积、浓度、摩尔数等，没有则写"-"\\n\' +\n                \'3. eq：只写当量的数字（如"1"或"1.5"），不写单位，没有则写"-"\\n\' +\n                \'4. mmol：严格保留原文的数值和单位（如原文是"0.06 mol"就写"0.06 mol"，原文是"54.27 mmol"就写"54.27 mmol"），绝对禁止单位换算，没有则写"-"\\n\' +\n                \'5. purity：只写百分号纯度（如"5.58%"），没有则写"-"\\n\' +\n                \'6. concentration：只写浓度（如"0.5 M"或"2 mol/L"），没有则写"-"\\n\' +\n                \'7. volume：只写体积（如"70.0 mL"或"87 mL"），没有则写"-"\\n\' +\n                \'8. role：只能是"试剂"、"溶剂"或"产物"之一\\n\' +\n                \'9. 任何无法确定的数据一律写"-"，绝不能留空\\n\' +\n                \'10. 只输出JSON，不要其他文字\\n\' +\n                \'11. 【重点】遇到无标点分隔的连续描述如"16.0 mL 0.5 M水溶液"，必须拆解提取：16.0 mL填入volume，0.5 M填入concentration，绝不能全部丢弃填为"-"\\n\\n\' +\n                \'示例：\\n\' +\n                \'输入："固体NaHCO3 (3.0 g)" → {"name":"NaHCO3","amount":"3.0 g","eq":"-","mmol":"-","purity":"-","concentration":"-","volume":"-","role":"试剂"}\\n\' +\n                \'输入："商用NaOCl (5.58%, 70.0 mL, 0.06 mol)" → {"name":"NaOCl","amount":"-","eq":"-","mmol":"0.06 mol","purity":"5.58%","concentration":"-","volume":"70.0 mL","role":"试剂"}\\n\' +\n                \'输入："甲醇2 (21.7 g, 0.04 mol)" → {"name":"甲醇2","amount":"21.7 g","eq":"-","mmol":"0.04 mol","purity":"-","concentration":"-","volume":"-","role":"试剂"}\\n\' +\n                \'输入："KBr (16.0 mL 0.5 M水溶液)" → {"name":"KBr","amount":"-","eq":"-","mmol":"-","purity":"-","concentration":"0.5 M","volume":"16.0 mL","role":"试剂"}\\n\' +\n                \'输入："CH2Cl2 (87 mL)" → {"name":"CH2Cl2","amount":"-","eq":"-","mmol":"-","purity":"-","concentration":"-","volume":"87 mL","role":"溶剂"}\'\n        },\n        { role: \'user\', content: text }\n    ];\n\n    return deepseekChat(messages, true).then(function(content) {\n        try {\n            /* 修复：原代码此处使用了弯引号 \'\' 导致语法错误，已替换为直引号 */\n            var cleaned = content\n.replace(/json\\s/g, \'\')\n.replace(/```\\s/g, \'\')\n.trim();\n\n\nvar data = JSON.parse(cleaned);\nif (data.chemicals && Array.isArray(data.chemicals)) {\nreturn data.chemicals;\n}\n\nthrow new Error(\'格式错误\');\n        } catch(e) {\n            var jm = content.match(/\\{[\\s\\S]*"chemicals"[\\s\\S]*\\}/);\n            if (jm) {\n                try {\n                    var d2 = JSON.parse(jm[0]);\n                    if (d2.chemicals) return d2.chemicals;\n                } catch(e2) {\n                    /* 继续抛出原始错误 */\n                }\n            }\n            throw new Error(\'AI返回格式解析失败: \' + e.message);\n        }\n    });\n}\n\n/* ====== 开始化学提取 ====== */\nfunction startChemExtract() {\n    if (state.chemExtracting) return;\n    var txt = document.getElementById(\'chemSourceText\').value.trim();\n    if (!txt) {\n        toast(\'请输入或导入文献原文\', \'warning\');\n        return;\n    }\n   \n    state.chemExtracting = true;\n    var btn = document.getElementById(\'chemExtractBtn\');\n    btn.disabled = true;\n    btn.classList.add(\'loading\');\n    document.getElementById(\'chemResultBox\').textContent = \'正在提取中...\';\n    document.getElementById(\'chemResultBox\').className = \'chem-result-box empty\';\n    document.getElementById(\'chemOutputInfo\').textContent = \'\';\n\n    if (state.chemMode === \'local\') {\n        setTimeout(function() {\n            try {\n                var items = localExtractChemicals(txt);\n                if (items.length === 0) {\n                    document.getElementById(\'chemResultBox\').textContent =\n                        \'未提取到投料信息。\\n建议：\\n\' +\n                        \'1. 检查输入文本是否包含实验步骤\\n\' +\n                        \'2. 尝试切换到"AI 提取"模式\\n\' +\n                        \'3. 确保文本包含物质名称和用量信息\';\n                    document.getElementById(\'chemResultBox\').className =\n                        \'chem-result-box empty\';\n                    toast(\'未提取到投料信息\', \'warning\');\n                } else {\n                                  var rt = formatChemResults(items);\n              var box = document.getElementById(\'chemResultBox\');\n              box.textContent = rt;\n              box.className = \'chem-result-box\';\n              box.contentEditable = \'true\';\n              state.chemResultText = rt;\n\n                   				document.getElementById(\'chemOutputInfo\').textContent = \'本地提取 · \' + items.length + \' 条\';\n				toast(\'本地提取完成，共 \' + items.length + \' 条\', \'success\');\n\n                }\n            } catch(e) {\n                document.getElementById(\'chemResultBox\').textContent =\n                    \'提取出错: \' + e.message;\n                document.getElementById(\'chemResultBox\').className =\n                    \'chem-result-box empty\';\n                toast(\'提取出错: \' + e.message, \'error\');\n            }\n            state.chemExtracting = false;\n            btn.disabled = false;\n            btn.classList.remove(\'loading\');\n        }, 100);\n    } else {\n        /* 修复：原代码有两个重复的 if (!getStoredKey())，已删除多余的那个 */\n        if (!getStoredKey()) {\n            toast(\'请先在 m();\n  if (!text || box.classList.contains(\'empty\')) {\n    toast(\'暂无提取结果\', \'warning\');\n    return;\n  }\n  navigator.clipboard.writeText(text).then(function() {\n    toast(\'已复制投料信息\', \'success\');\n  }).catch(function() {\n    var ta = document.createElement(\'textarea\');\n    ta.value = text;\n    ta.style.position = \'fixed\';\n    ta.style.opacity = \'0\';\n    document.body.appendChild(ta);\n    ta.select();\n    document.execCommand(\'copy\');\n    document.body.removeChild(ta);\n    toast(\'已复制投料信息\', \'success\');\n  });\n}\n\nfunction clearChemResult() {\n   document.getElementById(\'chemResultBox\').textContent = \'提取结果将在此处显示，格式示例（Tab分隔）：\\n\\n\' +\n\'序号\\t名称\\t角色\\t分子量\\t当量\\t纯度\\t质量\\t摩尔量\\t浓度\\t计算体积\\t体积比\\t溶剂体积\\n\' +\n\'1\\t甲苯\\t试剂\\t92.14\\t1\\t100%\\t5.0000 g\\t54.2652 mmol\\t-\\t-\\t-\\t-\\n\' +\n\'2\\t乙醇\\t试剂\\t46.07\\t2\\t100%\\t4.9999 g\\t108.5305 mmol\\t-\\t-\\t-\\t-\\n\' +\n\'3\\t丙酮\\t溶剂\\t58.08\\t1\\t100%\\t-\\t-\\t-\\t-\\t2 mL/g\\t10.00 mL\\n\' +\n\'4\\t1-[(E)-(phenylmethylidene)amino]propan-2-ol\\t产物\\t163.22\\t1\\t100%\\t8.8571 g\\t54.2652 mmol\\t-\\t-\\t-\\t-\\n\' +\n\'5\\t丁基锂\\t试剂\\t64.06\\t1\\t100%\\t-\\t54.2652 mmol\\t2 M\\t27.133 mL\\t-\\t-\\n\\n\' +\n\'未提取到的数据使用"-"代替。\';\n\n    document.getElementById(\'chemResultBox\').className = \'chem-result-box empty\';\n    state.chemResultText = \'\';\n    document.getElementById(\'chemOutputInfo\').textContent = \'\';\n}\n/* ================================================================\n ====== 正则管理弹窗相关函数 ======\n ================================================================ */\n\n/* 打开正则管理弹窗 */\nfunction openRegexModal() {\n  document.getElementById(\'regexModal\').classList.add(\'visible\');\n  hideImportTextarea();\n  hideAddRegexForm();\n  renderRegexList();\n}\n\n/* 关闭正则管理弹窗 */\nfunction closeRegexModal() {\n  document.getElementById(\'regexModal\').classList.remove(\'visible\');\n}\n\n/* 渲染正则列表 */\nfunction renderRegexList() {\n  var patterns = getRegexPatterns();\n  var container = document.getElementById(\'regexListContainer\');\n  var enabledCount = 0;\n  \n  for (var i = 0; i < patterns.length; i++) {\n    if (patterns[i].enabled) enabledCount++;\n  }\n\n  var html = \'<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">共 \' + patterns.length + \' 条正则<span class="regex-count-badge">\' + enabledCount + \' 条启用</span></div>\';\n\n  for (var j = 0; j < patterns.length; j++) {\n    var p = patterns[j];\n    var isDefault = false;\n    for (var k = 0; k < DEFAULT_REGEX_PATTERNS.length; k++) {\n      if (DEFAULT_REGEX_PATTERNS[k].id === p.id) { isDefault = true; break; }\n    }\n    html += \'<div class="regex-item\' + (p.enabled ? \'\' : \' disabled\') + \'">\';\n    html += \'<div class="regex-toggle\' + (p.enabled ? \' on\' : \'\') + \'" onclick="doToggleRegex(\\\'\' + p.id + \'\\\')"></div>\';\n    html += \'<div class="regex-item-info">\';\n    html += \'<div class="regex-item-header">\';\n    html += \'<span class="regex-item-name">\' + escapeHtml(p.name) + \'</span>\';\n    if (!isDefault) html += \'<span style="font-size:9px;color:var(--yellow);background:var(--yellow-dim);padding:1px 5px;border-radius:3px;">自定义</span>\';\n    html += \'<span style="font-size:9px;color:var(--muted);">\' + escapeHtml(p.id) + \'</span>\';\n    html += \'</div>\';\n    html += \'<div class="regex-item-desc">\' + escapeHtml(p.desc) + \'</div>\';\n    html += \'<div class="regex-item-pattern" title="\' + escapeHtml(p.patternStr) + \'">\' + escapeHtml(p.patternStr) + \'</div>\';\n    html += \'</div>\';\n    html += \'<div class="regex-item-actions">\';\n    html += \'<button class="regex-action-btn" onclick="editRegex(\\\'\' + p.id + \'\\\')"><i class="fas fa-edit"></i></button>\';\n    html += \'<button class="regex-action-btn del" onclick="doDeleteRegex(\\\'\' + p.id + \'\\\')"><i class="fas fa-trash"></i></button>\';\n    html += \'</div>\';\n    html += \'</div>\';\n  }\n\n  if (patterns.length === 0) {\n    html += \'<div style="text-align:center;padding:20px;color:var(--muted);">暂无正则配置</div>\';\n  }\n\n  container.innerHTML = html;\n}\n\n/* 切换正则启用状态 */\nfunction doToggleRegex(id) {\n  toggleRegexEnabled(id);\n  renderRegexList();\n  toast(\'已切换正则状态\', \'info\');\n}\n\n/* 显示新增表单 */\nfunction showAddRegexForm() {\n  hideImportTextarea();\n  document.getElementById(\'regexFormTitle\').textContent = \'新增正则\';\n  document.getElementById(\'regexFormId\').value = \'custom_\' + Date.now().toString(36);\n  document.getElementById(\'regexFormId\').disabled = false;\n  document.getElementById(\'regexFormName\').value = \'\';\n  document.getElementById(\'regexFormDesc\').value = \'\';\n  document.getElementById(\'regexFormPattern\').value = \'\';\n  document.getElementById(\'regexFormFlags\').value = \'gi\';\n  document.getElementById(\'regexFormEnabled\').checked = true;\n  document.getElementById(\'addRegexFormWrap\').style.display = \'block\';\n}\n\n/* 编辑正则 */\nfunction editRegex(id) {\n  var p = getRegexById(id);\n  if (!p) return;\n  hideImportTextarea();\n  document.getElementById(\'regexFormTitle\').textContent = \'编辑正则\';\n  document.getElementById(\'regexFormId\').value = p.id;\n  document.getElementById(\'regexFormId\').disabled = true;\n  document.getElementById(\'regexFormName\').value = p.name;\n  document.getElementById(\'regexFormDesc\').value = p.desc;\n  document.getElementById(\'regexFormPattern\').value = p.patternStr;\n  document.getElementById(\'regexFormFlags\').value = p.flags;\n  document.getElementById(\'regexFormEnabled\').checked = p.enabled;\n  document.getElementById(\'addRegexFormWrap\').style.display = \'block\';\n}\n\n/* 隐藏新增表单 */\nfunction hideAddRegexForm() {\n  document.getElementById(\'addRegexFormWrap\').style.display = \'none\';\n}\n\n/* 保存正则（新增或编辑，自动检测互相影响的正则） */\nfunction doSaveRegex() {\nvar id = document.getElementById(\'regexFormId\').value.trim();\nvar name = document.getElementById(\'regexFormName\').value.trim();\nvar desc = document.getElementById(\'regexFormDesc\').value.trim();\nvar pattern = document.getElementById(\'regexFormPattern\').value.trim();\nvar flags = document.getElementById(\'regexFormFlags\').value.trim();\nvar enabled = document.getElementById(\'regexFormEnabled\').checked;\nif (!id) {\ntoast(\'请输入ID\', \'warning\');\nreturn;\n}\nif (!pattern) {\ntoast(\'请输入正则表达式\', \'warning\');\nreturn;\n}\n/* 检测可能互相影响的正则（模式片段重叠检测） */\nvar influenceList = [];\nvar patterns = getRegexPatterns();\nvar newReStr = pattern.replace(/[\\\\^$.*+?()[\\]{}|]/g, \'\\\\$&\');\nfor (var i = 0; i < patterns.length; i++) {\nif (patterns[i].id === id) continue;\nvar existStr = patterns[i].patternStr;\n/* 提取两边的共同有意义的子模式片段（至少6字符）进行比对 */\nvar newFrags = pattern.match(/[\\w\\s\\-()\\\\[\\]{}.+*?|]{6,}/g) || [];\nvar existFrags = existStr.match(/[\\w\\s\\-()\\\\[\\]{}.+*?|]{6,}/g) || [];\nvar hasOverlap = false;\nfor (var j = 0; j < newFrags.length; j++) {\nfor (var k = 0; k < existFrags.length; k++) {\nif (newFrags[j] === existFrags[k] && newFrags[j].length >= 8) {\nhasOverlap = true;\nbreak;\n}\n}\nif (hasOverlap) break;\n}\nif (hasOverlap) {\ninfluenceList.push(patterns[i].id + \' (\' + patterns[i].name + \')\');\n}\n}\nvar result = upsertRegex(id, name, desc, pattern, flags, enabled);\nif (result.success) {\nvar msg = \'正则已保存\';\nif (influenceList.length > 0) {\nmsg += \'。检测到 \' + influenceList.length + \' 条可能互相影响的正则：\' + influenceList.join(\'、\');\ntoast(msg, \'warning\');\n} else {\ntoast(msg, \'success\');\n}\nhideAddRegexForm();\nrenderRegexList();\n} else {\ntoast(result.error, \'error\');\n}\n}\n\n/* 删除正则 */\nfunction doDeleteRegex(id) {\n  deleteRegex(id);\n  toast(\'正则已删除\', \'info\');\n  renderRegexList();\n}\n\n/* 显示导入文本框 */\nfunction showImportTextarea() {\n  hideAddRegexForm();\n  document.getElementById(\'importTextareaWrap\').style.display = \'block\';\n  document.getElementById(\'importTextarea\').value = \'\';\n  document.getElementById(\'importTextarea\').focus();\n}\n\n/* 隐藏导入文本框 */\nfunction hideImportTextarea() {\n  document.getElementById(\'importTextareaWrap\').style.display = \'none\';\n}\n/* 从文本框导入（覆盖更新模式） */\nfunction doImportFromTextarea() {\n  var jsonStr = document.getElementById(\'importTextarea\').value.trim();\n  if (!jsonStr) {\n    toast(\'请粘贴JSON内容\', \'warning\');\n    return;\n  }\n  try {\n    var data = JSON.parse(jsonStr);\n    if (!Array.isArray(data)) throw new Error(\'格式错误：需要数组\');\n    var addedCount = 0;\n    var updatedCount = 0;\n    var errorCount = 0;\n    var patterns = getRegexPatterns();\n    var existingIds = [];\n    for (var i = 0; i < patterns.length; i++) { existingIds.push(patterns[i].id); }\n\n    for (var i = 0; i < data.length; i++) {\n      var item = data[i];\n      if (!item.id || !item.pattern) {\n        errorCount++;\n        continue;\n      }\n      try {\n        new RegExp(item.pattern, item.flags || \'\');\n      } catch(e) {\n        toast(\'正则语法错误已跳过: \' + item.id, \'error\');\n        errorCount++;\n        continue;\n      }\n      var result = upsertRegex(item.id, item.name || item.id, item.desc || \'\', item.pattern, item.flags || \'\', item.enabled !== false);\n      if (result.success) {\n        if (existingIds.indexOf(item.id) >= 0) {\n          updatedCount++;\n        } else {\n          addedCount++;\n        }\n      }\n    }\n    \n    if (addedCount > 0 || updatedCount > 0) {\n      var msg = \'\';\n      if (addedCount > 0) msg += \'新增 \' + addedCount + \' 条\';\n      if (updatedCount > 0) msg += (msg ? \'，\' : \'\') + \'覆盖更新 \' + updatedCount + \' 条\';\n      if (errorCount > 0) msg += \'，跳过 \' + errorCount + \' 条错误\';\n      toast(\'导入成功：\' + msg, \'success\');\n      hideImportTextarea();\n      renderRegexList();\n    } else {\n      toast(\'未导入任何有效正则\' + (errorCount > 0 ? \'（\' + errorCount + \' 条存在语法错误）\' : \'\'), \'warning\');\n    }\n  } catch(e) {\n    toast(\'JSON解析失败: \' + e.message, \'error\');\n  }\n}\n/* 从文件导入（覆盖更新模式） */\nfunction importRegexFromFile(e) {\n  var file = e.target.files[0];\n  if (!file) return;\n  var reader = new FileReader();\n  reader.onload = function(ev) {\n    try {\n      var data = JSON.parse(ev.target.result);\n      if (!Array.isArray(data)) throw new Error(\'格式错误：需要数组\');\n      var addedCount = 0;\n      var updatedCount = 0;\n      var errorCount = 0;\n      var patterns = getRegexPatterns();\n      var existingIds = [];\n      for (var i = 0; i < patterns.length; i++) { existingIds.push(patterns[i].id); }\n\n      for (var i = 0; i < data.length; i++) {\n        var item = data[i];\n        if (!item.id || !item.pattern) {\n          errorCount++;\n          continue;\n        }\n        try {\n          new RegExp(item.pattern, item.flags || \'\');\n        } catch(e) {\n          errorCount++;\n          continue;\n        }\n        var result = upsertRegex(item.id, item.name || item.id, item.desc || \'\', item.pattern, item.flags || \'\', item.enabled !== false);\n        if (result.success) {\n          if (existingIds.indexOf(item.id) >= 0) {\n            updatedCount++;\n          } else {\n            addedCount++;\n          }\n        }\n      }\n      \n      if (addedCount > 0 || updatedCount > 0) {\n        var msg = \'\';\n        if (addedCount > 0) msg += \'新增 \' + addedCount + \' 条\';\n        if (updatedCount > 0) msg += (msg ? \'，\' : \'\') + \'覆盖更新 \' + updatedCount + \' 条\';\n        if (errorCount > 0) msg += \'，跳过 \' + errorCount + \' 条错误\';\n        toast(\'导入成功：\' + msg, \'success\');\n        renderRegexList();\n      } else {\n        toast(\'未导入任何有效正则\' + (errorCount > 0 ? \'（\' + errorCount + \' 条存在语法错误）\' : \'\'), \'warning\');\n      }\n    } catch(e) {\n      toast(\'文件解析失败: \' + e.message, \'error\');\n    }\n  };\n  reader.readAsText(file, \'UTF-8\');\n  e.target.value = \'\';\n}\n\n\n/* 复制全部正则JSON */\nfunction copyAllRegex() {\n  var jsonStr = exportAllRegex();\n  navigator.clipboard.writeText(jsonStr).then(function() {\n    toast(\'已复制全部正则配置\', \'success\');\n  }).catch(function() {\n    var ta = document.createElement(\'textarea\');\n    ta.value = jsonStr;\n    ta.style.position = \'fixed\';\n    ta.style.opacity = \'0\';\n    document.body.appendChild(ta);\n    ta.select();\n    document.execCommand(\'copy\');\n    document.body.removeChild(ta);\n    toast(\'已复制全部正则配置\', \'success\');\n  });\n}\n\n/* 导出正则到JSON文件 */\nfunction exportRegexToFile() {\n  var jsonStr = exportAllRegex();\n  var blob = new Blob([jsonStr], { type: \'application/json;charset=utf-8\' });\n  var url = URL.createObjectURL(blob);\n  var a = document.createElement(\'a\');\n  a.href = url;\n  a.download = \'chem_regex_config_\' + Date.now() + \'.json\';\n  a.click();\n  URL.revokeObjectURL(url);\n  toast(\'已导出JSON文件\', \'success\');\n}\n\n/* 确认重置弹窗 */\nfunction confirmResetRegex() {\n  pendingRegexAction = \'reset\';\n  var modal = document.getElementById(\'confirmResetModal\');\n  modal.querySelector(\'h3\').innerHTML = \'<i class="fas fa-exclamation-triangle" style="color:var(--yellow);margin-right:8px;"></i>确认重置\';\n  modal.querySelector(\'p\').textContent = \'将恢复所有正则为默认配置，自定义正则将丢失。\';\n  modal.querySelector(\'.hdr-btn.translate-btn\').textContent = \'确认重置\';\n  modal.classList.add(\'visible\');\n}\n\n\n\n/* 新增：一键清除的确认弹窗 */\nfunction showClearRegexConfirm() {\n  pendingRegexAction = \'clear\';\n  var modal = document.getElementById(\'confirmResetModal\');\n  modal.querySelector(\'h3\').innerHTML = \'<i class="fas fa-exclamation-triangle" style="color:var(--red);margin-right:8px;"></i>确认清除\';\n  modal.querySelector(\'p\').textContent = \'将清空所有正则配置。提取功能将不可用，但可随时通过"恢复默认"找回。\';\n  modal.querySelector(\'.hdr-btn.translate-btn\').textContent = \'确认清除\';\n  modal.classList.add(\'visible\');\n}\n\nfunction closeConfirmReset() {\n  document.getElementById(\'confirmResetModal\').classList.remove(\'visible\');\n}\n\n/* 执行重置 */\nfunction doResetRegex() {\n\n  if (pendingRegexAction === \'clear\') {\n    /* 执行一键清除 */\n    currentRegexPatterns = [];\n    try {\n      localStorage.setItem  try{
