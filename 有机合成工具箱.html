 +\n      \'loading="lazy" decoding="async" onerror="this.style.display=\\\'none\\\'">\' +\n      \'<span class="eq-name">\' + esc((r.nameIn ? \'(\' + r.nameIn + \')\' : \'\') + (name.length > 20 ? name.substring(0, 20) + \'\\u2026\' : name)) + \'</span>\'\n +\n      \'</span>\'\n    );\n    if (i < reactants.length - 1) {\n      parts.push(\'<span class="eq-plus">+</span>\');\n    }\n  });\n  if (reactants.length && products.length) {\n    parts.push(\n      \'<span class="eq-sep"></span>\' +\n      \'<img class="eq-arrow-img" src="\' + arrowSrc + \'" alt="→">\' +\n      \'<span class="eq-sep"></span>\'\n    );\n  }\n  products.forEach(function(r, i) {\n    var name = getDisplayName(r);\n    if (!name) return;\n    parts.push(\n      \'<span class="eq-item">\' +\n      \'<img class="sub-img" src="\' + cactusImg(name, \'small\') + \'" alt="\' + esc(name) + \'" \' +\n      \'loading="lazy" decoding="async" onerror="this.style.display=\\\'none\\\'">\' +\n      \'<span class="eq-name">\' + esc((r.nameIn ? \'(\' + r.nameIn + \')\' : \'\') + (name.length > 20 ? name.substring(0, 20) + \'\\u2026\' : name)) + \'</span>\'\n +\n      \'</span>\'\n    );\n    if (i < products.length - 1) {\n      parts.push(\'<span class="eq-plus">+</span>\');\n    }\n  });\n  return parts.join(\'\');\n}\n\n/* ========== 反应CRUD ========== */\nfunction createNew() {\n  var rxn = {\n    id: uid(), name: \'\', notes: \'\', rows: [],\n    baseId: null, nid: 1,\n    createdAt: Date.now(), updatedAt: Date.now()\n  };\n  allReactions.push(rxn);\n  saveStore();\n  openReaction(rxn.id, true);\n}\nfunction openReaction(id, isNew) {\n    isNew = isNew || false;\n    var rxn = allReactions.find(function(r) { return r.id === id; });\n    if (!rxn) {\n        toast(\'反应不存在\', \'err\');\n        return;\n    }\n    currentId = id;\n    rows = JSON.parse(JSON.stringify(rxn.rows || []));\n    curSamples = JSON.parse(JSON.stringify(rxn.samples || []));\n    baseId = rxn.baseId;\n    nid = rxn.nid || 1;\n    document.getElementById(\'rxnNameInput\').value = rxn.name || \'\';\n    document.getElementById(\'rxnNotes\').value = rxn.notes || \'\';\n    renderTable();\n    updateStructPreview();\n    renderSampleList();\n    showView(\'editorView\');\n    if (isNew && rows.length === 0) {\n        addRow(\'reactant\');\n        addRow(\'reactant\');\n        addRow(\'product\');\n        addRow(\'solvent\');\n    }\n}\n\nfunction confirmDeleteReaction(id) {\n  showConfirm(\'确认删除\', \'确定要删除这个反应吗？此操作不可恢复。\', function() {\n    allReactions = allReactions.filter(function(r) { return r.id !== id; });\n    saveStore();\n    if (currentId === id) {\n      currentId = null;\n      rows = [];\n      showView(\'historyView\');\n    }\n    renderHistory();\n    toast(\'反应已删除\', \'ok\');\n  });\n}\nfunction clearAllReactions() {\n  if (allReactions.length === 0) { toast(\'没有反应记录\', \'inf\'); return; }\n  showConfirm(\'清除所有反应\',\n    \'确定要清除所有 \' + allReactions.length + \' 条反应记录吗？此操作不可恢复！\',\n    function() {\n      allReactions = [];\n      saveStore();\n      currentId = null;\n      rows = [];\n      baseId = null;\n      nid = 1;\n      renderHistory();\n      toast(\'所有反应已清除\', \'ok\');\n    });\n}\nfunction duplicateReaction(id) {\n  var src = allReactions.find(function(r) { return r.id === id; });\n  if (!src) return;\n  var dup = JSON.parse(JSON.stringify(src));\n  dup.id = uid();\n  dup.name = (dup.name || \'未命名反应\') + \' (副本)\';\n  dup.createdAt = Date.now();\n  dup.updatedAt = Date.now();\n  var maxId = 0;\n  dup.rows.forEach(function(r) { r.id = ++maxId; });\n  dup.nid = maxId + 1;\n  allReactions.push(dup);\n  saveStore();\n  renderHistory();\n  toast(\'已成功复制反应: \' + dup.name, \'ok\');\n}\nfunction renameReaction(id, val) {\n  var rxn = allReactions.find(function(r) { return r.id === id; });\n  if (!rxn) return;\n  rxn.name = val.trim();\n  rxn.updatedAt = Date.now();\n  saveStore();\n}\nfunction deleteCurrent() {\n  if (currentId) confirmDeleteReaction(currentId);\n}\nfunction saveCurrent() {\n  if (!currentId) { toast(\'请先新建反应\', \'err\'); return; }\n  updateCurrentReaction();\n  toast(\'已保存\', \'ok\');\n}\nfunction scheduleAutoSave() {\n  clearTimeout(autoSaveTimer);\n  autoSaveTimer = setTimeout(function() {\n    if (currentId) updateCurrentReaction();\n  }, 1500);\n}\nfunction onNameChange() { scheduleAutoSave(); }\nfunction onNotesChange() { scheduleAutoSave(); }\n\n/* ========== 投料行操作 ========== */\nfunction addRow(role) {\n  role = role || \'reactant\';\n  var r = {\n    id: nid++, role: role, nameIn: \'\', nameEN: \'\', nameCN: \'\',\n    formula: \'\', mw: 0, eq: 1, purity: 1, mass: 0, mmol: 0,\n    conc: 0, calcVol: 0, volR: 0, vol: 0,\n    loading: false, err: \'\', mwManual: false, src: \'\'\n  };\n  rows.push(r);\n  if (!baseId && role === \'reactant\') baseId = r.id;\n  renderTable();\n  scheduleAutoSave();\n}\nfunction removeRow(id) {\n  rows = rows.filter(function(r) { return r.id !== id; });\n  if (baseId === id) {\n    var rs = rows.filter(function(r) { return r.role === \'reactant\'; });\n    baseId = rs.length ? rs[0].id : null;\n  }\n  renderTable();\n  updateStructPreview();\n  scheduleAutoSave();\n}\nfunction setBase(id) {\n  baseId = id;\n  renderTable();\n}\nfunction upd(id, f, v) {\n  var r = rows.find(function(x) { return x.id === id; });\n  if (!r) return;\n  if (f === \'nameIn\') {\n    r.nameIn = v;\n    r.formula = \'\';\n    r.mw = 0;\n    r.err = \'\';\n    r.mwManual = false;\n    r.src = \'\';\n}\n else if (f === \'mw\') {\n    r.mw = parseFloat(v) || 0; r.mwManual = true;\n  } else if (f === \'eq\') {\n    r.eq = parseFloat(v) || 0;\n  } else if (f === \'purity\') {\n    r.purity = v === \'\' ? 1 : (parseFloat(v) || 1);\n  } else if (f === \'mass\') {\n    r.mass = parseFloat(v) || 0;\n  } else if (f === \'conc\') {\n    r.conc = parseFloat(v) || 0;\n  } else if (f === \'volR\') {\n  r.volR = parseFloat(v) || 0;\n}\nelse if (f === \'calcVol\') {\n  r.calcVol = parseFloat(v) || 0;\n}\nelse if (f === \'vol\') {\n  r.vol = parseFloat(v) || 0;\n}\n else if (f === \'role\') {\n    r.role = v;\n    if (v !== \'reactant\' && baseId === id) {\n      var rs = rows.filter(function(x) { return x.role === \'reactant\'; });\n      baseId = rs.length ? rs[0].id : null;\n    }\n  }\n  scheduleAutoSave();\n}\n/* ========== 带超时的 fetch 包装 ========== */\nfunction fetchWithTimeout(url, timeout) {\n    timeout = timeout || 8000;\n    var controller = new AbortController();\n    var timer = setTimeout(function() { controller.abort(); }, timeout);\n    return fetch(url, { signal: controller.signal }).then(function(res) {\n        clearTimeout(timer);\n        return res;\n    }).catch(function(e) {\n        clearTimeout(timer);\n        throw e;\n    });\n}\n/* ========== 即时填入分子量辅助函数 ========== */\nfunction setMwNow(rowId, val) {\n    var row = rows.find(function(x) { return x.id === rowId; });\n    if (row) row.mw = val;\n    var tr = document.querySelector(\'tr[data-id="\' + rowId + \'"]\');\n    if (tr) {\n        var inp = tr.querySelector(\'[data-f="mw"]\');\n        if (inp) inp.value = val > 0 ? val : \'\';\n    }\n}\n\n/* ========== 化学检索（重构，与库房保持一致） ========== */\n\n/* ---------- 缓存Key ---------- */\nvar MOL_WEIGHT_CACHE_KEY = \'stoich_mw_v1\';\nvar SMILES_CACHE_KEY = \'stoich_smiles_v1\';\nvar TRANSLATE_CACHE_KEY = \'stoich_trans_v1\';\nvar pendingMolWeight = new Set();\nvar pendingSmiles = new Set();\nvar pendingTranslate = new Set();\n\n/* ---------- 工具函数（从库房移植） ---------- */\nfunction isCasNumber(str) {\n    return /^\\d{2,7}-\\d{2}-\\d$/.test(str);\n}\nfunction capitalizeWords(str) {\n    if (!str) return \'\';\n    return str.toLowerCase().replace(/(?:^|\\s|-)\\S/g, function(a) { return a.toUpperCase(); });\n}\nfunction containsChinese(str) {\n    return /[\\u4e00-\\u9fa5]/.test(str);\n}\nfunction fetchWithTimeout(url, timeout) {\n    timeout = timeout || 8000;\n    var controller = new AbortController();\n    var timer = setTimeout(function() { controller.abort(); }, timeout);\n    return fetch(url, { signal: controller.signal }).then(function(res) {\n        clearTimeout(timer); return res;\n    }).catch(function(e) { clearTimeout(timer); throw e; });\n}\n\n/* ---------- 分子量缓存 ---------- */\nfunction loadMolWeightCache() {\n    try { var r = localStorage.getItem(MOL_WEIGHT_CACHE_KEY); if (r) return JSON.parse(r); } catch (e) {} return {};\n}\nfunction saveMolWeightCache(c) {\n    try { localStorage.setItem(MOL_WEIGHT_CACHE_KEY, JSON.stringify(c)); } catch (e) {}\n}\nfunction getMolWeightCached(name) {\n    var cache = loadMolWeightCache();\n    return cache[name] ? cache[name].data : null;\n}\nasync function fetchMolWeightFromAPI(name) {\n    if (!name || name.length < 2) return null;\n    if (pendingMolWeight.has(name)) return null;\n    pendingMolWeight.add(name);\n    // 第1路：PubChem\n    var url = \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/\' + encodeURIComponent(name) + \'/property/MolecularWeight/JSON\';\n    try {\n        var res = await fetchWithTimeout(url, 10000);\n        if (res.ok) {\n            var data = await res.json();\n            if (data.PropertyTable && data.PropertyTable.Properties && data.PropertyTable.Properties[0]) {\n                pendingMolWeight.delete(name);\n                return data.PropertyTable.Properties[0].MolecularWeight.toString();\n            }\n        }\n    } catch (e) {}\n    // 第2路：NCI Cactus\n    try {\n        var nciUrl = \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/mw\';\n        var nciRes = await fetchWithTimeout(nciUrl, 8000);\n        if (nciRes.ok) {\n            var mw = await nciRes.text();\n            var v = parseFloat(mw);\n            if (v > 0 && v < 50000) { pendingMolWeight.delete(name); return Math.round(v * 1000) / 1000; }\n        }\n    } catch (e) {}\n    // 第3路：Wikidata兜底（中文或CAS输入时获取英文名再试）\n    if (containsChinese(name) || isCasNumber(name)) {\n        var wikiName = isCasNumber(name) ? await fetchEnglishNameFromWikidataByCas(name) : await fetchEnglishNameFromWikidata(name);\n        if (wikiName && wikiName.toLowerCase() !== name.toLowerCase()) {\n            // 用英文名重试PubChem\n            try {\n                var wikiUrl = \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/\' + encodeURIComponent(wikiName) + \'/property/MolecularWeight/JSON\';\n                var wikiRes = await fetchWithTimeout(wikiUrl, 8000);\n                if (wikiRes.ok) {\n                    var wikiData = await wikiRes.json();\n                    if (wikiData.PropertyTable && wikiData.PropertyTable.Properties && wikiData.PropertyTable.Properties[0]) {\n                        pendingMolWeight.delete(name);\n                        return wikiData.PropertyTable.Properties[0].MolecularWeight.toString();\n                    }\n                }\n            } catch (e) {}\n            // 再试Cactus\n            try {\n                var wikiNciUrl = \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(wikiName) + \'/mw\';\n                var wikiNciRes = await fetchWithTimeout(wikiNciUrl, 8000);\n                if (wikiNciRes.ok) {\n                    var wikiMw = await wikiNciRes.text();\n                    var wv = parseFloat(wikiMw);\n                    if (wv > 0 && wv < 50000) { pendingMolWeight.delete(name); return Math.round(wv * 1000) / 1000; }\n                }\n            } catch (e) {}\n        }\n    }\n    pendingMolWeight.delete(name);\n    return null;\n}\nasync function updateMolWeightCache(name) {\n    var cached = getMolWeightCached(name);\n    if (cached) return cached;\n    var data = await fetchMolWeightFromAPI(name);\n    if (data) {\n        var cache = loadMolWeightCache();\n        cache[name] = { data: data, ts: Date.now() };\n        saveMolWeightCache(cache);\n        return data;\n    }\n    return null;\n}\n\n/* ---------- SMILES缓存 ---------- */\nfunction loadSmilesCache() {\n    try { var r = localStorage.getItem(SMILES_CACHE_KEY); if (r) return JSON.parse(r); } catch (e) {} return {};\n}\nfunction saveSmilesCache(c) {\n    try { localStorage.setItem(SMILES_CACHE_KEY, JSON.stringify(c)); } catch (e) {}\n}\nfunction getSmilesCached(name) {\n    var cache = loadSmilesCache();\n    return cache[name] ? cache[name].data : null;\n}\nasync function fetchSmilesFromAPI(name) {\n    if (!name || name.length < 2) return null;\n    var cached = getSmilesCached(name);\n    if (cached) return cached;\n    if (pendingSmiles.has(name)) return null;\n    pendingSmiles.add(name);\n    var url = \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/smiles\';\n    try {\n        var res = await fetchWithTimeout(url, 8000);\n        if (res.ok) {\n            var smiles = await res.text();\n            var cache = loadSmilesCache();\n            cache[name] = { data: smiles.trim(), ts: Date.now() };\n            saveSmilesCache(cache);\n            pendingSmiles.delete(name);\n            return smiles.trim();\n        }\n    } catch (e) {}\n    // Wikidata兜底\n    if (containsChinese(name) || isCasNumber(name)) {\n        var wikiName = isCasNumber(name) ? await fetchEnglishNameFromWikidataByCas(name) : await fetchEnglishNameFromWikidata(name);\n        if (wikiName && wikiName.toLowerCase() !== name.toLowerCase()) {\n            try {\n                var retryUrl = \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(wikiName) + \'/smiles\';\n                var retryRes = await fetchWithTimeout(retryUrl, 8000);\n                if (retryRes.ok) {\n                    var retrySmiles = await retryRes.text();\n                    var cache = loadSmilesCache();\n                    cache[name] = { data: retrySmiles.trim(), ts: Date.now() };\n                    saveSmilesCache(cache);\n                    pendingSmiles.delete(name);\n                    return retrySmiles.trim();\n                }\n            } catch (e) {}\n        }\n    }\n    pendingSmiles.delete(name);\n    return null;\n}\n\n/* ---------- 翻译缓存 ---------- */\nfunction loadTranslateCache() {\n    try { var r = localStorage.getItem(TRANSLATE_CACHE_KEY); if (r) return JSON.parse(r); } catch (e) {} return {};\n}\nfunction saveTranslateCache(c) {\n    try { localStorage.setItem(TRANSLATE_CACHE_KEY, JSON.stringify(c)); } catch (e) {}\n}\nasync function translateText(text) {\n    if (!text || text.length < 2) return text;\n    var cache = loadTranslateCache();\n    if (cache[text]) return cache[text];\n    if (pendingTranslate.has(text)) return null;\n    pendingTranslate.add(text);\n    try {\n        var res = await fetchWithTimeout(\n            \'https://api.mymemory.translated.net/get?q=\' + encodeURIComponent(text) + \'&langpair=en|zh-CN\', 8000\n        );\n        if (res.ok) {\n            var data = await res.json();\n            if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {\n                var translated = data.responseData.translatedText;\n                if (translated && translated !== text && !translated.includes(\'MYMEMORY WARNING\')) {\n                    cache[text] = translated;\n                    saveTranslateCache(cache);\n                    pendingTranslate.delete(text);\n                    return translated;\n                }\n            }\n        }\n    } catch (e) {}\n    pendingTranslate.delete(text);\n    return \'\';\n}\nasync function translateZhToEn(text) {\n    if (!text || !containsChinese(text)) return text;\n    var cache = loadTranslateCache();\n    for (var key in cache) {\n        if (cache[key] === text && key !== text) return key;\n    }\n    var pendingKey = \'zh2en_\' + text;\n    if (pendingTranslate.has(pendingKey)) return null;\n    pendingTranslate.add(pendingKey);\n    try {\n        var res = await fetchWithTimeout(\n            \'https://api.mymemory.translated.net/get?q=\' + encodeURIComponent(text) + \'&langpair=zh-CN|en\', 8000\n        );\n        if (res.ok) {\n            var data = await res.json();\n            if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {\n                var translated = data.responseData.translatedText;\n                if (translated !== text) { cache[translated] = text; saveTranslateCache(cache); }\n                pendingTranslate.delete(pendingKey);\n                return translated;\n            }\n        }\n    } catch (e) {}\n    pendingTranslate.delete(pendingKey);\n    return text;\n}\n\n/* ---------- Wikidata查询（从库房移植） ---------- */\nasync function fetchEnglishNameFromWikidata(query) {\n    if (!query || query.length < 2) return null;\n    try {\n        var url = \'https://www.wikidata.org/w/api.php?action=wbsearchentities&search=\' + encodeURIComponent(query) + \'&language=en&format=json&origin=*&limit=5&type=item\';\n        var res = await fetchWithTimeout(url, 8000);\n        if (!res.ok) return null;\n        var data = await res.json();\n        if (data.search && data.search.length > 0) {\n            for (var i = 0; i < data.search.length; i++) {\n                var label = data.search[i].label || \'\';\n                if (label && /^[a-zA-Z\\s\\-()0-9,]+$/.test(label) && label.length >= 2) return label;\n            }\n            for (var j = 0; j < data.search.length; j++) {\n                var lbl = data.search[j].label || \'\';\n                if (lbl && !/^[\\u4e00-\\u9fa5]+$/.test(lbl) && lbl.length >= 2) return lbl;\n            }\n        }\n    } catch (e) {}\n    return null;\n}\nasync function fetchEnglishNameFromWikidataByCas(cas) {\n    if (!isCasNumber(cas)) return null;\n    try {\n        var searchUrl = \'https://www.wikidata.org/w/api.php?action=wbsearchentities&search=\' + encodeURIComponent(cas) + \'&language=en&format=json&origin=*&limit=3&type=item\';\n        var searchRes = await fetchWithTimeout(searchUrl, 8000);\n        if (!searchRes.ok) return null;\n        var searchData = await searchRes.json();\n        if (searchData.search && searchData.search.length > 0) {\n            var qid = searchData.search[0].id;\n            var entityUrl = \'https://www.wikidata.org/wiki/Special:EntityData/\' + qid + \'.json\';\n            var entityRes = await fetchWithTimeout(entityUrl, 8000);\n            if (!entityRes.ok) return null;\n            var entityData = await entityRes.json();\n            var entity = entityData.entities && entityData.entities[qid];\n            if (entity && entity.labels && entity.labels.en) return entity.labels.en.value;\n        }\n    } catch (e) {}\n    return null;\n}\nasync function fetchNameByCas(cas) {\n    if (!cas) return null;\n    try {\n        var url = \'https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/\' + encodeURIComponent(cas) + \'/property/IUPACName,Title/JSON\';\n        var res = await fetchWithTimeout(url, 8000);\n        if (res.ok) {\n            var data = await res.json();\n            if (data.PropertyTable && data.PropertyTable.Properties && data.PropertyTable.Properties[0]) {\n                return data.PropertyTable.Properties[0].Title || data.PropertyTable.Properties[0].IUPACName || null;\n            }\n        }\n    } catch (e) {}\n    var wikiName = await fetchEnglishNameFromWikidataByCas(cas);\n    if (wikiName) return wikiName;\n    return null;\n}\nasync function fetchCactusFormula(name) {\n    try {\n        var res = await fetchWithTimeout(\'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/formula\', 10000);\n        if (res.ok) {\n            var t = await res.text();\n            if (t && t.trim().length > 0 && !t.includes(\'Error\') && !t.includes(\'<\')) return t.trim();\n        }\n    } catch (e) {}\n    return null;\n}\n\n/* ---------- 即时填入分子量 ---------- */\nfunction setMwNow(rowId, val) {\n    var row = rows.find(function(x) { return x.id === rowId; });\n    if (row) row.mw = val;\n    var tr = document.querySelector(\'tr[data-id="\' + rowId + \'"]\');\n    if (tr) {\n        var inp = tr.querySelector(\'[data-f="mw"]\');\n        if (inp) inp.value = val > 0 ? val : \'\';\n    }\n}\n\n/* ---------- 主检索函数（重构，与库房一致） ---------- */\nfunction queryPub(r) {\n    if (timers[r.id]) clearTimeout(timers[r.id]);\n    timers[r.id] = setTimeout(async function() {\n        // 保存焦点状态\n        var activeEl = document.activeElement;\n        var activeField = activeEl && activeEl.dataset ? activeEl.dataset.f : null;\n        var activeRowId = activeEl && activeEl.closest(\'tr\') ? parseInt(activeEl.closest(\'tr\').dataset.id) : null;\n        var selStart = -1, selEnd = -1;\n        if (activeEl && activeEl.setSelectionRange && typeof activeEl.selectionStart === \'number\') {\n            selStart = activeEl.selectionStart;\n            selEnd = activeEl.selectionEnd;\n        }\n        try {\n            r.loading = true;\n            r.err = \'\';\n            r.src = \'\';\n            renderTable();\n            var name = r.nameIn.trim();\n            if (!name) { r.loading = false; renderTable(); return; }\n            var cnInput = isCN(name);\n            var enName = null;\n            var ok = false;\n            var srcLabel = \'\';\n\n            /* ===== 中文输入路径（与库房一致） ===== */\n            if (cnInput) {\n                // 1. 本地词典\n                enName = DICT[name] || DICT[name.toLowerCase()];\n                if (enName) srcLabel = \'dict\';\n                // 2. MyMemory翻译API\n                if (!enName) {\n                    enName = await translateZhToEn(name);\n                    if (enName && enName !== name) srcLabel = \'api\';\n                }\n                // 3. Cactus IUPAC解析\n                if (!enName) {\n                    try {\n                        var cactusRes = await fetchWithTimeout(\n                            \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/iupac_name\', 10000\n                        );\n                        if (cactusRes.ok) {\n                            var iupac = await cactusRes.text();\n                            if (iupac && iupac.trim().length > 0 && !iupac.includes(\'Error\')) {\n                                enName = iupac.trim();\n                                srcLabel = \'cactus\';\n                            }\n                        }\n                    } catch (e) {}\n                }\n                // 4. 用英文名查Cactus分子量和分子式\n                if (enName) {\n                    var mwPromise = fetchMolWeightFromAPI(enName);\n                    var formulaPromise = fetchCactusFormula(enName);\n                    var results = await Promise.all([mwPromise, formulaPromise]);\n                    var mw = results[0], formula = results[1];\n                    if (mw) {\n                        setMwNow(r.id, mw); // 立即填入\n                        r.mwManual = false;\n                        if (formula) r.formula = formula;\n                        r.nameCN = name;\n                        if (enName !== name) r.nameEN = enName;\n                        r.src = srcLabel;\n                        ok = true;\n                    }\n                }\n                // 5. 直接用中文名查Cactus（兜底）\n                if (!ok) {\n                    var mw2 = await fetchMolWeightFromAPI(name);\n                    var formula2 = await fetchCactusFormula(name);\n                    if (mw2) {\n                        setMwNow(r.id, mw2); // 立即填入\n                        r.mwManual = false;\n                        r.nameCN = name;\n                        if (formula2) r.formula = formula2;\n                        r.src = \'cactus-direct\';\n                        ok = true;\n                    }\n                }\n                // 6. Wikidata兜底\n                if (!ok) {\n                    var wikiInfo = await fetchWikidataInfo(name);\n                    if (wikiInfo) {\n                        // 用Wikidata英文名重试Cactus\n                        if (wikiInfo.nameEN && wikiInfo.nameEN !== name) {\n                            var wikiMw = await fetchMolWeightFromAPI(wikiInfo.nameEN);\n                            var wikiFormula = await fetchCactusFormula(wikiInfo.nameEN);\n                            if (wikiMw) {\n                                setMwNow(r.id, wikiMw); // 立即填入\n                                r.mwManual = false;\n                                r.nameCN = name;\n                                r.nameEN = wikiInfo.nameEN;\n                                if (wikiFormula) r.formula = wikiFormula;\n                                r.src = \'wiki-en-retry\';\n                                ok = true;\n                            }\n                        }\n                        // 用分子式查Cactus\n                        if (!ok && wikiInfo.formula) {\n                            var fMw = await fetchMolWeightFromAPI(wikiInfo.formula);\n                            if (fMw) {\n                                setMwNow(r.id, fMw); // 立即填入\n                                r.mwManual = false;\n                                r.nameCN = name;\n                                if (wikiInfo.nameEN) r.nameEN = wikiInfo.nameEN;\n                                r.formula = wikiInfo.formula;\n                                r.src = \'wiki-formula-retry\';\n                                ok = true;\n                            }\n                        }\n                        // 直接用Wikidata分子量\n                        if (!ok && wikiInfo.mw > 0) {\n                            setMwNow(r.id, wikiInfo.mw); // 立即填入\n                            r.mwManual = false;\n                            r.nameCN = name;\n                            if (wikiInfo.formula) r.formula = wikiInfo.formula;\n                            if (wikiInfo.nameEN) r.nameEN = wikiInfo.nameEN;\n                            r.src = \'wiki-cn\';\n                            ok = true;\n                        }\n                        // 仅获取到名称（无分子量）\n                        if (!ok && wikiInfo.nameEN) {\n                            r.nameCN = name;\n                            r.nameEN = wikiInfo.nameEN;\n                            if (wikiInfo.formula) r.formula = wikiInfo.formula;\n                            r.src = \'wiki-name-only\';\n                        }\n                    }\n                }\n            } else {\n                /* ===== 英文输入路径（与库房一致） ===== */\n                enName = name;\n                srcLabel = \'direct\';\n                var mwEn = await fetchMolWeightFromAPI(enName);\n                var formulaEn = await fetchCactusFormula(enName);\n                if (mwEn) {\n                    setMwNow(r.id, mwEn); // 立即填入\n                    r.mwManual = false;\n                    r.nameEN = name;\n                    if (formulaEn) r.formula = formulaEn;\n                    r.src = \'direct\';\n                    ok = true;\n                }\n                // 英文->中->Cactus\n                if (!ok) {\n                    var cnFromEn = await translateText(name);\n                    if (cnFromEn) {\n                        var iupacFromCn = null;\n                        try {\n                            var cactusRes = await fetchWithTimeout(\n                                \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(cnFromEn) + \'/iupac_name\', 10000\n                            );\n                            if (cactusRes.ok) {\n                                var iupac = await cactusRes.text();\n                                if (iupac && iupac.trim().length > 0 && !iupac.includes(\'Error\')) {\n                                    iupacFromCn = iupac.trim();\n                                }\n                            }\n                        } catch (e) {}\n                        if (iupacFromCn) {\n                            var mw2 = await fetchMolWeightFromAPI(iupacFromCn);\n                            var formula2 = await fetchCactusFormula(iupacFromCn);\n                            if (mw2) {\n                                setMwNow(r.id, mw2); // 立即填入\n                                r.mwManual = false;\n                                r.nameEN = iupacFromCn;\n                                r.nameCN = cnFromEn;\n                                if (formula2) r.formula = formula2;\n                                r.src = \'en-cn-cactus\';\n                                ok = true;\n                            }\n                        }\n                    }\n                }\n                // IUPAC解析\n                if (!ok) {\n                    var iupacDirect = null;\n                    try {\n                        var cactusRes = await fetchWithTimeout(\n                            \'https://cactus.nci.nih.gov/chemical/structure/\' + encodeURIComponent(name) + \'/iupac_name\', 10000\n                        );\n                        if (cactusRes.ok) {\n                            var iupac = await cactusRes.text();\n                            if (iupac && iupac.trim().length > 0 && !iupac.includes(\'Error\') && iupac.trim() !== name) {\n                                iupacDirect = iupac.trim();\n                            }\n                        }\n                    } catch (e) {}\n                    if (iupacDirect) {\n                        var mw3 = await fetchMolWeightFromAPI(iupacDirect);\n                        var formula3 = await fetchCactusFormula(iupacDirect);\n                        if (mw3) {\n                            setMwNow(r.id, mw3); // 立即填入\n                            r.mwManual = false;\n                            r.nameEN = iupacDirect;\n                            if (formula3) r.formula = formula3;\n                            r.src = \'cactus-iupac\';\n                            ok = true;\n                        }\n                    }\n                }\n                // Wikidata兜底\n                if (!ok) {\n                    var wikiInfoEn = await fetchWikidataInfo(name);\n                    if (wikiInfoEn) {\n                        if (wikiInfoEn.nameEN && wikiInfoEn.nameEN.toLowerCase() !== name.toLowerCase()) {\n                            var wikiMw = await fetchMolWeightFromAPI(wikiInfoEn.nameEN);\n                            var wikiFormula = await fetchCactusFormula(wikiInfoEn.nameEN);\n                            if (wikiMw) {\n                                setMwNow(r.id, wikiMw); // 立即填入\n                                r.mwManual = false;\n                                r.nameEN = wikiInfoEn.nameEN;\n                                if (wikiInfoEn.nameCN) r.nameCN = wikiInfoEn.nameCN;\n                                if (wikiFormula) r.formula = wikiFormula;\n                                r.src = \'wiki-en-retry\';\n                                ok = true;\n                            }\n                        }\n                        if (!ok && wikiInfoEn.formula) {\n                            var fMw = await fetchMolWeightFromAPI(wikiInfoEn.formula);\n                            if (fMw) {\n                                setMwNow(r.id, fMw); // 立即填入\n                                r.mwManual = false;\n                                r.nameEN = name;\n                                if (wikiInfoEn.nameCN) r.nameCN = wikiInfoEn.nameCN;\n                                r.formula = wikiInfoEn.formula;\n                                r.src = \'wiki-formula-retry\';\n                                ok = true;\n                            }\n                        }\n                        if (!ok && wikiInfoEn.mw > 0) {\n                            setMwNow(r.id, wikiInfoEn.mw); // 立即填入\n                            r.mwManual = false;\n                            r.nameEN = name;\n                            if (wikiInfoEn.formula) r.formula = wikiInfoEn.formula;\n                            if (wikiInfoEn.nameCN) r.nameCN = wikiInfoEn.nameCN;\n                            r.src = \'wiki-en\';\n                            ok = true;\n                        }\n                        if (!ok && wikiInfoEn.nameCN) {\n                            r.nameCN = wikiInfoEn.nameCN;\n                            if (wikiInfoEn.formula) r.formula = wikiInfoEn.formula;\n                            r.src = \'wiki-name-only\';\n                        }\n                    }\n                }\n            }\n            if (!ok && name.trim()) r.err = \'未找到该物质\';\n        } catch (e) {\n            console.error(\'queryPub error:\', e);\n            if (!r.err) r.err = \'查询出错\';\n        } finally {\n            r.loading = false;\n            renderTable();\n            // 恢复焦点\n            if (activeRowId && activeField) {\n                var restored = document.querySelector(\'tr[data-id="\' + activeRowId + \'"] [data-f="\' + activeField + \'"]\');\n                if (restored) {\n                    restored.focus();\n                    if (selStart >= 0 && restored.setSelectionRange) {\n                        try { restored.setSelectionRange(selStart, selEnd); } catch (ex) {}\n                    }\n                }\n            }\n            updateStructPreview();\n            scheduleAutoSave();\n        }\n    }, 500);\n}\n\n\n/* ========== 批量检索功能 ========== */\nfunction batchQuery() {\n    if (!currentId) {\n        toast(\'请先新建或打开一个反应\', \'err\');\n        return;\n    }\n    /* 筛选出有名称但需要检索的行：有名称且(无分子量 或 无英文名) */\n    var toQuery = rows.filter(function(r) {\n        return r.nameIn.trim() && (r.mw <= 0 || !r.nameEN);\n    });\n    if (!toQuery.length) {\n        toast(\'没有需要检索的数据\', \'inf\');\n        return;\n    }\n    /* 取消所有正在进行的定时器，防止重复触发 */\n    toQuery.forEach(function(r) {\n        if (timers[r.id]) {\n            clearTimeout(timers[r.id]);\n            delete timers[r.id];\n        }\n        r.loading = true;\n        r.err = \'\';\n    });\n    renderTable();\n    toast(\'正在检索 \' + toQuery.length + \' 条数据...\', \'inf\');\n    /* 逐个发起检索（queryPub 内部有 500ms 防抖） */\n    toQuery.forEach(function(r) {\n        queryPub(r);\n    });\n}\n\n\n/* ========== 结构式预览 ========== */\nfunction updateStructPreview() {\n  var box = document.getElementById(\'structPreview\');\n  var items = rows.filter(function(r) {\n    return r.nameIn.trim() && (r.nameEN || r.formula);\n  });\n  if (!items.length) { box.style.display = \'none\'; return; }\n  box.style.display = \'flex\';\n  box.innerHTML = items.map(function(r) {\n    var nm = getDisplayName(r);\n    return \'<div class="struct-card">\' +\n      \'<img src="\' + cactusImg(nm, \'small\') + \'" alt="\' + esc(nm) + \'" \' +\n      \'loading="lazy" decoding="async" onerror="this.style.display=\\\'none\\\'">\' +\n      \'<div class="sc-name">\' + esc(nm) +\n      (r.nameCN ? \' (\' + esc(r.nameCN) + \')\' : \'\') + \'</div></div>\';\n  }).join(\'\');\n}\n\n/* ========== 结构式Tooltip ========== */\nvar tipTimer = null;\nfunction showTip(e, id) {\n  clearTimeout(tipTimer);\n  var r = rows.find(function(x) { return x.id === id; });\n  if (!r) return;\n  var nm = getDisplayName(r);\n  if (!nm) return;\n  tipTimer = setTimeout(function() {\n    var tip = document.getElementById(\'structTip\');\n    document.getElementById(\'tipImg\').src = cactusImg(nm, \'large\');\n    document.getElementById(\'tipLabel\').textContent =\n      nm + (r.nameCN ? \' (\' + r.nameCN + \')\' : \'\');\n    tip.style.display = \'block\';\n    var rect = e.target.getBoundingClientRect();\n    var left = rect.right + 12, top = rect.top - 30;\n    if (left + 340 > window.innerWidth) left = rect.left - 350;\n    if (top + 340 > window.innerHeight) top = window.innerHeight - 350;\n    if (top < 10) top = 10;\n    tip.style.left = left + \'px\';\n    tip.style.top = top + \'px\';\n  }, 350);\n}\nfunction hideTip() {\n  clearTimeout(tipTimer);\n  document.getElementById(\'structTip\').style.display = \'none\';\n}\n\n\n/* ========== 计算逻辑 ========== */\nfunction calculate() {\n    if (!baseId) {\n        toast(\'请先设置一个反应物为基准物质\', \'err\');\n        return;\n    }\n    var b = rows.find(function(r) { return r.id === baseId; });\n    if (!b || b.mass <= 0) {\n        toast(\'请输入基准物质的质量\', \'err\');\n        return;\n    }\n    if (b.mw <= 0) {\n        toast(\'基准物质分子量无效\', \'err\');\n        return;\n    }\n    lastCalcTime = Date.now();\n    /* 基准物质的摩尔量：先将显示质量转为克，再计算 mmol */\n    b.mmol = b.mass * massUnitFactor * b.purity / b.mw * 1000;\n    for (var i = 0; i < rows.length; i++) {\n        var r = rows[i];\n        if (r.id === baseId) continue;\n        if (r.role === \'solvent\') {\n            /* 修复：b.mass * massUnitFactor 先转为克，再乘以 mL/g 的体积比 */\n            r.vol = b.mass * massUnitFactor * r.volR;\n            r.mmol = 0;\n            r.mass = 0;\n        } else {\n            r.mmol = b.mmol * r.eq;\n            if (r.conc && r.conc > 0) {\n                /* 有浓度时计算体积：mmol / (mol/L) = mL */\n                r.calcVol = r.mmol / r.conc;\n                r.mass = 0;\n            } else {\n                /* 纯质量投料：先算克，再转回显示单位 */\n                r.mass = r.mw > 0 ? (r.mmol / 1000 * r.mw / (r.purity || 1)) / massUnitFactor : 0;\n                r.calcVol = 0;\n            }\n            r.vol = 0;\n            r.isTheory = (r.role === \'product\');\n        }\n    }\n       renderTable();\n    scheduleAutoSave();\n    toast(\'计算完成\', \'ok\');\n}\n\n/* ========== 反向计算当量 ========== */\nfunction reverseCalculate() {\n    if (!baseId) {\n        toast(\'请先设置一个反应物为基准物质\', \'err\');\n        return;\n    }\n\n    var b = rows.find(function(r) { return r.id === baseId; });\n    if (!b || b.mass <= 0) {\n        toast(\'请输入基准物质的质量\', \'err\');\n        return;\n    }\n    if (b.mw <= 0) {\n        toast(\'基准物质分子量无效\', \'err\');\n        return;\n    }\n\n    /* 计算基准物质的摩尔量 */\n    var baseMmol = b.mass * massUnitFactor * b.purity / b.mw * 1000;\n    if (baseMmol <= 0) {\n        toast(\'基准物质摩尔量计算结果无效\', \'err\');\n        return;\n    }\n\n    var updated = 0;\n\n    for (var i = 0; i < rows.length; i++) {\n        var r = rows[i];\n\n        /* 基准物质：当量固定为1，同时补全摩尔量 */\n        if (r.id === baseId) {\n            r.mmol = baseMmol;\n            if (r.eq !== 1) {\n                r.eq = 1;\n                updated++;\n            }\n            continue;\n        }\n\n       /* 溶剂：如果有溶剂体积且基准物质有质量，反算体积比 */\nif (r.role === \'solvent\') {\n  if (r.vol > 0 && b.mass > 0) {\n    /* volR = vol / (mass * massUnitFactor)，结果为 mL/g */\n    var newVolR = Math.round(r.vol / (b.mass * massUnitFactor) * 100) / 100;\n    if (newVolR !== r.volR) {\n      r.volR = newVolR;\n      updated++;\n    }\n  }\n  continue;\n}\n\n\n        var calculatedMmol = null;\n\n        /* 方式1：根据质量和分子量反推摩尔量 */\n        if (r.mass > 0 && r.mw > 0) {\n            calculatedMmol = r.mass * massUnitFactor * (r.purity || 1) / r.mw * 1000;\n        }\n        /* 方式2：根据浓度和计算体积反推摩尔量 (mmol = mL × mol/L) */\n        else if (r.conc > 0 && r.calcVol > 0) {\n            calculatedMmol = r.calcVol * r.conc;\n        }\n        /* 方式3：直接使用已有的摩尔量字段 */\n        else if (r.mmol > 0) {\n            calculatedMmol = r.mmol;\n        }\n\n            if (calculatedMmol !== null && calculatedMmol > 0) {\n              /* 保留2位小数 */\n              var newEq = Math.round(calculatedMmol / baseMmol * 100) / 100;\n              if (newEq !== r.eq) {\n                r.eq = newEq;\n                updated++;\n              }\n              /* 同步补全摩尔量 */\n              r.mmol = Math.round(calculatedMmol * 100) / 100;\n            }\n\n            /* 新增：通过已知量倒推未填入分子量的物质的分子量 */\n            if (r.mw <= 0 && r.eq > 0 && r.mass > 0) {\n              /* 纯质量投料路径：MW = mass(g) × purity × 1000 / (mmol) */\n              var inferredMmol = baseMmol * r.eq;\n              if (inferredMmol > 0) {\n                var inferredMW = r.mass * massUnitFactor * (r.purity || 1) * 1000 / inferredMmol;\n                if (inferredMW > 0 && inferredMW < 50000) {\n                  r.mw = Math.round(inferredMW * 1000) / 1000;\n                  r.mwManual = true;\n                  updated++;\n                }\n              }\n            }\n            else if (r.mw <= 0 && r.eq > 0 && r.conc > 0 && r.calcVol > 0) {\n              /* 浓度体积投料路径：MW = conc × calcVol × 1000 / (mmol) */\n              var inferredMmol2 = baseMmol * r.eq;\n              if (inferredMmol2 > 0) {\n                var inferredMW2 = r.conc * r.calcVol * 1000 / inferredMmol2;\n                if (inferredMW2 > 0 && inferredMW2 < 50000) {\n                  r.mw = Math.round(inferredMW2 * 1000) / 1000;\n                  r.mwManual = true;\n                  updated++;\n                }\n              }\n            }\n            else if (r.mw <= 0 && r.mmol > 0 && r.mass > 0) {\n              /* 直接摩尔量路径：MW = mass(g) × purity × 1000 / mmol */\n              var inferredMW3 = r.mass * massUnitFactor * (r.purity || 1) * 1000 / r.mmol;\n              if (inferredMW3 > 0 && inferredMW3 < 50000) {\n                r.mw = Math.round(inferredMW3 * 1000) / 1000;\n                r.mwManual = true;\n                updated++;\n              }\n            }\n          }\n\n    if (updated === 0) {\n        toast(\'没有可反向计算的数据，请确保非基准行已填写质量或浓度+体积\', \'inf\');\n    } else {\n        renderTable();\n        scheduleAutoSave();\n                     toast(\'已反向计算 \' + updated + \' 项（含当量与分子量倒推）\', \'ok\');\n    }\n}\n\n/* ========== 送样记录功能 ========== */\n/* 时间字符串转时间戳（用于排序） */\nfunction timeToTs(t) {\n    if (!t) return 0;\n    var d = new Date(t.replace(/-/g, \'/\'));\n    return isNaN(d.getTime()) ? 0 : d.getTime();\n}\n\n/* 获取所有历史反应中的样品名称（去重，按使用时间倒序） */\nfunction getAllSampleNames() {\n    var map = {};\n    allReactions.forEach(function(rxn) {\n        (rxn.samples || []).forEach(function(s) {\n            if (s.sampleName && s.sampleName.trim()) {\n                var n = s.sampleName.trim();\n                var t = timeToTs(s.time);\n                if (!map[n] || t > map[n]) {\n                    map[n] = t;\n                }\n            }\n        });\n    });\n    return Object.keys(map).map(function(n) {\n        return { name: n, ts: map[n] };\n    }).sort(function(a, b) {\n        return b.ts - a.ts;\n    }).map(function(item) {\n        return item.name;\n    });\n}\n\n/* 获取所有历史反应中的仪器名称（去重，按使用时间倒序） */\nfunction getAllInstrumentNames() {\n    var map = {};\n    allReactions.forEach(function(rxn) {\n        (rxn.samples || []).forEach(function(s) {\n            if (s.instrument && s.instrument.trim()) {\n                var n = s.instrument.trim();\n                var t = timeToTs(s.time);\n                if (!map[n] || t > map[n]) {\n                    map[n] = t;\n                }\n            }\n        });\n    });\n    return Object.keys(map).map(function(n) {\n        return { name: n, ts: map[n] };\n    }).sort(function(a, b) {\n        return b.ts - a.ts;\n    }).map(function(item) {\n        return item.name;\n    });\n}\n\n\n/* 获取当前反应中已有的样品名称 */\nfunction getCurrentSampleNames() {\n    return curSamples\n        .map(function(s) { return s.sampleName.trim(); })\n        .filter(Boolean);\n}\n\n/* 生成不重名的样品名称（递增末尾数字） */\nfunction generateUniqueSampleName(baseName) {\n    baseName = (baseName || \'样品\').trim();\n    var existing = getCurrentSampleNames();\n    if (existing.indexOf(baseName) === -1) return baseName;\n    /* 将字符串末尾数字+1，无数字则追加 -1 */\n    function incLastNum(str) {\n        var m = str.match(/^(.*?)(\\d+)$/);\n        if (m) {\n            return m[1] + (parseInt(m[2], 10) + 1);\n        }\n        return str + \'-1\';\n    }\n    var candidate = incLastNum(baseName);\n    var guard = 1000;\n    while (guard-- > 0) {\n        if (existing.indexOf(candidate) === -1) return candidate;\n        candidate = incLastNum(candidate);\n    }\n    return baseName + \'-\' + Date.now();\n}\n\n\n/* 获取当前时间字符串 */\nfunction getNowTimeStr() {\n    var d = new Date();\n    return d.getFullYear() + \'-\' +\n        String(d.getMonth() + 1).padStart(2, \'0\') + \'-\' +\n        String(d.getDate()).padStart(2, \'0\') + \' \' +\n        String(d.getHours()).padStart(2, \'0\') + \':\' +\n        String(d.getMinutes()).padStart(2, \'0\');\n}\n\n/* 添加一条送样记录 */\nfunction addSampleRecord() {\n      curSamples.push({ id: Date.now(), time: getNowTimeStr(), sampleName: \'\', instrument: \'\', remark: \'\' });\n\n    renderSampleList();\n    scheduleAutoSave();\n}\n\n/* 删除一条送样记录 */\nfunction removeSampleRecord(id) {\n    curSamples = curSamples.filter(function(s) {\n        return s.id !== id;\n    });\n    renderSampleList();\n    scheduleAutoSave();\n}\n\n/* 更新送样记录字段 */\nfunction updSample(id, field, value) {\n    var s = curSamples.find(function(x) { return x.id === id; });\n    if (!s) return;\n      if (field === \'time\') s.time = value;\n    else if (field === \'sampleName\') s.sampleName = value;\n    else if (field === \'instrument\') s.instrument = value;\n    else if (field === \'remark\') s.remark = value;\n\n    scheduleAutoSave();\n}\n\n/* 点击时间按钮：记录当前时间 */\nfunction recordSampleTime(id) {\n    updSample(id, \'time\', getNowTimeStr());\n    renderSampleList();\n    toast(\'已记录当前时间\', \'ok\');\n}\n\n/* 延迟隐藏下拉（给 onmousedown 留时间） */\nfunction delayHideSampleDD(el) {\n    setTimeout(function() { hideSampleDD(el); }, 200);\n}\n\n/* 隐藏单个下拉 */\nfunction hideSampleDD(el) {\n    if (!el) return;\n    var sid = el.dataset.sid;\n    var ftype = el.dataset.ftype;\n    var dd = document.getElementById(\'dd_\' + ftype + \'_\' + sid);\n    if (dd) dd.classList.remove(\'open\');\n}\n\n/* 隐藏所有下拉 */\nfunction hideAllSampleDD() {\n    document.querySelectorAll(\'.sample-dropdown.open\').forEach(function(d) {\n        d.classList.remove(\'open\');\n    });\n}\n\n/* 显示下拉建议列表 */\nfunction showSampleDD(inputEl, ftype) {\n    hideAllSampleDD();\n    var sid = inputEl.dataset.sid;\n    var dd = document.getElementById(\'dd_\' + ftype + \'_\' + sid);\n    if (dd) dd.classList.add(\'open\');\n}\n\n/* 选择样品名称（带去重加序号逻辑 sampleName\\\',this.value)" \' +\n            \'onfocus="showSampleDD(this,\\\'name\\\')" \' +\n            \'onblur="delayHideSampleDD(this)" \' +\n            \'data-sid="\' + s.id + \'" data-ftype="name">\' +\n            (nameSuggestions.length ?\n                \'<div class="sample-dropdown" \' +\n                \'id="dd_name_\' + s.id + \'">\' +\n                nameSuggestions.slice(0, 10).map(function(n) {\n                    return \'<div class="sample-dropdown-item" \' +\n                        \'data-sid="\' + s.id + \'" \' +\n                        \'data-val="\' + esc(n) + \'" \' +\n                        \'onmousedown="pickSampleName(this)">\' +\n                        esc(n) + \'</div>\';\n                }).join(\'\') + \'</div>\' : \'\') +\n            \'</div>\' +\n            /* 仪器名称输入 + 下拉 */\n            \'<div class="sample-field-wrap">\' +\n            \'<input class="sample-input inst-input" \' +\n            \'placeholder="仪器名称..." \' +\n            \'value="\' + esc(s.instrument) + \'" \' +\n            \'oninput="updSample(\' + s.id + \',\' +\n            \'\\\'instrument\\\',this.value)" \' +\n            \'onfocus="showSampleDD(this,\\\'inst\\\')" \' +\n            \'onblur="delayHideSampleDD(this)" \' +\n            \'data-sid="\' + s.id + \'" data-ftype="inst">\' +\n                 (instSuggestions.length ? \'<div class="sample-dropdown" \' +\n                \'id="dd_inst_\' + s.id + \'">\' +\n                instSuggestions.slice(0, 10).map(function(n) {\n                  return \'<div class="sample-dropdown-item" \' +\n                  \'data-sid="\' + s.id + \'" \' +\n                  \'data-val="\' + esc(n) + \'" \' +\n                  \'onmousedown="pickInstrument(this)">\' +\n                  esc(n) + \'</div>\';\n                }).join(\'\') +\n                \'</div>\' : \'\') +\n                \'</div>\' +\n                /* 备注输入框 */\n                \'<input class="sample-input" style="width:140px;min-width:80px" \' +\n                \'placeholder="备注..." \' +\n                \'value="\' + esc(s.remark) + \'" \' +\n                \'oninput="updSample(\' + s.id + \',\' + \'\\\'remark\\\',this.value)" \' +\n                \'title="备注">\' +\n                /* 删除按钮 */\n\n            \'<button class="btn-i dng" \' +\n            \'onclick="removeSampleRecord(\' + s.id + \')" \' +\n            \'title="删除" style="margin-left:auto">\' +\n            \'<i class="fas fa-trash-alt"></i></button>\' +\n            \'</div>\';\n    }).join(\'\');\n}\n\n/* ========== 表格渲染 ========== */\n\nfunction renderTable() {\n  var tb = document.getElementById(\'tbody\');\n  var unitLabel = getUnitLabel();\n  function srcTagHtml(src) {\n    if (src === \'dict\') return \'<span class="src-tag src-dict"><i class="fas fa-book" style="font-size:7px"></i> 词典</span>\';\n    if (src === \'api\') return \'<span class="src-tag src-api"><i class="fas fa-language" style="font-size:7px"></i> API翻译</span>\';\n    if (src === \'cactus\' || src === \'cactus-direct\') return \'<span class="src-tag src-cactus"><i class="fas fa-leaf" style="font-size:7px"></i> Cactus</span>\';\n    if (src === \'en-cn-cactus\') return \'<span class="src-tag src-api"><i class="fas fa-exchange-alt" style="font-size:7px"></i> 英→中→Cactus</span>\';\n    if (src === \'cactus-iupac\') return \'<span class="src-tag src-cactus"><i class="fas fa-leaf" style="font-size:7px"></i> IUPAC</span>\';\n    if (src === \'wiki-cn\' || src === \'wiki-en\') return \'<span class="src-tag src-wiki"><i class="fab fa-wikipedia-w" style="font-size:7px"></i> Wikidata</span>\';\n    if (src === \'wiki-en-retry\') return \'<span class="src-tag src-wiki"><i class="fab fa-wikipedia-w" style="font-size:7px"></i> Wiki→Cactus</span>\';\n    if (src === \'wiki-formula-retry\') return \'<span class="src-tag src-wiki"><i class="fab fa-wikipedia-w" style="font-size:7px"></i> Wiki分子式</span>\';\n    if (src === \'wiki-name-only\') return \'<span class="src-tag src cent)\n}\n.search-option.selected {\nbackground: var(--accent-dim);\ncolor: var(--accent);\nfont-weight: 600\n}\n.search-option .so-en {\nfont-size: 11px;\ncolor: var(--fg3);\nflex-shrink: 0\n}\n.search-option.hidden {\ndisplay: none\n}\n.search-no-result {\npadding: 16px 12px;\ntext-align: center;\ncolor: var(--fg3);\nfont-size: 12px\n}\n.history-item {\npadding: 10px;\nbackground: var(--bg2);\nborder: 1px solid var(--border);\nborder-radius: var(--r);\nmargin-bottom: 8px;\ncursor: pointer;\ntransition: all .15s;\ndisplay: flex;\njustify-content: space-between;\nalign-items: center\n}\n.history-item:hover {\nborder-color: var(--accent);\nbackground: var(--accent-dim)\n}\n.history-item .h-name {\nfont-size: 13px;\nfont-weight: 600;\ncolor: var(--fg);\nwhite-space: nowrap;\noverflow: hidden;\ntext-overflow: ellipsis;\nflex: 1\n}\n.history-item .h-date {\nfont-size: 10px;\ncolor: var(--fg3);\nmargin-left: 10px;\nwhite-space: nowrap\n}\n.history-item .h-actions {\ndisplay: flex;\ngap: 4px;\nmargin-left: 8px\n}\n.history-empty {\ntext-align: center;\ncolor: var(--fg3);\nfont-size: 12px;\npadding: 20px\n}\n.save-dialog {\nbackground: var(--card);\nborder: 1px solid var(--border-hi);\nborder-radius: var(--r2);\npadding: 20px;\nbox-shadow: 0 8px 32px rgba(0, 0, 0, .6);\nposition: fixed;\ntop: 50%;\nleft: 50%;\ntransform: translate(-50%, -50%);\nz-index: 1000;\nmin-width: 360px;\ndisplay: none\n}\n.save-dialog.show {\ndisplay: block;\nanimation: fadeUp .3s ease\n}\n.save-dialog h3 {\nmargin-bottom: 15px;\nfont-size: 15px\n}\n.save-dialog-actions {\nmargin-top: 15px;\ndisplay: flex;\ngap: 8px;\njustify-content: flex-end\n}\n.amount-detail-row {\nmargin-top: 6px;\ndisplay: grid;\ngrid-template-columns: 100px 1fr;\ngap: 6px 10px;\nalign-items: center\n}\n.amount-detail-row label {\nfont-size: 11px;\ncolor: var(--fg3)\n}\n.temp-time-section {\nmargin-bottom: 10px;\npadding-bottom: 10px;\nborder-bottom: 1px dashed var(--border)\n}\n.temp-time-section:last-of-type {\nborder-botto .toggle-password {\nposition: absolute;\nright: 8px;\ntop: 50%;\ntransform: translateY(-50%);\nbackground: none;\nborder: none;\ncolor: var(--fg3);\ncursor: pointer;\npadding: 0;\ndisplay: flex;\nalign-items: center;\njustify-content: center\n}\n.toggle-password:hover {\ncolor: var(--fg)\n}\n.toggle-password svg {\nwidth: 16px;\nheight: 16px\n}\n.history-search-input {\npadding: 3px 8px;\nfont-size: 11px;\nborder-radius: 4px;\nbackground: var(--bg2);\nborder: 1px solid var(--border);\ncolor: var(--fg);\nwidth: 90px;\ntransition: border-color .2s, width .2s\n}\n.history-search-input:focus {\nborder-color: var(--accent);\nwidth: 130px;\noutline: none\n}\n.history-search-input::placeholder {\ncolor: var(--fg3)\n}\n.export-code-box {\nwidth: 100%;\nmin-height: 200px;\nfont-size: 11px;\nfont-family: \'SF Mono\', Consolas, monospace;\nbackground: var(--bg2);\nborder: 1px solid var(--border);\nborder-radius: var(--r);\ncolor: var(--fg);\nresize: vertical;\npadding: 10px\n}\n@keyframes spin {\nfrom { transform: rotate(0deg) }\nto { transform: rotate(360deg) }\n}\n@media(max-width:900px) {\n.main {\ngrid-template-columns: 1fr;\npadding: 12px\n}\n.output-panel {\nposition: static;\nmax-height: none\n}\n.reagent-row {\ngrid-template-columns: 1fr 70px 56px 72px\n}\n.fg {\ngrid-template-columns: 80px 1fr\n}\n.save-dialog {\nmin-width: auto;\nwidth: calc(100% - 32px)\n}\n}\n@keyframes fadeUp {\nfrom { opacity: 0; transform: translateY(8px) }\nto { opacity: 1; transform: translateY(0) }\n}\n</style>\n<style>\n:root {\n  --bg: #060a10;\n  --bg2: #0a1018;\n  --card: #101a28;\n  --card-h: #162236;\n  --bdr: #1c2c44;\n  --bdr2: #28405e;\n  --fg: #dce6f4;\n  --muted: #6882a6;\n  --dim: #3e5470;\n  --accent: #38bdf8;\n  --accent2: #7dd3fc;\n  --accent-bg: rgba(56,189,248,.1);\n  --danger: #ff5c5c;\n  --danger-bg: rgba(255,92,92,.1);\n  --warn: #f0a030;\n  --success: #22c55e;\n  --success-bg: rgba(34,197,94,.1);\n  --info: #38bdf8;\n  --info-bg: rgba(56,189,248,.1);\n  --text-primary: #f0f9ff;\n  --text-secondary: #94a3b8;\n  --surface-1: #0a1018;\n  --surface-2: #162236;\n  --surface-3: #28405e;\n  --shadow: rgba(0,0,0,.35);\n  --gradient-start: #38bdf8;\n  --gradient-end: #7dd3fc;\n  --highlight: #fbbf24;\n  --code-bg: #060c14;\n  --border-light: #162438;\n  --border-focus: #38bdf8;\n  --text-muted: #7890b0;\n  --text-dim: #4a6480;\n  --text-accent: #7dd3fc;\n  --text-danger: #ff7a7a;\n  --text-success: #4ade80;\n  --text-warn: #fbbf24;\n  --text-info: #60c5f8;\n  --surface-hover: #162236;\n  --surface-active: #1e2a42;\n  --overlay: rgba(0,0,0,.6);\n  --overlay-light: rgba(0,0,0,.3);\n  --tag-bg: rgba(56,189,248,.08);\n  --tag-text: #38bdf8;\n  --input-bg: #060a10;\n  --input-border: #1c2c44;\n  --input-focus: #38bdf8;\n  --scrollbar: #28405e;\n  --scrollbar-hover: #3a5880;\n  --selection: rgba(56,189,248,.2);\n}\n</style>\n</head>\n<body>\n<header>\n<div class="hd-inner">\n<svg class="flask-icon" viewBox="0 0 36 36">\n<path d="M13 4v10l-8 16a2 2 0 002 2h22a2 2 0 002-2l-8-16V4" />\n<line x1="11" y1="4" x2="25" y2="4" />\n<circle cx="18" cy="24" r="3" opacity=".5" />\n</svg>\n<div class="hd-text">\n<h1>化学投料描述生成器</h1>\n<p>Chemical Feeding Description Generator (AI Enhanced)</p>\n</div>\n</div>\n</header>\n<div class="main">\n<div class="panel" id="inputPanel">\n<section class="card">\n<div class="card-hd">\n<h2>历史记录 <span>History</span></h2>\n<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">\n<input type="text" id="historySearch" class="history-search-input" placeholder="搜索名称..." oninput="filterHistory()">\n<button class="btn btn-sm" onclick="openSaveDialog()">保存当前</button>\n<button class="btn btn-sm" onclick="importData()">导入JSON</button>\n <button class="btn btn-sm" onclick="exportAllData()">导出全部</button>\n <button class="btn btn-sm btn-purple" onclick="openReverseDialog()">反向提取</button>\n\n</div>\n</div>\n<div class="card-bd" id="historyList" style="max-height: 180px; overflow-y: auto;">\n<div class="history-empty">暂无历史记录</div>\n</div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>反应物与产物 <span>Reagents &amp; Product</span></h2>\n<div style="display:flex;gap:6px">\n<button class="btn btn-sm btn-blue" onclick="openImportDialog()">导入文本</button>\n<button class="btn" onclick="addReagent()">+ 添加</button>\n</div>\n</div>\n<div class="card-bd" id="reagentList"></div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>反应条件 <span>Conditions</span></h2>\n</div>\n<div class="card-bd">\n<div class="fg">\n<label>反应器类型</label>\n<select id="vesselType">\n<option value="three_neck_flask">三颈瓶 / three-necked flask</option>\n<option value="round_bottom_flask">圆底烧瓶 / round-bottom flask</option>\n<option value="schlenk_flask">Schlenk瓶 / Schlenk flask</option>\n<option value="pressure_tube">耐压管 / pressure tube</option>\n<option value="autoclave">高压釜 / autoclave</option>\n<option value="single_neck_flask">单颈瓶 / single-neck flask</option>\n<option value="reactor">反应釜 / reactor</option>          <!-- ← 新增 -->\n</select>\n<label>反应器体积</label>\n<input type="text" id="vesselSize" placeholder="如：250 mL" value="250 mL">\n<label>保护气氛</label>\n<select id="atmosphere">\n<option value="n2">氮气 / N₂</option>\n<option value="ar">氩气 / Ar</option>\n<option value="none">无 / None</option>\n<option value="air">空气 / Air</option>\n<option value="o2">氧气 / O₂</option>\n<option value="h2">氢气 / H₂</option>\n<option value="co">一氧化碳 / CO</option>\n</select>\n</div>\n<div class="temp-time-section">\n<div class="temp-time-title">加料阶段 (温度1 / 时间1)</div>\n<div class="fg">\n<label>加料温度</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="temp1" placeholder="数值" style="flex:1">\n<select id="temp1Unit" style="width:90px;flex:none">\n<option value="°C">°C</option>\n<option value="rt">室温 / rt</option>\n<option value="ice">冰浴 / ice bath</option>\n</select>\n</div>\n<label>加料时间</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="time1" placeholder="数值" style="flex:1">\n<select id="time1Unit" style="width:70px;flex:none">\n<option value="h">h</option>\n<option value="min">min</option>\n</select>\n</div>\n</div>\n</div>\n<div class="temp-time-section">\n<div class="temp-time-title">反应阶段 (温度2 / 时间2)</div>\n<div class="fg">\n<label>反应温度</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="temp2" placeholder="数值" style="flex:1">\n<select id="temp2Unit" style="width:90px;flex:none">\n<option value="°C">°C</option>\n<option value="rt">室温 / rt</option>\n<option value="reflux">回流 / reflux</option>\n</select>\n</div>\n<label>反应时间</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="time2" placeholder="数值" style="flex:1">\n<select id="time2Unit" style="width:70px;flex:none">\n<option value="h">h</option>\n<option value="min">min</option>\n</select>\n</div>\n</div>\n</div>\n        <div class="temp-time-section" id="specialCondSection">\n          <div class="temp-time-title">特殊反应条件 / Special Conditions</div>\n          <div class="fg">\n            <label>条件类型</label>\n            <select id="specialCondType" onchange="onSpecialCondChange()">\n              <option value="none">无 / None</option>\n              <option value="photo">光照 / Photocatalysis</option>\n              <option value="microwave">微波 / Microwave</option>\n              <option value="ultrasound">超声 / Ultrasound</option>\n              <option value="electrochemical">电化学 / Electrochemical</option>\n            </select>\n          </div>\n          <div id="specialCondParams" style="display:none; margin-top:8px;"></div>\n        </div>\n        <div class="temp-time-section">\n          <div class="temp-time-title">淬灭阶段 (温度3 / 时间3)</div>\n<div class="fg">\n<label>淬灭试剂</label>\n<input type="text" id="quenchReagent" placeholder="如：水、饱和NH₄Cl溶液">\n<label>淬灭温度</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="temp3" placeholder="数值" style="flex:1">\n<select id="temp3Unit" style="width:90px;flex:none">\n<option value="°C">°C</option>\n<option value="rt">室温 / rt</option>\n<option value="ice">冰浴 / ice bath</option>\n</select>\n</div>\n<label>淬灭时间</label>\n<div style="display:flex;gap:6px">\n<input type="text" id="time3" placeholder="数值" style="flex:1">\n<select id="time3Unit" style="width:70px;flex:none">\n<option value="h">h</option>\n<option value="min">min</option>\n</select>\n</div>\n</div>\n</div>\n<div class="fg" style="margin-top:12px; padding-top:12px; border-top: 1px solid var(--border)">\n<label>监测方式</label>\n<select id="monitorType">\n<option value="none">无 / None</option>\n<option value="tlc">TLC</option>\n<option value="hplc">HPLC</option>\n<option value="lcms">LC-MS</option>\n</select>\n<label>展开剂/流动相</label>\n<input type="text" id="monitorEluent" placeholder="如：PE/EA=3:1 或 水/乙腈">\n<label>备注</label>\n<textarea id="reactionNote" placeholder="其他需要补充的反应条件..." rows="2" class="fg-full"></textarea>\n</div>\n</div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>后处理 <span>Workup</span></h2>\n<button class="btn" onclick="addWorkup()">+ 添加步骤</button>\n</div>\n<div class="card-bd" id="workupList"></div>\n</section>\n<section class="card ai-settings">\n<div class="card-hd">\n<h2>AI服务设置 <span>AI Settings</span></h2>\n</div>\n<div class="card-bd">\n<div class="fg">\n<label>AI服务提供商</label>\n<select id="aiProvider" onchange="onAIProviderChange()">\n<option value="deepseek">DeepSeek (推荐)</option>\n<option value="pollinations">Pollinations.AI (免费，无需Key)</option>\n<option value="custom">自定义API</option>\n</select>\n<label id="apiKeyLabel">API密钥</label>\n<div class="password-input-wrapper">\n<input type="password" id="apiKey" placeholder="填写你的 API Key">\n<button type="button" class="toggle-password" onclick="togglePasswordVisibility()" title="显示/隐藏密钥">\n<svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">\n<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>\n<circle cx="12" cy="12" r="3"></circle>\n</svg>\n</button>\n</div>\n<div class="key-hint" id="keyHint" style="display:none; grid-column: 2;">\n<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">\n<path d="M9 12l2 2 4-4" />\n<circle cx="12" cy="12" r="10" />\n</svg>\n<span>密钥已自动保存</span>\n</div>\n</div>\n<div id="deepseekModelRow" class="fg" style="margin-top:6px">\n<label>DeepSeek模型</label>\n<select id="deepseekModel">\n<option value="deepseek-chat">deepseek-chat (通用对话)</option>\n<option value="deepseek-reasoner">deepseek-reasoner (深度推理)</option>\n</select>\n</div>\n<div id="balanceInline" style="display:none">\n<div class="balance-inline" id="balanceContent">\n<span class="bal-label">余额</span>\n<span class="bal-loading">\n<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">\n<circle cx="12" cy="12" r="10" />\n<path d="M12 6v6l4 2" />\n</svg>\n查询中...\n</span>\n</div>\n<button class="balance-refresh-btn" onclick="queryBalance()" id="refreshBalanceBtn">\n<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">\n<path d="M23 4v6h-6M1 20v-6h6" />\n<path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />\n</svg>\n刷新\n</button>\n</div>\n<div id="customApiSettings" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">\n<div class="fg">\n<label>自定义API地址</label>\n<input type="text" id="customApiUrl" placeholder="https://api.example.com:8080/v1/chat/completions">\n<label>模型名称</label>\n<input type="text" id="customModel" placeholder="gpt-3.5-turbo">\n</div>\n</div>\n</div>\n</section>\n<button class="btn btn-accent gen-btn" onclick="generate()">\n生成描述 &nbsp;Generate Description\n</button>\n</div>\n<div class="panel output-panel">\n<section class="card">\n<div class="card-hd">\n<h2>中文描述 <span>Chinese</span></h2>\n<div class="output-actions">\n<span class="edit-hint">可编辑</span>\n<button class="btn btn-sm" onclick="copyOutput(\'zh\')">复制</button>\n</div>\n</div>\n<div class="card-bd">\n<textarea class="output-box empty" id="outZh" placeholder="点击"生成描述"按钮查看结果" onfocus="onOutputFocus(this)" onblur="onOutputBlur(this)"></textarea>\n</div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>English Description</h2>\n<div class="output-actions">\n<span class="edit-hint">editable</span>\n<button class="btn btn-sm" onclick="copyOutput(\'en\')">Copy</button>\n</div>\n</div>\n<div class="card-bd">\n<textarea class="output-box empty" id="outEn" placeholder=\'Click "Generate Description" to see results\' onfocus="onOutputFocus(this)" onblur="onOutputBlur(this)"></textarea>\n</div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>AI优化描述 <span>AI Optimized</span></h2>\n<div class="output-actions">\n<div class="source-selector">\n<select id="optimizeSource">\n<option value="zh">来源: 中文描述</option>\n<option value="en">来源: English</option>\n<option value="optimized">来源: 当前优化</option>\n</select>\n</div>\n<button class="btn btn-sm btn-purple" onclick="optimizeDescription()">优化</button>\n<button class="btn btn-sm btn-green" onclick="applyOptimized()">回填中文</button>\n<button class="btn btn-sm" onclick="copyOutput(\'optimized\')">复制</button>\n</div>\n</div>\n<div class="card-bd">\n<textarea class="output-box empty" id="outOptimized" placeholder="点击"优化"按钮生成AI优化描述" onfocus="onOutputFocus(this)" onblur="onOutputBlur(this)"></textarea>\n</div>\n</section>\n<section class="card">\n<div class="card-hd">\n<h2>AI翻译描述 <span>AI Translated</span></h2>\n<div class="output-actions">\n<div class="source-selector">\n<select id="translateSource">\n<option value="zh">来源: 中文描述</option>\n<option value="optimized">来源: 优化描述</option>\n<option value="translated">来源: 当前翻译</option>\n</select>\n</div>\n<button class="btn btn-sm btn-purple" onclick="translateDescription()">翻译</button>\n<button class="btn btn-sm btn-green" onclick="applyTranslated()">回填英文</button>\n<button class="btn btn-sm" onclick="copyOutput(\'translated\')">复制</button>\n</div>\n</div>\n<div class="card-bd">\n<textarea class="output-box empty" id="outTranslated   }\n};\n\n/* ===== AI API 提供商配置 ===== */\n\nvar AI_PROVIDERS = {\ndeepseek: {\nname: \'DeepSeek\',\nurl: \'https://api.deepseek.com/chat/completions\',\nbalanceUrl: \'https://api.deepseek.com/user/balance\',\nrequiresKey: true,\nmethod: \'POST\',\nheaders: { \'Content-Type\': \'application/json\' },\nbuildBody: function(prompt) {\nvar model = document.getElementById(\'deepseekModel\').value || \'deepseek-chat\';\nreturn JSON.stringify({\nmodel: model,\nmessages: [\n{ role: \'system\', content: \'你是一位专业的化学领域编辑和翻译专家，熟悉化学术语的中英文表达和学术写作规范。请严格按照用户要求输出，不要添加任何开头语、解释或额外说明。\' },\n{ role: \'user\', content: prompt }\n],\ntemperature: 0.3\n});\n},\nparseResponse: function(data) {\nreturn data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content.trim() : \'无法解析响应\';\n}\n},\npollinations: {\nname: \'Pollinations.AI\',\nurl: \'https://gen.pollinations.ai/openai/chat/completions\',\nrequiresKey: false,\nmethod: \'POST\',\nheaders: { \'Content-Type\': \'application/json\' },\nbuildBody: function(prompt) {\nreturn JSON.stringify({\nmodel: \'openai\',\nmessages: [\n{ role: \'system\', content: \'你是一位专业的化学领域编辑和翻译专家。\' },\n{ role: \'user\', content: prompt }\n],\ntemperature: 0.3\n});\n},\nparseResponse: function(data) {\nreturn data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content.trim() : \'无法解析响应\';\n}\n},\ncustom: {\nname: \'自定义API\',\nurl: \'\',\nrequiresKey: false,\nmethod: \'POST\',\nheaders: { \'Content-Type\': \'application/json\' },\nbuildBody: function(prompt, model) {\nreturn JSON.stringify({\nmodel: model || \'gpt-3.5-turbo\',\nmessages: [{ role: \'user\', content: prompt }]\n});\n},\nparseResponse: function(data) {\nreturn data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : \'无法解析响应\';\n}\n}\n};\n/* 投料方式 */\nvar FEEDS = {\none_time: { zh: \'一次性加入\', en: \'added in one portion\', params: [] },\nportions: { zh: \'分批加入\', en: \'added in portions\', params: [{
